body:
  text: 西清古鑑卷十九壺一商父已壺有銘周月壺有銘丙辰方壺有銘太公壺一有銘太公壺二有銘召仲壺有銘伯恭壺有銘黎伯壺有銘鑄壺有銘宜壺有銘節壺有銘婦壺有銘樊壺有銘公壺有銘素壺一有銘素壺二素壺葢阜父壺葢有銘饕餮壺䕫鳯壺蟠虬壺蟠虺壺一蟠虺壺二蟠虺壺三蟠䕫壺一蟠䕫壺二蟠䕫壺三蟠䕫壺三蟠䕫壺四蟠䕫壺五蟠䕫壺六蟠䕫壺七蟠䕫壺八蟠䕫壺九蟠䕫壺十蟠䕫壺十一蟠䕫匾壺一蟠䕫匾壺二蟠螭壺一蟠螭壺二盤雲壺右髙八寸七分深八寸一分口徑三寸腹圍一尺七寸九分重七十五兩兩耳連環右髙一尺二寸三分深一尺一寸七分口徑五寸八分腹圍三尺二寸重三百三十一兩兩耳連環又環鼻如罍鐘鼎欵識有蛟篆壺薛尚功云右壺一字鵠首蛟足全類夏琱戈也銘中藏一字彷彿如月此銘同右髙一尺五寸一分深一尺三寸口徑四寸六分腹圍三尺四寸四分重四百九十一兩兩耳連環銘字漫漶不甚可讀曰侯曰王后亦重器矣右通葢髙一尺一寸二分深八寸八分口縱三寸一分橫四寸腹圍二尺一寸三分重二百五十一兩兩耳古器多銘作釁字按禮雜記成廟則釁之又廣韻釁牲血塗祭器也周制烝嘗饋獻凡用兩壺次於尊彞用於門内則此壺當為祭祀用矣右通葢髙一尺一寸七分深九寸口縱橫腹圍俱同前重二百五十九兩兩耳右通葢髙一尺四寸深九寸六分口徑四寸二分腹圍二尺四寸七分重二百九十九兩兩耳鐘鼎欵識有召仲考父壺銘並同多福滂薛尚功引説文曰渥衍沛滂言多福與渥澤也按前漢禮樂志郊祀歌第十五章有福滂洋之語師古曰滂洋饒廣也此福滂二字義正同銘文饗滂疆尚葢用韵語在彞器中固不多見也右髙一尺三寸四分深一尺二寸五分口徑二寸八分腹圍一尺六寸五分重一百三兩兩耳按左傳正義任姓有吕國前貉子卣亦有王格于吕之語此銘曰伯恭父北征曰還吕意其吕之大夫耶右髙六寸七分深五寸九分口徑二寸三分腹圍一尺八寸五分重六十二兩兩耳文當左旋讀子孫永用則順文也首一字曰舉與舉鼎舉尊同稱黎伯則國君矣右髙九寸深八寸四分口徑三寸七分腹圍二尺九寸重八十一兩兩耳連環鑄鼎銘曰某公作鑄云云此云成公鑄子子葢其爵成公則諡也孟妃媵盥壺則非祭祀用矣右通葢髙一尺八寸二分深一尺三寸二分口縱四寸七分横六寸三分腹圍二尺八寸六分重四百一十九兩兩耳連環按已如祖已為商稱在周則宋乃商後銘周宜作宋桓公族有魚氏蕩氏向氏而向氏有向宜者豈其人耶右通葢髙九寸二分深六寸七分口縱二寸七分橫三寸四分腹圍一尺七寸五分重九十九兩兩耳銘曰莭博古圗有周莭鼎此其類耶右通葢髙一尺六分深七寸九分口縱二寸七分横三寸五分腹縱四寸四分横五寸五分重一百二十三兩兩耳按銘詞葢主婦所執與婦鼎類上彞字象形如鳥葢宗彞為虎蜼舊説取其孝也下曰䖍與䖍彞同右髙一尺八分深九寸五分口徑三寸八分腹圍二尺一寸九分重一百一十八兩兩耳􅭻同識意人名也樊壺按仲山甫為樊侯姓苑謂其後人因國為氏又樊一訓衆此樊壺或猶旅尊旅彞意耶右髙六寸三分深五寸六分口徑二寸六分腹圍一尺六寸一分重七十三兩兩耳連環右髙一尺三寸深一尺二寸口徑一寸腹圍二尺三分重六十三兩詩八月㫁壺知古文書瓠為壺此器細頸純素盖象瓠也與弇口為瓶者自别又一名温壺右髙一尺七分深一尺口徑二寸八分腹圍二尺三分重一百五兩兩耳右髙二寸一分深一寸五分口縱一寸七分横二寸三分重一十九兩右髙一寸三分深八分口徑二寸八分重九兩内府所收有仲阜卣又敦一盉一皆曰仲阜此銘苐二字為阜而首一字缺不能定其為仲也用廟盖廟器友尊之友如旅非一器矣形製與壺尊弗類特葢耳右髙一尺二寸深一尺五分口縱四寸五分横五寸七分腹圍二尺四寸四分重一百八十七兩兩耳右髙一尺五寸深一尺二寸八分口徑五寸七分腹圍二尺七寸重二百七十五兩兩耳右髙一尺八分深九寸五分口徑三寸四分腹圍二尺四寸重九十九兩兩耳連環右髙九寸一分深八寸九分口徑三寸四分腹圍一尺九寸六分重七十五兩兩耳右髙九寸深八寸七分口徑三寸三分腹圍二尺一寸六分重七十九兩兩耳右髙一尺一寸四分深一尺九分口徑三寸六分腹圍二尺四寸二分重一百二十二兩兩耳連環右通葢髙一尺七寸五分深一尺九分口徑五寸八分腹圍二尺九寸重四百五十九兩兩耳連環右通葢髙一尺四寸深一尺一寸四分口徑四寸六分腹圍二尺四寸六分重二百六十七兩兩耳連環右髙一尺三寸九分深一尺三寸三分口徑四寸一分腹圍三尺一寸五分重二百二十三兩兩耳連環又環鼻凡八右髙一尺二寸五分深一尺一寸七分口徑三寸六分腹圍二尺五寸三分重一百三十六兩兩耳連環右髙一尺四分深九寸四分口徑三寸五分腹圍二尺二寸五分重一百一十七兩兩耳連環金錯右髙一尺深九寸二分口徑四寸腹圍二尺三寸七分重一百四十五兩兩耳連環金銀錯右髙一尺深九寸四分口徑三寸二分腹圍二尺一寸重七十三兩兩耳連環右髙九寸八分深八寸六分口徑四寸六分腹圍二尺二寸四分重一百四十一兩兩耳右髙九寸六分深九寸口徑三寸四分腹圍二尺一分重六十六兩兩耳連環右髙八寸八分深七寸七分口徑三寸二分腹圍二尺六分重六十七兩兩耳連環金銀錯右通盖髙二尺六分深一尺三寸四分口徑六寸二分腹圍三尺四寸重五百四十四兩右髙九寸八分深八寸四分口縱二寸七分横三寸八分腹圍一尺八寸六分重八十三兩兩耳一鼻右髙九寸二分深九寸一分口縱二寸九分横三寸六分腹圍一尺七寸八分重五十三兩兩耳右髙一尺一寸一分深九寸八分口徑三寸七分腹圍二尺三寸六分重一百三兩兩耳連環右髙九寸七分深八寸九分口徑三寸八分腹圍二尺二寸九分重一百五十一兩兩耳連環金銀錯右髙九寸三分深八寸二分口徑三寸六分腹圍二尺重一百四十七兩兩耳西清古鑑卷十九
