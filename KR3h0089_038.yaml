body:
  text: 西清古鑑卷三十五盦漢螭耳盦一螭耳盦二螭耳盦三獸耳盦盤雲盦素盦鐎斗漢龍首鐎斗一龍首鐎斗二龍首鐎斗三龍首鐎斗四鳧首鐎斗如意鐎斗熊足鐎斗素鐎斗一素鐎斗二奩漢帶紋奩雲紋奩叨餮奩夔龍奩一夔龍奩二獸環奩一獸環奩二罐漢澡豆罐一澡豆罐二澡豆罐三臼漢雙螭臼右通蓋髙四寸深二寸二分口縱四寸三分橫六寸腹圍一尺八寸重三十五兩鐘鼎欵識有卭仲盦銘曰自作饙盦博古圗有交虬盦缺蓋此則蓋器全而紋鏤類漢人物又兩耳博古圗謂便於提㩦也右通蓋髙四寸深二寸一分口縱四寸二分橫五寸七分腹圍一尺七寸六分重四十二兩右通蓋髙四寸四分深二寸五分口縱四寸五分橫六寸一分腹圍一尺八寸五分重四十七兩右通蓋髙二寸七分深一寸九分口縱三寸七分橫五寸腹圍一尺五寸二分重二十一兩右通蓋髙三寸五分深二寸七分口縱五寸一分橫六寸腹圍一尺八寸重四十五兩右髙二寸九分深二寸七分口縱四寸七分橫五寸六分腹圍一尺六寸八分重二十七兩缺蓋右髙四寸七分深二寸三分口徑五寸一分腹圍一尺三寸七分重六十七兩有流有柄三足鐎斗為溫器與刁斗晝炊夜擊者異洞天清録謂刁斗無足鐎斗有足是也右髙五寸三分深二寸三分口徑五寸五分腹圍一尺三寸三分重四十三兩有流有柄三足右髙四寸五分深二寸二分口徑四寸四分腹圍一尺一寸四分重四十四兩有流有柄三足右髙二寸五分深二寸二分口徑五寸腹圍一尺二寸三分重二十五兩有柄三足右通蓋髙四寸深一寸六分口徑三寸五分腹圍九寸一分重二十兩有流有柄三足右髙五寸二分深二寸三分口徑五寸二分腹圍一尺二寸七分重四十二兩有柄三足右通蓋髙四寸二分深三寸一分口徑二寸四分腹圍一尺四寸七分重三十三兩有流有柄三足右通蓋髙三寸五分深二寸六分口徑二寸八分腹圍一尺四寸四分重二十七兩有流有柄三足右通蓋髙四寸五分深三寸三分口徑二寸二分腹圍一尺五寸七分重三十六兩有流有柄三足右通蓋髙六寸二分深五寸口徑三寸七分腹圍一尺二寸四分重三十八兩有提梁與博古圗連環攜奩同博古圗謂奩蓋閨房脂澤之具然考晉書天文志譬如覆奩云云唐書裴諗傳宣宗取御奩果以賜又唐人詩金奩調上藥及寶奩拋擲久皆不専指閨房物為言是亦盦盫之類凡盛物者總名耳右髙四寸深三寸四分口徑三寸三分腹圍一尺二寸四分重三十一兩右通蓋髙一尺二分深八寸口徑三寸七分腹圍一尺五寸三分重一百二十三兩右髙九寸一分深八寸六分口徑三寸六分腹圍二尺一寸五分重一百九十三兩右髙六寸深五寸七分口徑三寸二分腹圍九寸八分重三十七兩右髙四寸九分深四寸一分口徑七寸三分腹圍二尺二寸九分重八十兩右髙四寸八分深四寸三分口徑六寸八分腹圍二尺一寸七分重八十一兩按此并前一器俱與博古圗四神奩同右通蓋髙二寸四分深一寸八分口徑一寸三分腹圍七寸七分重八兩按陶𢎞景十賚文有賚爾鍮石澡罐之語蓋盥潄所需也右髙二寸八分深二寸三分口徑一寸四分腹圍六寸二分重六兩右髙一寸六分深一寸四分口徑一寸二分腹圍四寸九分重六兩右髙四寸深三寸三分口徑三寸三分腹圍一尺一寸七分重八十七兩按臼之名自易稱臼杵之利已有之此器蓋後世物虀臼茶臼之類耳西清古鑑卷三十五
