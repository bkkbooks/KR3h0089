body:
  text: 西清古鑑卷三十四量漢嘉量有銘區漢長區有銘鍾漢食官鍾一有銘食官鍾二有銘食官鍾三有銘永建鍾有銘斗漢純素方斗瓿周䕫龍瓿蟠䕫瓿蟠虺瓿蟠虬瓿饕餮瓿一饕餮瓿二䕫文瓿蠶紋瓿山紋瓿獸鼻瓿繩耳瓿素瓿漢獸環瓿一獸環瓿二獸環瓿三獸環瓿四獸環瓿五獸環瓿六獸環瓿七獸耳瓿一獸耳瓿二獸耳瓿三獸耳瓿四三鷹瓿山紋瓿星紋瓿素瓿一素瓿二素瓿三素瓿四缶周素缶右斛斗升合蘥凡五統曰量為一器合今尺通髙八寸二分通濶一尺六寸五分斛深七寸二分徑一尺四分斗深七分有二徑與斛同升深一寸八分有一徑二寸一分合深七分有二徑一寸一分蘥深三分有六徑一寸蓋莽尺每一尺當今七寸二分通重三百六十三兩王莽篡漢號曰新其偽詔曰予伏念皇初祖考黄帝皇始祖考虞帝此銘首四語是也嵗在大梁龍集戊辰則居攝之三年改元初始戊辰直定則始篡之日按漢書以戊辰直定御王冠顔師古注謂其日當定則猶言定日也莽妄稱火徳銷盡土徳當代故言據土徳其曰改正建丑蓋莽以戊辰十二月朔癸酉為建國元年正月之朔也又漢書莽䇿羣司有曰白煒象平考量以銓考其時為建國元年今銘云龍在己巳嵗次實沈適合葢銘詞先敘其簒位之始而制器則建國元年也大梁昴星季春之月實沈商星孟夏之月故戊辰曰嵗在大梁己巳曰嵗次實沈皆嵗星所在也周禮㮚氏為量銘曰嘉量既成以觀四國而此器亦名嘉量莽假周禮以愚惑天下於此亦見又據黄鐘之律積龠為合積合為升以至於斛居然有虞氏之制度故曰律嘉量也庣旁云云庣吐彫切廣韻不滿之貌莽為漢臣而盜竊名號至於改正朔異器制其銘詞曰初班天下萬國永遵子子孫孫享𫝊億年與秦一世二世𫝊之萬世者同一妄誕今採入圗録不書新而仍銘之曰漢亦春秋遺意耳右髙六寸九分深五寸二分口徑二寸一分腹縱七寸二分横三寸二分重五十兩兩耳有環左氏傳齊舊四量豆區釡鍾杜預注四豆為區容十六升而此銘曰長區容一斗蓋自春秋至漢制之廣狹已不侔矣右髙一尺三寸九分深一尺一寸六分口徑六寸腹圍三尺五寸二分重三百二十七兩兩耳有環周禮膳夫注食官之長又國語工商食官注謂周禮府藏皆有賈人以知物價食官禀之食官之名始此而毛詩箋古者貨貝五貝為朋漢書食貨志大貝四寸以上二枚為一朋直二百一十六此銘一朋蓋其直也下識云五十斤四兩按律厯志三百八十四銖為一斤合易二篇之爻又十六兩成斤者四時成四方之象也則斤為十六兩古今所同此五十斤四兩當為八百四兩今權重三百二十七兩則漢之毎百兩今四十兩六錢七分有竒也右尺度輕重俱同前銘缺五字右髙一尺三寸七分深一尺二寸五分口徑五寸二分腹圍三尺四寸二分重三百四十兩兩耳有環製與前器同銘亦云重五十斤而今權重三百四十兩則漢之每百兩今又為四十二兩五錢矣與前二鍾異按三才圗㑹載漢薫罏重一斤三兩銘云重五斤六兩以今權較之三兩十二銖八絫有竒當漢之一斤觀此器則六兩一十九銖二絫當漢一斤矣與圗㑹亦弗合右髙一尺一寸四分深八寸六分口徑四寸四分腹圍二尺四寸六分重一百二十七兩兩耳有環銘云永建元年則東漢順帝紀元也右髙四寸七分深四寸口徑五寸九分足徑三寸六分重六十六兩按許氏説文斗大升也此與飲器自别右髙八寸一分深七寸九分口徑五寸一分腹圍二尺九寸五分重一百五十三兩按爾雅釋器甌瓿謂之瓵戰國䇿有壺醯瓿醬之語漢書顔師古注曰瓿小甖也博古圗謂以具醯醢臡醬其制亦不一大率為食器耳又揚子方言大者謂之甀中者謂之瓿甊至於小口為瓿則前人已辨之矣右髙一尺七寸四分深一尺五寸口徑七寸七分腹圍五尺一寸重九百七兩右髙八寸七分深八寸三分口徑六寸五分腹圍三尺六寸五分重一百八十七兩右髙九寸三分深八寸八分口徑五寸五分腹圍三尺六分重一百八十七兩右髙七寸八分深六寸三分口徑六寸四分腹圍三尺一分重一百六十九兩右髙六寸三分深五寸七分口徑七寸五分腹圍三尺一寸九分重一百一十五兩右髙九寸九分深九寸四分口徑七寸六分腹圍四尺二分重二百五十九兩右髙一尺一分深一尺口徑五寸五分腹圍三尺一寸二分重一百九十一兩右髙六寸六分深五寸八分口徑六寸腹圍三尺五寸七分重一百六十五兩右髙八寸六分深六寸五分口徑八寸腹圍三尺四寸七分重二百一十一兩右髙一尺五寸七分深一尺三寸三分口徑七寸八分腹圍四尺三寸二分重六百八十三兩右髙一尺六分深一尺口徑五寸九分腹圍三尺二寸九分重三百七十九兩右髙一尺四寸一分深一尺三寸口徑六寸五分腹圍四尺二寸七分重六百六十一兩右髙一尺一寸九分深一尺一寸六分口徑六寸五分腹圍三尺五寸五分重二百三兩右髙九寸一分深七寸九分口徑四寸四分腹圍二尺三寸七分重一百五十五兩右髙六寸九分深五寸九分口徑三寸四分腹圍一尺二寸三分重七十三兩右髙五寸八分深五寸一分口徑三寸五分腹圍一尺九寸八分重五十四兩右髙六寸三分深五寸八分口徑二寸六分腹圍一尺六寸六分重三十八兩右髙五寸一分深四寸五分口徑二寸八分腹圍一尺九寸四分重三十一兩右髙一尺二分深八寸七分口徑五寸二分腹圍二尺六寸八分重一百五十九兩右髙五寸三分深四寸五分口徑四寸八分腹圍二尺九分重四十八兩右髙四寸八分深四寸四分口徑四寸腹圍一尺九寸六分重四十七兩右髙四寸六分深四寸四分口徑二寸三分腹圍一尺二寸一分重三十五兩右髙四寸八分深四寸口徑四寸二分腹圍二尺重五十一兩右髙六寸七分深五寸九分口徑五寸九分腹圍三尺四寸重一百四十九兩右髙七寸四分深六寸一分口徑三寸五分腹圍一尺八寸八分重七十二兩右髙七寸三分深六寸九分口徑四寸五分腹圍二尺三寸八分重一百一十三兩有流右髙七寸一分深六寸九分口徑四寸二分腹圍二尺三寸五分重一百一十三兩右髙四寸六分深四寸五分口徑二寸一分腹圍一尺二寸重二十五兩右髙五寸九分深五寸六分口徑三寸三分腹圍一尺九寸重六十三兩右通蓋髙八寸二分深六寸五分口徑二寸八分腹縱五寸五分横九寸六分重一百二十八兩兩耳連環按缶製大腹而斂口可以節樂可以盛酒漿爾雅疏謂是瓦器而禮器五獻之尊門外缶門内壺是缶尊彛之類又小爾雅釡二有半謂之藪藪二有半謂之缶缶二謂之鍾是缶亦量屬與豆區釡鍾同合二説與兹器觀之則缶製固不得専屬之陶人矣西清古鑑卷三十四
