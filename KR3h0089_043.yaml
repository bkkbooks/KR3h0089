body:
  text: 西清古鑑卷四十鑑二漢海獸蒲萄鑑一海獸蒲萄鑑二海獸蒲萄鑑三海獸蒲萄鑑四海獸蒲萄鑑五海獸蒲萄鑑六海獸蒲萄鑑七海獸蒲萄鑑八海獸蒲萄鑑九海獸蒲萄鑑十海獸蒲萄鑑十一海獸蒲萄鑑十二海獸蒲萄鑑十三海獸蒲萄鑑十四海獸蒲萄鑑十五海獸蒲萄鑑十六海獸蒲萄鑑十七海獸蒲萄鑑十八海獸蒲萄鑑十九海獸蒲萄鑑二十海獸蒲萄鑑二十一海獸蒲萄鑑二十二海獸蒲萄鑑二十三海獸蒲萄鑑二十四海獸蒲萄鑑二十五海獸蒲萄鑑二十六海獸蒲萄鑑二十七海獸蒲萄方鑑鸞獸蒲萄鑑一鸞獸蒲萄鑑二鸞獸蒲萄鑑三鸞獸蒲萄鑑四龍鳳蒲萄鑑一龍鳳蒲萄鑑二雲龍鑑有銘純素鑑唐十二辰鑑一有銘十二辰鑑二有銘四神鑑一有銘四神鑑二四神鑑三有銘四乳鑑雙鸞鑑一雙鸞鑑二雙鸞鑑三雙鸞鑑四雙鸞鑑五雙鸞鑑六舞鳳狻猊鑑鳳馬鑑福祿鑑瑞獸鑑一瑞獸鑑二雙龍鑑雙魚鑑雲濤鑑鸞鳳花枝鑑鳬雁花枝鑑雀繞花枝鑑六花鑑寶相花鑑一寶相花鑑二寶相花鑑三寶相花鑑四寶相花鑑五寶相花鑑六寶相花鑑七寶相花鑑八重輪鑑一重輪鑑二方鑑徑四寸二分重二十二兩背作海獸四外輪列蝶鳥形俱環以結枝蒲萄花邉獸鼻無銘按漢武帝通西域得蒲萄種之上林苑以夸示外國故漢鑑多有此形製應亦是尚方鑄也今內府所藏甚夥與博古圖所載亦相吻合擇其尤佳者志之徑七寸重一十七兩有半背作海獸五外輪列十二屬環以結枝蒲萄花邉素鼻無銘按軒轅內傳帝鑄鏡十二隨日用之云云則是合地支之數故後世多列地支及十二相形於鏡如前尚方二鑑神人鑑及此鑑皆是蓋仿古制非臆造也徑三寸九分重一十八兩背作海獸五外輪列禽蝶草蟲形俱環以結枝蒲萄流雲邉獸鼻無銘徑二寸四分重五兩背作海獸五外輪並作結枝蒲萄素邉獸鼻無銘徑三寸六分重一十四兩有半背作海獸五外輪列羣鳥形俱環以結枝蒲萄素邉獸鼻無銘徑三寸一分重八兩背作海獸形外輪列蝶鳥形俱環以結枝蒲萄花邉獸鼻無銘徑三寸八分重一十七兩有半背作海獸四外輪列羣鳥形俱環以結枝蒲萄花邉獸鼻無銘徑三寸重八兩有半背作海獸四外輪列羣鳥形俱環以結枝蒲萄花邉獸鼻無銘徑三寸五分重一十八兩背作海獸五外輪列羣鳥形俱環以結枝蒲萄素邉獸鼻無銘徑四寸重二十一兩有半背作海獸大小凡七又鳥形一外輪並列羣鳥形俱環以結枝蒲萄花邉獸鼻無銘徑三寸七分重一十三兩有半背作海獸四外輪列鳥獸形俱環以結枝蒲萄素邉素鼻無銘徑三寸八分重一十九兩有半背作海獸四外輪列羣鳥形俱環以結枝蒲萄素邉素鼻無銘徑四寸四分重二十四兩背作海獸五外輪列羣鳥形俱環以結枝蒲萄垂雲邉獸鼻無銘徑四寸二分重一十五兩背作海獸六外輪列羣鳥形俱環以結枝蒲萄流雲邉獸鼻無銘徑四寸二分重一十三兩背作海獸六外輪列鳥獸形俱環以結枝蒲萄花邉獸鼻無銘徑三寸七分重一十九兩有半背作海獸四外輪列蝶鳥形俱環以結枝蒲萄花邉獸鼻無銘徑四寸六分重二十五兩背作海獸六外輪列鳥獸形俱環以結枝蒲萄垂雲邉獸鼻無銘徑四寸四分重二十六兩有半背作海獸五外輪列羣鳥形俱環以結枝蒲萄垂雲邉獸鼻無銘徑五寸五分重五十兩背作海獸六外輪列鳥獸形俱環以結枝蒲萄花邉獸鼻無銘徑四寸二分重二十兩背作海獸五外輪列羣鳥形俱環以結枝蒲萄垂雲邉獸鼻無銘徑五寸四分重三十七兩背作海獸六外輪列禽蝶草蟲形俱環以結枝蒲萄花邉獸鼻無銘徑六寸三分重六十三兩背塗金作海獸六外輪列鳥獸蟲蝶形俱環以結枝蒲萄流雲邉獸鼻無銘徑三寸七分重一十三兩有半背作海獸四與海燕相間外輪列禽蝶草蟲形俱環以結枝蒲萄垂雲邉獸鼻無銘徑五寸二分重三十九兩有半背作海獸四外輪列鳥獸形俱環以結枝蒲萄花邉獸鼻無銘徑四寸六分重二十五兩銖背作海獸六外輪列禽蝶草蟲形俱環以結枝蒲萄花邉獸鼻無銘徑三寸重九兩有半背作海獸四外輪列羣鳥形俱環以結枝蒲萄垂雲邉獸鼻無銘徑三寸九分重一十六兩背作海獸四外輪列蝶鳥形俱環以結枝蒲萄垂雲邉獸鼻無銘徑三寸六分重二十兩背作海獸凡四外輪列羣鳥形俱環以結枝蒲萄素邉獸鼻無銘徑五寸二分重二十七兩有半背作鸞二海獸四外輪列禽蝶草蟲形俱環以結枝蒲萄流雲邉獸鼻無銘徑五寸二分重三十一兩背作鸞二海獸四外輪列禽蝶草蟲形俱環以結枝蒲萄流雲邉獸鼻無銘徑七寸重九十六兩背作鸞二海獸六外輪列鳥獸蟲蝶形俱環以結枝蒲萄流雲邉素鼻無銘徑七寸重九十六兩背作鸞二海獸六外輪列鳥獸蟲蝶形俱環以結枝蒲萄流雲邉獸鼻無銘徑五寸二分重四十兩背作龍鳳各二外輪列鳥獸形俱環以結枝蒲萄流雲邉獸鼻無銘徑五寸三分重三十二兩背作龍鳳各二外輪列鳥獸形俱環以結枝蒲萄流雲邉獸鼻無銘徑三寸四分重十兩背作龍躍天池之狀間以朵雲素邉素鼻欵識可識者五字徑六寸六分重二十八兩無銘博古圖亦載此鑑徑八寸一分重一百一十二兩背塗金作海獸八外輪具十二屬流雲邉素鼻銘四十八字徑五寸一分重一十七兩有半背作十二乳列地支十二字外輪作八乳間列鳥獸形花邉素鼻徑八寸重六十兩背作四神形外輪具十二屬流雲邉素鼻銘三十二字形制紋縷與博古圖武德鑑合徑四寸九分重三十三兩背作四神形素邉素鼻無銘徑八寸重二十七兩背作四神形外重輪四道第一輪內具十二屬次具八卦間以寶相花又次具二十八宿又次為銘文素邉獸鼻銘五十四字徑五寸七分重一十七兩有半背作四乳重輪外具瑞草凡四葵花邉圈鼻無銘徑四寸六分重一十九兩有半菱花式背作雙鸞銜珠之狀間以流雲花枝邉具芝草蛺蝶素鼻無銘徑六寸五分重二十八兩十六銖葵花式背作雙鸞從以四鳥邉具雲鳥花蝶之屬素鼻無銘徑五寸二分重一十五兩葵花式背作雙鸞上一鳥銜綬帶下為花枝素邉素鼻無銘徑四寸二分重九兩葵花式背作雙鸞銜綬帶上為雲下列鳥一花蝶邉素鼻無銘徑五寸八分重二十四兩葵花式背作雙鸞間以花朵花蝶邉素鼻無銘徑五寸八分重二十二兩葵花式背作雙鸞上一鳥銜綬帶下為山雲花蝶邉素鼻無銘徑七寸二分重六十四兩菱花式背作舞鳳狻猊各二間以折枝花邉具花蝶蟲鳥之屬獸鼻無銘與博古圖鳳馬鑑合按爾雅注狻猊即獅子出西域又穆天子傳狻猊野馬走五百里則狻猊亦可云馬故舊圖謂之鳳馬鑑也徑八寸重九十六兩菱花式背作雙鳳又馬形二間以旋紋花邉具花蝶蟲鳥之屬素鼻無銘與博古圖所載合徑七寸重二十九兩葵花式背作雙鹿又蝙蝠二蓋取義福祿亦祈祝語也上下並具花草蜂蝶之屬素邉素鼻無銘徑四寸三分重一十一兩菱花式背作狻猊用端各二花蝶邉素鼻無銘徑四寸三分重一十五兩菱花式背作狻猊用端各二花蝶邉素鼻無銘徑四寸重十兩背作雙龍間以流雲素邉素鼻無銘徑六寸重八十兩背作雙魚逰泳之狀素邉素鼻無銘徑五寸六分重一十九兩有半背作波濤外列山雲間以羣獸凡十有四花鼻無銘徑七寸三分重一百一十二兩背作鸞鳳各二間以折枝花外輪並具花鳥之狀流雲邉素鼻無銘徑三寸一分重五兩菱花式背作鳬雁各二間以折枝花花蝶邉素鼻無銘徑四寸重一十七兩有半菱花式背作飛雀四間以旋紋花花蝶邉素鼻無銘徑八寸重五十七兩背周遭作折枝花內外各六流雲邉素鼻無銘徑六寸重二十兩葵花式背作花朵凡六素邉素鼻無銘徑四寸三分重八兩八銖背作花朵凡六素邉素鼻無銘徑四寸重一十七兩菱花式背作花朵正側各四雲蝶邉獸鼻無銘徑七寸重五十七兩菱花式背作花朵一外環繞凡八垂雲邉花鼻無銘徑六寸一分重二十一兩葵花式背作花朵凡六素邉素鼻無銘徑五寸七分重一十六兩背作折枝花凡四素邉素鼻無銘徑五寸七分重一十八兩葵花式背作折枝花凡四素邉素鼻無銘徑五寸二分重二十二兩菱花式背作花朵間以垂雲花蝶邉素鼻無銘徑二寸五分重七兩有半背作重輪素邉素鼻無銘徑三寸四分重七兩背作重輪素邉素鼻無銘徑四寸二分重一十八兩素邉素鼻無銘
