body:
  text: 西清古鑑卷二十九簠周季高簠有銘鑄公簠一有銘鑄公簠二有銘孟薑簠有銘餗簠有銘蟠虺簠一蟠虺簠二蟠夔簠一蟠夔簠二蟠夔簠三蟠夔簠四蟠夔簠五蟠螭簠環紋簠雷紋簠有銘獸耳簠簋周孌姬簋有銘孫簋有銘苗簋有銘鋚簋有銘盤雲簋雲紋簋弦紋簋豆周百獸豆雷紋豆星紋豆粟紋豆帶紋豆弦紋豆一弦紋豆二弦紋豆三弦紋豆四弦紋豆五弦紋豆六弦紋豆七弦紋豆八弦紋豆九弦紋豆十輔耳豆素豆有銘鋪周旅鋪鏊漢提鏊右高二寸五分深一寸六分口縱七寸二分橫八寸八分重五十三兩兩有妘即妘祝融之後姓也古有宗婦謂國君同宗之婦季高父乃公族故稱婦妘為宗妘即宗婦也媵簠二字不見於經儀禮主人媵爵於賓注先飲一爵後一爵從之也又有媵觚然則媵簠與媵爵義正同可以參互而得右高三寸一分深一寸八分口縱七寸五分橫九寸四分重七十六兩兩耳有周鑄鼎亦名曰公蓋周人殁而稱公鑄雖小國此祭器亦得稱公也右高三寸深一寸八分口縱七寸六分橫九寸三分重七十九兩兩耳與前器同銘字稍剝落然一時作也右高二寸六分深一寸七分口縱七寸橫八寸七分重八十五兩兩耳銘稱孟薑簠古者男子稱氏婦人稱姓又多以孟仲叔季為稱之次詩之孟薑孟弋傳之仲子叔姬叔隗季隗是也宋趙明誠家藏有孟薑盥匜稱孟薑與此同右高三寸二分深一寸九分口縱六寸一分橫九寸七分重八十七兩兩耳四足按卿雲之歌第二章曰明明上天爛然星陳銘稱星陳蓋本此曰不敢般康則敬共夙夜之意餗糝也周禮天官醢人糝食注糝食菜餗蒸簠簋皆薦食器故云餗應與鼎餗同義字從鐘鼎欵識所載許子鐘寅簋釋作無考右高三寸二分深二寸一分口縱七寸二分橫八寸九分重七十一兩兩耳右高三寸三分深二寸一分口縱七寸橫八寸八分重六十七兩兩耳右高三寸四分深二寸二分口縱七寸三分橫九寸一分重六十五兩兩耳右高二寸九分深一寸九分口縱七寸三分橫九寸重六十五兩兩耳右高三寸三分深二寸二分口縱七寸三分橫八寸九分重五十三兩兩耳右高二寸九分深二寸口縱六寸九分橫八寸七分重五十九兩兩耳右高二寸八分深一寸九分口縱六寸五分橫八寸三分重六十五兩兩耳右高三寸八分深二寸四分口縱七寸八分橫九寸四分重一百三兩兩耳右高三寸七分深二寸四分口縱七寸三分橫一尺一寸重二百一十九兩兩耳四足右高二寸九分深一寸五分口縱五寸六分橫七寸五分重五十七兩兩耳右高二寸深一寸三分口縱六寸一分橫八寸六分重二十九兩兩耳右高三寸一分深二寸六分口縱五寸七分橫七寸一分重七十五兩兩耳文當左旋讀仲蓋其字曰仲伯所謂冠字也檀弓謂五十以伯仲是已孌姬詩思孌季女逝兮孌美稱也簋為食器曰旅簋非一器矣右高四寸二分深二寸七分口縱五寸一分橫六寸九分重八十兩兩耳四足右通蓋高五寸五分深三寸口縱五寸六分橫七寸八分重一百三十一兩兩耳按苗晉地楚鬭椒之子賁皇奔晉晉人與之苗以為謀主後稱苖賁皇以地為姓事在魯成公十六年此簋銘曰苗蓋其姓耶右高四寸四分深三寸口縱六寸橫七寸九分腹圍二尺六寸重一百一十兩兩耳字從鐘鼎欵識釋作鋚始鼎銘有曰考曰鋚之語蓋人名耳石鼓文亦有此字右通蓋高四寸四分深二寸九分口縱三寸九分橫四寸六分重四十六兩四足右高三寸四分深二寸三分口縱四寸三分橫六寸六分重九十九兩兩耳右通蓋高四寸七分深三寸六分口縱六寸三分橫七寸四分重九十五兩右通蓋高六寸七分深三寸口徑五寸三分足徑三寸四分重六十三兩右通蓋高七寸二分深三寸一分口徑五寸四分足徑三寸四分重七十五兩右通蓋高七寸七分深二寸七分口徑五寸七分足徑三寸四分重五十一兩右通蓋高六寸二分深二寸七分口徑四寸九分足徑二寸九分重四十一兩右通蓋高四寸四分深二寸六分口徑五寸九分重四十五兩缺足右通蓋高九寸六分深三寸口徑五寸一分足徑五寸二分重一百四十九兩右通蓋高九寸六分深三寸一分口徑五寸二分足徑五寸一分重一百八十三兩右通蓋高八寸深二寸七分口徑五寸足徑三寸八分重一百九兩右通蓋高八寸二分深二寸九分口徑五寸足徑四寸七分重一百四十一兩右通蓋高六寸八分深三寸二分口徑五寸一分足徑四寸七分重一百三兩右通蓋高九寸六分深三寸三分口徑五寸一分足徑五寸二分重一百五十一兩右通蓋高九寸一分深三寸口徑五寸五分足徑五寸一分重一百五十三兩右通蓋高八寸深三寸口徑五寸足徑四寸四分重八十五兩右高五寸四分深二寸四分口徑五寸四分足徑四寸重四十八兩缺蓋右高二寸九分深二寸六分口徑六寸重七十五兩缺足右高五寸八分深三寸五分口徑六寸八分足徑三寸六分重一百一十一兩缺蓋右通蓋高七寸三分深三寸口徑五寸二分足徑四寸重七十六兩銘字不類刻鑄蓋後人偽作顧此器色澤黤湛實三代物不得以贋欵棄之也右高五寸二分深一寸四分口徑七寸四分重八十四兩銘首一字不可識德即或其名禮圖謂之豐意取象形博古圖據銘曰鋪右高三寸五分盤深一寸一分口徑五寸五分三足各長二寸二分重四十八兩雙提連環銀錯按鏊有二音一為中召切音􅀈燒器也一為牛刀切音敖釡屬也義本相同兹器如盤而有足蓋古人煎熬所用或云用以煎餅廣韻所謂餅鏊是也西清古鑑卷二十九
