body:
  text: 西清古鑑卷十尊三周從尊有銘旅尊一有銘旅尊二有銘旅尊三有銘亞尊一有銘亞尊二有銘亞尊三有銘亞尊四有銘亞尊五有銘亞尊六有銘亞尊七有銘亞尊八有銘寳尊一有銘寳尊二有銘格刀尊有銘執木尊有銘䕫龍尊有銘雲龍尊鳯文尊有銘虬紋尊有銘鱗紋尊有銘獸鼻尊一有銘獸鼻尊二饕餮尊一有銘饕餮尊二饕餮尊三饕餮尊四饕餮尊五饕餮尊六饕餮尊七饕餮尊八饕餮尊九饕餮尊十饕餮尊十一饕餮尊十二饕餮尊十三饕餮尊十四饕餮尊十五饕餮尊十六獸環尊獸耳尊右高五寸七分深四寸七分口徑四寸九分腹圍一尺一寸五分重三十二兩銘首二字末一字俱不可識祭器皆有從即周禮所謂貳也右高五寸六分深四寸九分口徑五寸三分腹圍一尺四寸二分重五十一兩右高五寸三分深四寸六分口徑五寸一分腹圍一尺三寸二分重三十九兩右高五寸九分深五寸口徑五寸五分腹圍一尺一寸七分重四十三兩右通蓋高二尺二分深一尺三寸五分口縱四寸三分横五寸五分腹圍三尺八分重四百一十一兩金銀錯右通蓋高八寸七分深五寸二分口縱三寸四分横四寸腹圍一尺八寸三分重一百一十三兩右高一尺三分深七寸四分口徑六寸八分腹圍一尺四寸重五十九兩右高一尺二寸七分深一尺一寸三分口縱三寸四分横四寸四分腹圍二尺二寸二分重二百七十九兩右高七寸四分深六寸一分口徑五寸八分腹圍一尺一寸二分重五十一兩右高八寸九分深六寸四分口徑七寸一分腹圍一尺三寸九分重九十五兩右高八寸一分深六寸六分口徑六寸二分腹圍一尺二寸五分重六十三兩右高二尺二寸七分深一尺七寸三分口徑一尺一寸二分腹圍一尺四寸重八百四十三兩右高七寸四分深五寸八分口縱五寸五分横六寸七分腹圍一尺四寸重六十三兩右高五寸五分深四寸九分口徑五寸五分腹圍一尺三寸八分重四十五兩右高一尺深八寸七分口縱四寸二分横四寸九分腹圍二尺重一百五十五兩凡作戈刀形者皆以銘武功此楊氏說也或謂即詩稱執其鸞刀之意於祭義亦得右高八寸一分深六寸口徑六寸三分腹圍一尺六分重五十三兩右高一尺五寸一分深一尺一寸三分口徑九寸二分腹圍一尺六寸四分重三百七十一兩右高一尺一寸深九寸五分口徑六寸一分腹圍二尺六寸五分重一百九十九兩右通蓋高六寸二分深三寸八分口縱三寸一分横四寸二分腹圍一尺五寸七分重六十七兩銘作旅彞三字他器所同首一字後人刻畫為之膚理淺陋非原鑄也右高七寸深五寸七分口徑六寸三分腹圍一尺二寸九分重四十七兩右通蓋高七寸五分深五寸六分口縱二寸三分横二寸九分腹圍一尺三寸七分重四十九兩右高七寸一分深五寸七分口徑七寸三分腹圍一尺七寸七分重八十七兩銘疑象形不可識右高四寸六分深三寸一分口徑五寸五分腹圍一尺三寸一分重三十六兩右高八寸五分深六寸四分口徑六寸五分腹圍一尺二寸七分重七十九兩銘字不可識右高一尺五寸六分深一尺三寸九分口縱五寸横六寸三分腹圍三尺一寸一分重四百二十七兩右高一尺二寸八分深一尺一寸二分口縱四寸五分横五寸六分腹圍二尺二寸七分重一百七十一兩右高一尺六分深七寸七分口徑七寸四分腹圍一尺五分重九十七兩右高一尺一分深九寸口縱三寸横四寸腹圍二尺一寸六分重二百三兩右高一尺二分深七寸五分口徑七寸二分腹圍一尺七分重一百一十一兩右高八寸六分深六寸四分口徑六寸五分腹圍一尺二寸八分重七十五兩右高八寸九分深六寸九分口徑六寸七分腹圍一尺三寸五分重八十五兩右高八寸一分深六寸口徑六寸一分腹圍一尺一寸六分重四十七兩右高八寸深六寸六分口徑六寸二分腹圍一尺二寸七分重六十九兩右高七寸六分深六寸二分口徑六寸腹圍一尺一寸重五十三兩右高七寸一分深五寸八分口徑七寸四分腹圍一尺七寸七分重六十七兩右高六寸九分深四寸三分口徑四寸二分腹圍一尺一寸五分重五十九兩右高六寸七分深五寸三分口徑五寸四分腹圍九寸八分重三十一兩右高五寸一分深四寸一分口徑五寸一分腹圍一尺二寸重三十九兩右高四寸九分深四寸一分口徑四寸二分腹圍一尺一寸八分重二十七兩右高四寸一分深三寸四分口徑一寸六分腹圍五寸重十七兩右高三寸三分深二寸八分口縱一寸横一寸五分腹圍四寸六分重八兩西清古鑑卷十
