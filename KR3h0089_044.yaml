body:
  text: 臣等於乾隆己巳冬奉敇纂輯西清古鑑每一卷書成輒恭呈㸃定閲二歳歳在辛未夏五月是編告竣奉㫖付剞劂氏臣等拜手稽首颺言於簡末曰古人制器或以竹或以木或以陶其貴者以玉而金為㝡夀顧秦人銷金之後三代物絶不復見其藏於土中者猶未出故漢唐諸儒莫可得而攷鄭康成杜子春孔頴逹諸賢非不貫穿六籍而目不經見其立説悉無所依據如犧尊之制至魏時魯郡地中得齊大夫公子尾送女器作犧牛形又晉永嘉中曹嶷於青州齊景公冡中得二尊亦肖為牛象梁劉杳始據此闢康成畫鳳凰尾之説則其他可類推也後世陵谷遷移經五代六朝而後古器漸出於叢祠廢瘞中好事者至鑿山沈淵以求之於是彞鼎尊罍之屬徃徃表見於世顧宋初如聶崇義三禮圖王洙禮器圖則並未嘗目覩而命名取義直欲以己意揣摩於故紙堆中固宜其舛也宣和博古圖則實有是器而為之圖與説然其中亦多有考据失實者如文王鼎銘之魯公乃伯禽也而謂之周公晉姜鼎銘之文侯乃文侯仇也而謂之文公重耳漢定陶鼎銘之定陶乃定陶共王康也而謂之趙共王恢王伯鼎銘曰王伯作寳鼎乃遽謂王伯者王之伯父夫伯叔甥舅之邦在王稱之則可豈有諸侯自名曰王之伯父者乎如髙克尊謂髙克為周末衛文公時人而不知又有鄭之髙克見毛詩序與左傳至於立戈鼎之戈字釋其文以為我之字从戈者敵物之我則又沿王安石之字説而牽率附㑹加甚焉其分商周也毎齗齗於一二字以為斷夫十干之属古器多有之或以紀日或以差第其器類後世之標舉甲乙商與周所同也博古圖乃獨於立戈癸鼎謂是湯之父至癸則其無徴更明甚今此所編纂雖託權輿於博古一書而參互考訂則間折衷於歐陽修董逌黄伯思張掄薛尚功諸人之論説要其指歸皆原始於書傳更探討於形模色澤之間而世次先後固已昭然可覩蓋兢兢乎不敢臆説以逞以是為闕疑傳信云爾劉敞有言兑之戈和之弓離磬崇鼎三代傳以為寳非賴其用也亦云上古而已矣洪邁之言曰三代彞器其存至今者人皆寳為竒玩然自春秋以來固重之矣經傳所記郜大鼎吳夀夢之鼎莒之二方鼎齊之紀甗以及甲父之鼎襄鐘舒鼎鞶劍皆鄭重書之又况壺尊簠簋角斝敦彞悉宗廟享祀之用器以藏禮禮以辨義昔司馬遷作孔子世家謂觀其車服禮器低徊留之不能去今是書所録上溯有殷下逮唐室至近者亦千有餘年矣其器具在臚舉於圖可不謂之大觀者乎於以上供乙覽傳示來兹將三代以來名物象數咸犁然於心目之中是稱先則古之儀型而非藝圃詞林之縟也猗歟盛哉臣梁詩正臣蔣溥臣汪由敦臣嵇璜臣觀保臣裘曰修臣董邦逹臣金徳瑛臣王際華臣錢維城臣于敏中謹跋西清古鑑卷四十
