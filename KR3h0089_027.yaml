body:
  text: 西清古鑑卷二十四觚二周祖觚一有銘祖觚二有銘祖工觚有銘兄觚有銘仲觚有銘叔觚一有銘叔觚二有銘孫觚有銘側觚有銘甲觚有銘乙觚有銘子乙觚有銘丁乙觚有銘福觚一有銘福觚二有銘福觚三有銘象觚有銘象形觚有銘犧觚有銘雞觚有銘執木觚有銘亞觚一有銘亞觚二有銘亞觚三有銘亞觚四有銘立旂觚有銘雷紋觚一有銘雷紋觚二有銘雷紋觚三雷紋觚四雷紋觚五雷紋觚六雷紋觚七雷紋觚八雷紋觚九雷紋觚十雷紋觚十一雷紋觚十二雷紋觚十三雷紋觚十四雷紋觚十五雷紋觚十六雷紋觚十七雷紋觚十八雷紋觚十九雷紋觚二十雷紋觚二十一雷紋觚二十二右髙八寸四分深六寸一分口徑四寸五分重一十九兩右髙八寸一分深四寸八分口徑四寸二分重二十五兩上為立戈下作猛獸用紀武功詞不繁而意己見右髙八寸一分深五寸四分口徑四寸四分重三十二兩銘字祖工下為手執匕盖匕鬯皆主器者所執也右髙七寸二分深五寸一分口徑四寸四分重二十七兩銘曰日庚猶吉日庚午也按此則十干紀日之説益信而有徵矣右髙八寸八分深六寸四分口徑四寸七分重二十九兩右髙七寸八分深五寸五分口徑四寸六分重二十六兩右髙六寸七分深四寸六分口徑四寸一分重二十三兩右髙八寸三分深五寸一分口徑四寸七分重三十五兩右髙九寸一分深六寸三分口徑四寸八分重二十七兩側字從摭古遺文音釋葢主祭者自識其名耳右髙九寸深五寸八分口徑五寸一分重三十五兩古器銘難以一字為定然陶隠居刀劍録以銘一字曰甲遽指為夏孔甲是博古圖之前已有如此傅㑹者右髙九寸六分深六寸五分口徑五寸一分重三十六兩右髙五寸七分深三寸六分口徑三寸五分重一十三兩右髙八寸六分深六寸一分口徑四寸五分重三十一兩祖丁父乙兩稱丁乙葢紀日而曰祖曰父則其所祀也與商器自别右髙一尺二分深七寸一分口徑四寸九分重三十兩福字象形與前舉卣福字同右髙九寸二分深六寸二分口徑五寸二分重三十六兩右髙九寸七分深六寸一分口徑五寸四分重三十五兩右髙八寸一分深五寸三分口徑四寸七分重三十五兩周禮賓繼主君皆如主國之禮此賓主之主戴記主婦自東房又腥肆爓腍祭豈知神之所饗也主人自盡其敬而已矣此則主祭者皆謂之主又家主中霤國主社則以所祭為主矣此銘作象意同象尊曰主者葢指所祭言之也右髙九寸六分深六寸四分口徑五寸二分重三十九兩銘象形如猛獸與前欵異右髙九寸深五寸九分口徑五寸二分重二十七兩下一字不可識右髙七寸三分深五寸五分口徑四寸五分重二十九兩右髙一尺二分深六寸八分口徑五寸五分重二十九兩右髙六寸五分深四寸八分口徑四寸腹圍五寸四分重二十一兩銘曰丁曰已以干配干三代彞器多此類如丁甲鼎辛癸鼎皆是政不必疑巳為巳也右髙六寸四分深四寸三分口徑三寸九分重二十三兩右髙八寸二分深五寸五分口徑五寸一分重三十五兩右髙七寸九分深五寸一分口徑四寸六分重三十三兩右髙九寸七分深六寸六分口徑四寸九分重二十七兩右髙八寸七分深五寸七分口徑五寸五分重三十三兩右髙八寸八分深五寸六分口徑五寸二分重三十一兩銘字不可識右髙一尺一分深六寸九分口徑五寸四分重二十六兩右髙九寸二分深六寸五分口徑四寸六分重二十三兩右髙九寸深六寸一分口徑五寸三分重三十四兩右髙八寸六分深五寸五分口徑四寸八分重二十七兩右髙八寸三分深五寸二分口徑四寸七分重二十九兩右髙七寸九分深五寸二分口徑四寸六分重二十五兩右髙七寸八分深五寸三分口徑四寸七分重一十八兩右髙七寸八分深五寸三分口徑四寸七分重一十九兩右髙七寸八分深五寸三分口徑四寸五分重一十六兩右髙七寸七分深五寸口徑四寸四分重二十三兩右髙七寸七分深五寸口徑四寸七分重二十九兩右髙七寸七分深五寸二分口徑四寸五分重二十二兩右髙六寸七分深四寸二分口徑四寸重一十七兩金銀錯右髙七寸六分深五寸二分口徑三寸八分重一十五兩右髙七寸三分深四寸八分口徑四寸三分重二十二兩右髙七寸深四寸七分口徑四寸一分重一十七兩右髙六寸六分深四寸六分口徑四寸一分重二十兩右髙五寸九分深四寸一分口徑四寸一分重四十七兩右髙五寸一分深三寸六分口徑三寸三分重一十三兩右髙二寸九分深如之口徑二寸二分重五兩有半闕厎西清古鑑卷二十四
