body:
  text: 西清古鑑卷十七卣三周鳯文卣一有銘鳯文卣二有銘夔鳯卣一有銘夔鳯卣二有銘素梁卣有銘風紋卣雷紋卣叨餮卣一有銘叨餮卣二有銘叨餮卣三叨餮卣四叨餮卣五螭梁卣有銘環梁卣一有銘環梁卣二有銘環梁卣三環梁卣四環梁卣五環梁卣六環梁卣七環梁卣八環梁卣九環梁卣十環梁卣十一環梁卣十二環梁卣十三環梁卣十四環梁卣十五繩梁卣一繩梁卣二素卣一素卣二右通蓋髙五寸九分深四寸口徑三寸八分腹圍一尺七寸六分重七十一兩兩耳有提梁右通蓋髙一尺四分深六寸一分口縱三寸橫三寸九分腹圍一尺九寸五分重一百二十九兩兩耳有提梁右通蓋髙八寸一分深五寸四分口縱二寸八分橫三寸六分腹圍一尺五寸二分重七十二兩兩耳有提梁右通蓋髙九寸八分深六寸六分口縱三寸七分橫四寸四分腹圍一尺九寸一分重一百三十八兩兩耳有提梁右通蓋髙六寸五分深四寸四分口縱三寸二分橫四寸三分腹圍一尺一寸九分重七十一兩兩耳有提梁右通蓋髙八寸四分深五寸五分口縱二寸四分橫三寸二分腹圍一尺四寸重六十兩兩耳有提梁博古圗有風紋斝謂似欹斜偃草之狀正類此右通蓋髙六寸九分深四寸三分口縱二寸九分橫三寸六分腹圍一尺五寸重六十兩兩耳有提梁右通蓋髙四寸三分深二寸八分口縱一寸八分橫二寸二分腹圍九寸二分重二十七兩兩耳有提梁右通蓋髙六寸深三寸八分口縱二寸一分橫二寸五分腹圍一尺二寸七分重三十六兩兩耳有提梁右通蓋髙七寸七分深五寸六分口縱三寸七分橫四寸八分腹圍二尺四分重一百三十兩兩耳有提梁右通蓋髙九寸三分深四寸五分口縱三寸二分橫四寸一分腹圍一尺八寸四分重一百六十二兩兩耳有提梁右通蓋髙四寸七分深二寸八分口縱一寸三分橫一寸七分腹圍八寸重十七兩兩耳無提梁右通蓋髙一尺一寸三分深六寸八分口縱三寸二分橫四寸五分腹圍二尺三寸五分重一百六十七兩兩耳有提梁右通蓋髙九寸八分深五寸八分口縱二寸九分橫三寸九分腹圍一尺八寸五分重一百二十一兩兩耳有提梁右通蓋髙九寸一分深五寸二分口縱二寸九分橫三寸七分腹圍一尺八寸一分重八十三兩兩耳有提梁右通蓋髙七寸深四寸九分口徑四寸二分腹圍一尺六寸四分重一百二十一兩兩耳有提梁右通蓋髙一尺深八寸九分口徑三寸腹圍一尺八寸八分重七十一兩兩耳有提梁右通蓋髙八寸九分深七寸二分口徑三寸一分腹圍一尺七寸七分重五十四兩兩耳有提梁右通蓋髙八寸九分深六寸九分口徑三寸三分腹圍一尺九寸五分重六十四兩兩耳有提梁右通蓋髙九寸八分深八寸五分口徑一寸九分腹圍一尺九寸八分重八十二兩兩耳有提梁右通蓋髙九寸九分深六寸九分口徑三寸三分腹圍二尺一寸四分重九十六兩兩耳有提梁右通蓋髙八寸五分深七寸二分口徑三寸一分腹圍一尺七寸一分重四十八兩兩耳有提梁右通蓋髙七寸三分深六寸六分口徑二寸四分腹圍一尺五寸重五十兩兩耳有提梁右通蓋髙五寸五分深四寸三分口徑二寸六分腹圍一尺四寸七分重三十三兩兩耳有提梁三足右通蓋髙五寸五分深五寸口徑二寸四分腹圍一尺五寸六分重四十六兩兩耳有提梁三足右通蓋髙五寸深四寸四分口徑二寸二分腹圍一尺四寸七分重四十四兩兩耳有提梁三足右通蓋髙八寸三分深七寸二分口徑二寸九分腹圍一尺六寸八分重五十四兩兩耳有提梁右髙八寸四分深七寸六分口徑三寸一分腹圍一尺八寸四分重六十四兩兩耳有提梁缺蓋右通蓋髙六寸三分深三寸七分口縱二寸三分橫三寸腹圍一尺二寸四分重五十兩兩耳有提梁右通蓋髙八寸九分深八寸六分口徑二寸七分腹圍二尺一寸三分重八十七兩兩耳有提梁右通蓋髙五寸二分深三寸一分口徑三寸三分腹圍一尺五寸二分重四十六兩兩耳有提梁右髙四寸八分深四寸五分口徑二寸四分腹圍一尺三寸五分重二十七兩兩耳缺提梁無蓋西清古鑑卷十七
