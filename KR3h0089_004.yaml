body:
  text: 西清古鑑卷一鼎一商祖鼎有銘父乙鼎一有銘父乙鼎二有銘父乙鼎三有銘父乙鼎四有銘丁鼎有銘父丁鼎一有銘父丁鼎二有銘父戊鼎有銘父己鼎有銘父庚鼎有銘祖辛鼎有銘父辛鼎有銘癸鼎一有銘癸鼎二有銘癸鼎三有銘祖癸鼎有銘父癸鼎一有銘父癸鼎二有銘父癸鼎三有銘母癸鼎有銘若癸鼎一有銘若癸鼎二有銘若癸鼎三有銘瞿父鼎有銘叨餮鼎有銘孫鼎有銘右髙七寸一分深四寸八分耳髙一寸六分濶一寸九分口徑七寸四分腹圍二尺二寸七分重一百四十三兩銘只一字曰祖商人尚質其詞固應爾按書稱用命賞于祖周禮左祖右社故許慎説文謂祖始廟也鼎為祭器用於廟中銘祖宜矣右髙五寸三分深二寸七分耳髙一寸四分濶如之口徑五寸一分腹圍一尺六寸六分重六十一兩宋博古圗於凡銘父乙者必舉天乙祖乙以實之而卷首父乙鼎又云不知為何乙然商器稱祖稱父母稱兄者不一下多綴以十干黃長睿張掄諸人謂或以紀日或其器之次序是不必概斷為人名也曰子則主器者自識右髙七寸八分深四寸八分耳髙一寸五分濶一寸八分口徑七寸二分腹圍二尺三寸三分重一百五十五兩金銀錯博古圗載父乙鼎銘凡三十字此止三字上一字不可識下曰父乙與前器同右髙五寸五分深二寸九分耳髙一寸一分濶一寸四分口徑五寸二分腹圍一尺七寸重七十三兩禮緯曰質家稱仲文家稱叔質謂商文謂周也此銘曰父乙旁作仲蓋其仲子曰世亦世守之義云右髙七寸八分深四寸八分耳髙一寸七分濶一寸九分口徑八寸一分腹圍二尺五寸重一百七十六兩亞形舊説為廟室蓋廟中有太室則應有亞室也後二字剝蝕弗完前象形格上矢意昭功伐博古圗暨薛尚功鐘鼎欵識謂銘君賜如書稱彤矢百盧矢百之類其説良是又有云先人所嗜好著鼎以示不忘者義亦可通右髙四寸八分深二寸七分耳髙九分濶一寸三分口徑五寸腹圍一尺五寸八分重五十兩銘作足迹形商周器多如此凡象耳目手足者蓋祭則設尸之義右髙五寸五分深二寸九分耳髙一寸一分濶一寸四分口徑五寸二分腹圍一尺六寸四分重六十五兩右髙六寸深三寸耳髙一寸四分濶如之口縱四寸三分橫五寸七分腹縱三寸九分橫五寸二分重九十九兩欵前一字不可識據字形與父乙鼎相近右髙一尺一寸二分深七寸二分耳髙二寸六分濶三寸一分口徑一尺一寸二分腹圍三尺五寸二分重四百七十五兩亞形中一字為戟按元楊鈞作篆韻一書云凡子孫之得祭其父祖者以其有大功德然後賜彞器得奉其祭祀或持弓刀戈戟者所以銘武功也此銘戟是已右髙八寸八分深六寸一分耳髙一寸七分濶二寸二分口徑八寸九分腹圍二尺八寸一分重二百一十九兩析子孫舊説謂貽厥子孫之意汲郡吕大臨考古圗言析當作祈於義為近蓋祈祝為祭祀所有事也右髙五寸七分深三寸五分耳髙一寸一分濶一寸三分口徑五寸五分腹圍一尺七寸四分重六十五兩右髙五寸四分深二寸六分耳髙一寸一分濶一寸四分口徑五寸二分腹圍一尺六寸五分重六十四兩規制與博古圗父甲鼎相類右髙六寸深三寸二分耳髙一寸四分濶一寸六分口徑五寸五分腹圍一尺七寸四分重七十一兩亞形中銘字二曰尊綦按綦其基古文相近博古圗引列子綦衛之箭謂綦為國名然綦國不見於書傳而彞器銘此者甚夥不應皆其物又荀子目欲綦色耳欲綦聲注謂綦或為其按詩自堂徂基堂基皆廟室地此銘似當讀作基釋綦從舊説也右髙五寸深三寸耳髙一寸一分濶一寸三分口徑五寸腹圍一尺六寸重六十一兩博古圖載商癸鼎篆法皆同而此鼎形製尤朴實商物也然商以甲乙為名者多矣固難據一字為斷宋人於癸鼎則竟謂曰湯之父主癸殊為臆論蓋二代紀載寥寥又其時字體未備後人無得而考曰商曰周要當以銘詞色澤為辨耳右髙五寸九分深三寸五分耳髙一寸五分濶一寸八分口徑六寸腹圍一尺八寸一分重五十三兩癸下一字不可識右髙一尺三分深六寸九分耳髙二寸七分濶如之口徑一尺腹圍三尺二寸八分重四百十二兩右髙五寸五分深二寸九分耳髙一寸一分濶一寸四分口徑五寸一分腹圍一尺六寸五分重五十兩立戈形與父戊鼎銘戟者同意蓋以銘功而博古圖謂戈所以敵物而勝之故我之字從戈者敵物之我也非有勝物之智則不能敵物非有立我之智則至於失我云云實本王安石字説而緣飾之其言至纎瑣宜為大雅所弗道因録斯器漫識於此右髙五寸一分深三寸一分耳髙一寸二分濶一寸四分口徑五寸一分腹圍一尺六寸重六十七兩右髙三寸二分深二寸耳髙八分濶九分口徑五寸腹圍一尺五寸重三十八兩金銀錯右髙五寸三分深三寸耳髙一寸二分濶一寸四分口徑五寸三分腹圍一尺二寸四分重五十兩孫字倒書與父丁第一鼎不同右髙五寸二分深三寸二分耳髙一寸濶一寸一分口徑四寸九分腹圍一尺五寸四分重三十兩右髙五寸三分深二寸九分耳髙一寸三分濶如之口徑五寸二分腹圍一尺六寸五分重五十三兩古器多取象於舟謂其載物也此銘首一字按篆法為舟而博古圗謂互執物狀然他處則仍釋為舟殆未可曉下作執木則干之屬所謂文舞是巳末作阜古器銘多如此左氏傳韓氏其昌阜於晉乎阜盛也大也故詩稱如山如阜書稱阜成兆民此阜字疑亦祝詞兹器博古圗暨薛氏俱定為商今從之右髙四寸一分深二寸三分耳髙九分濶一寸一分口徑三寸六分腹圍一尺一寸三分重三十一兩金銀錯銘首象形為弓與格矢同若癸左旋讀右髙六寸六分深三寸八分耳髙一寸六分濶一寸八分口徑六寸腹圍一尺八寸九分重一百二十五兩三器與博古圗所載形制銘欵俱相類若癸字義不可曉而舊説若字銘其作器之人也則若為人名矣執旗蓋勒於旗常之義右髙三寸五分深二寸耳髙七分濶如之口徑三寸二分腹圍一尺重十六兩與博古圗瞿父鼎篆法同按父字在上則父子之稱如父乙父丁之類是也父字在下則當音甫男子之美稱也此銘冠瞿於父或疑幼名冠字似屬周制然古有亮父巢父又太王稱亶父乃在商時不必泥一説以概之矣右髙五寸一分深二寸三分耳髙一寸二分濶一寸四分口徑五寸三分腹圍一尺六寸五分重四十七兩博古圗載商象形叨餮鼎銘字同右髙四寸六分深三寸二分耳髙八分濶一寸一分口徑五寸一分腹圍一尺六寸四分重四十五兩西清古鑑卷一
