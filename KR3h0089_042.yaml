body:
  text: 西清古鑑卷三十九鑑一古鑑御製題句漢尚方鑑一有銘尚方鑑二有銘九子鑑一有銘九子鑑二有銘長生鑑一有銘長生鑑二有銘明光鑑一有銘明光鑑二有銘明光鑑三有銘清白鑑一有銘清白鑑二有銘長宜子孫鑑一有銘長宜子孫鑑二有銘神人鑑有銘青蓋鑑一有銘青蓋鑑二有銘四乳鑑一四乳鑑二四乳鑑三八乳鑑一八乳鑑二徑七寸重三十九兩有半青緑遍滿上二寸許如圎光獨晶瑩不可蝕即面文刻御製題句七十七字後署乾隆御題下有㑹心不逺徳充符二璽鏡陰純素按軒轅氏於王屋山鑄鏡十二而天中記謂舜臣尹夀鑄鏡周武王復有鏡銘則鏡之從來逺矣此器班駁古異非漢唐以下所能彷彿亦不能名其時代命之曰古鑑以冠於諸鑑之首徑五寸一分重二十五兩背作十二乳間列地支十二字外輪作八乳具十二屬花邊素鼻銘三十五字按丹鉛摠録鑑銘曰尚方作鑑真大巧上有仙人不知老渴飲玉泉飢食棗夀如金石佳且好較此銘少浮㳺天下遨四海一句博古圗尚方第二鑑銘詞亦小異考漢書少府官屬有鉤盾尚方御府注尚方主作禁器物又通典秦置尚方令漢因之銘詞尚方作蓋禁物又武帝時公孫卿言仙人可見宜為館如緱氏城置棗脯蓋縁安期生棗大如𤓰之説銘言飢食棗皆漢代故事也徑六寸五分重二十一兩有半背作十二乳間列地支十二字外輪具龍鸞之象流雲邊素鼻銘四十二字按西漢叢語李晦之一鏡背有八柱十二獸銘云尚方佳貢大無傷左龍右虎辟牛羊朱鳥元武順陰陽子孫備具居中央長保二親樂富昌與博古圗漢尚方第一鑑銘詞並少巧工刻繢成文章一句餘文亦小異其云辟牛羊者釋文誤也徑四寸三分重一十一兩有半背具九龍子形花邊素鼻銘十二字其四不可識按仇池筆記蘇軾於黄州得一鏡以照人面覺㣲小今此鏡亦如此夢溪筆談云鑄鏡者故令稍凸收人面令小則鏡雖小而能全納人面其説為近之而軾謂是道家聚形之法未必然也徑三寸七分重二十兩背作九龍子形素邊素鼻銘八字可識者三字又外輪銘可識者十二字徑五寸九分重二十二兩背作菱花形素邊素鼻銘四十一字可識者三十八字近鼻銘四字曰光曰長生其一不可識按此鏡迎日照之則背文透出夢溪筆談謂世有透光鑑鑑背有銘以鑑承日光背文皆透在屋壁上了了分明又雲烟過眼録焦逹卿所蔵有透光鏡一映日則背花俱見云云均與此合又古鏡記載侯生一鏡亦如此徑五寸八分重四十九兩背作菱花形中十二乳素邊素鼻銘可識者七字與前一鑑文同背亦透光不甚分明耳徑三寸重五兩有半背作菱花形素邊素鼻銘可識者十一字透光徑四寸重九兩背作菱花形素邊素鼻銘二十六字徑三寸九分重十兩背作菱花形内列十二乳素邊素鼻銘二十四字徑四寸五分重一十一兩有半背作菱花形中十二乳素邊素鼻銘與博古圗所載有數字小異背文並透光徑四寸四分重九兩背作菱花形中十二乳素邊素鼻銘二十七字透光徑四寸四分重一十三兩有半背作四乳間列四神形素邊素鼻銘四字與博古圗所載同又續遺堅志載蔡正甫一鏡文曰長宜子孫亦合徑三寸三分重五兩十六銖背作菱花形素邊素鼻銘四字徑四寸三分重一十九兩背作十二乳間列地支十二字外輪作八乳具十二屬花邊素鼻銘可識者二十二字與博古圗神人鑑文略同曰上華山見神人如武帝封禪見巨人跡又其時競言神仙故著於鏡者多如此徑三寸五分重一十九兩有半背作四神形花邊素鼻銘二十八字曰長保二親利孫子與博古圗十二辰第一鑑語合徑四寸七分重一十六兩背具蟠龍凡三素邊素鼻銘如尚方第二鑑缺一句又數字小異又博古圗青蓋鑑形製不類青蓋作鏡與前器語並同徑三寸五分重七兩有半背作四乳間列瑞獸凡四花邊素鼻無銘徑五寸九分重二十三兩背作四乳間列龍文凡四素邊素鼻無銘徑五寸二分重一十七兩八銖背作四乳間列大小獸形各四花邊素鼻無銘徑四寸重十兩背作八乳間列鳥獸形各四花邊素鼻無銘按博古圗有四神鑑六其第三鑑形製與此類徑三寸七分重八兩背作八乳流雲邊素鼻無銘西清古鑑卷三十九
