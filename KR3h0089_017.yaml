body:
  text: 西清古鑑卷十四彝二周亞彞有銘亞方彞一有銘亞方彞二有銘寶彞一有銘寶彞二有銘寶彞三有銘寶彝四有銘寶彞五有銘寶彞六有銘寶彞七有銘寶彞八有銘叨餮彞一有銘叨餮彞二叨餮彞三叨餮彞四叨餮彞五叨餮彞六叨餮方彞一有銘叨餮方彞二有銘叨餮方彞三百乳彞一百乳彞二乳彞一乳彞二䕫鳳彞鳳彞蟠䕫彞一蟠䕫彞二蟠䕫彞三有銘蟠䕫彞四獸耳彞素彞舟周雷紋舟一有銘雷紋舟二斜紋舟素舟一素舟二右高三寸四分深二寸六分口徑四寸六分腹圍一尺三寸八分重三十四兩兩耳有珥右通蓋高六寸八分深三寸三分口縱三寸四分橫四寸三分底縱三寸橫三寸八分重六十九兩右通蓋高六寸八分深三寸二分口縱三寸三分橫四寸三分底縱橫如之重六十七兩右高六寸深四寸一分口徑八寸八分腹圍二尺五寸八分重一百七十五兩兩耳有珥金銀錯右高四寸二分深二寸九分口徑五寸五分腹圍一尺五寸七分重六十五兩兩耳有珥右高三寸深二寸四分口縱三寸二分橫四寸二分腹圍一尺一寸六分重二十五兩兩耳四足右高五寸九分深三寸一分口徑五寸六分腹圍一尺八寸四分重八十五兩兩耳有珥四足右高四寸一分深二寸七分口徑六寸六分腹圍一尺八寸三分重八十三兩兩耳有珥右高四寸五分深三寸三分口徑六寸九分腹圍一尺九寸五分重八十二兩兩耳有珥右通蓋高六寸八分深四寸口縱四寸九分橫四寸六分腹圍二尺一寸三分重一百九兩兩耳有珥右高五寸三分深四寸一分口徑八寸三分腹圍二尺三寸重一百三十五兩兩耳有珥右高四寸五分深三寸一分口徑五寸七分腹圍一尺六寸五分重五十七兩兩耳有珥右高五寸一分深四寸口徑七寸腹圍二尺二寸二分重九十三兩兩耳有珥右高五寸一分深四寸口徑六寸九分腹圍二尺二寸三分重九十三兩兩耳有珥右高四寸四分深三寸口徑五寸七分腹圍一尺七寸三分重五十七兩兩耳有珥右高四寸五分深三寸一分口徑六寸腹圍一尺七寸一分重六十八兩兩耳有珥右高四寸四分深三寸六分口徑六寸三分腹圍一尺七寸三分重六十一兩兩耳有珥右高三寸五分深二寸三分口縱四寸一分橫五寸一分腹縱橫亦如之重四十八兩兩耳有珥右通蓋高七寸三分深三寸二分口縱三寸橫四寸底縱二寸六分橫三寸八分重六十七兩銘字不可識右通蓋高六寸五分深三寸一分口縱五寸三分橫六寸二分底縱四寸八分橫五寸七分重一百四十一兩右高五寸二分深三寸七分口徑七寸七分腹圍二尺二寸七分重八十五兩兩耳有珥右高四寸七分深三寸四分口徑七寸腹圍二尺二分重七十七兩兩耳右高四寸五分深三寸五分口徑六寸一分腹圍一尺九寸六分重七十二兩右高五寸二分深四寸四分口徑七寸五分腹圍二尺重六十九兩右高四寸七分深三寸六分口徑七寸四分腹圍二尺二寸三分重一百五兩兩耳右高四寸六分深三寸七分口縱三寸一分橫四寸二分腹圍一尺四寸二分重四十八兩右高四寸八分深三寸四分口徑六寸五分腹圍一尺九寸重六十七兩兩耳有珥右高四寸四分深二寸九分口徑六寸五分腹圍二尺一寸二分重七十五兩兩耳有珥右高三寸四分深二寸九分口徑六寸九分腹圍二尺重八十一兩兩耳有珥右高六寸深二寸七分口徑六寸三分腹圍一尺九寸一分重一百五十三兩兩耳右高三寸七分深三寸口徑五寸一分腹圍一尺六寸四分重五十八兩兩耳有珥右高五寸深三寸八分口徑七寸七分腹圍二尺二寸重六十九兩右高三寸五分深二寸九分口縱二寸九分橫四寸二分腹圍一尺一寸二分重二十九兩周禮春官用雞彞鳥彞皆有舟舟蓋彞之副若如鄭氏謂如今之承槃則用兩象尊皆有罍又何以稱焉據此器可訂漢儒之誤右高二寸一分深二寸口縱三寸五分橫四寸二分腹圍一尺二寸五分重八兩右高二寸五分深二寸二分口縱三寸五分橫四寸七分腹圍一尺三寸八分重二十兩右高二寸二分深二寸一分口縱三寸九分橫五寸四分腹圍一尺六寸重二十一兩右高二寸四分深二寸二分口縱四寸一分橫五寸四分腹圍一尺六寸七分重十五兩西清古鑑卷十四
