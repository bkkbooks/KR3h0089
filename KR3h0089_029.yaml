body:
  text: 西清古鑑卷二十六觶商祖已觶有銘父乙觶有銘父辛觶一有銘父辛觶二有銘父辛觶三有銘父丁觶有銘叨餮觶素觶周庚觶有銘莽觶有銘􅒋觶有銘車觶有銘女觶有銘邢觶有銘史觶有銘舉觶一有銘舉觶二有銘伯觶有銘季觶有銘子觶有銘子東觶有銘子弓觶有銘執戈觶有銘豕觶有銘亞觶有銘䕫鳳觶鳳紋觶叨餮觶雷紋觶一雷紋觶二雷紋觶三素觶一素觶二素觶三素觶四素觶五素觶六素觶七素觶八素觶九素觶十素觶十一角周子孫角有銘庚角有銘亞角有銘斗漢錢文斗五代布泉斗有銘勺周龍勺卮漢螭耳卮素卮右高三寸四分深二寸八分口徑一寸九分重四兩有半博古圖有祖已爵銘與此同右高四寸一分深三寸六分口縱二寸三分橫二寸六分重一十一兩右高四寸四分深三寸五分口徑二寸三分重一十一兩右高三寸八分深三寸五分口縱二寸四分橫二寸九分重一十四兩右高四寸六分深三寸七分口縱二寸橫二寸三分重一十兩右高四寸一分深三寸三分口徑一寸九分重八兩右高五寸一分深四寸五分口徑二寸五分重一十一兩右高四寸七分深四寸口徑二寸三分重一十一兩右高四寸四分深三寸七分口縱一寸九分橫二寸二分重一十兩商三傳為沃丁之子太庚十四傳為沃甲之子南庚十六傳為陽甲之子盤庚二十傳為武丁之子祖庚二十四傳為廩辛之弟庚丁此銘庚作下曰辛或疑為商器然只曰庚則太庚南庚庚丁又何以辨且下曰辛又何以知非祖辛小辛廩辛而必於庚之一字齗齗然也按商銘只一二字此稱作尊彝云云與他周器類故當仍繫於周又博古圖於祖庚卣謂商二十五代之君曰祖庚考成湯至祖庚二十一世即史記殷譜系圖並列未立之太丁亦二十二世耳兹並正之右高四寸三分深三寸七分口徑二寸五分重一十兩按列子周穆王篇西極之南隅名古莽之國此名一字曰莽豈國名耶又鐘鼎欵識有莽史鼎薛尚㓛云莽則剃氏掌殺草是莽又其官矣右高四寸二分深三寸四分口徑二寸二分重九兩有半按宋黃伯思作宋公鼎說謂􅒋者宋景公也以史記年表考之則名頭曼以漢書古今人表考之則名兜欒獨汲冡竹書稱景公􅒋者昭公子此名􅒋實宋景公物博古圖有􅒋鼎謂􅒋於經傳無所見至􅒋鼎蓋亦謂為宋景公而弗著竹書文今特詳之下曰女送女器也右高四寸五分深三寸七分口徑二寸二分重一十一兩右通蓋高五寸六分深三寸口縱二寸一分橫二寸七分重二十五兩右高五寸七分深五寸口徑二寸六分重一十一兩右高四寸二分深三寸三分口縱二寸三分橫二寸六分重二十四兩右通蓋高四寸一分深二寸四分口縱二寸六分橫三寸二分重一十五兩右高四寸二分深三寸七分口徑一寸九分重一十一兩右高四寸五分深三寸九分口徑二寸六分重一十兩右高四寸深三寸六分口縱二寸七分橫三寸五分重一十九兩右高三寸六分深三寸四分口縱三寸四分橫二寸九分重一十二兩右高四寸五分深三寸八分口縱二寸一分橫二寸三分重一十兩右高三寸八分深三寸口縱二寸橫二寸二分重九兩有半右高三寸九分深三寸三分口縱二寸二分橫二寸五分重一十三兩右高三寸七分深三寸一分口縱二寸一分橫二寸七分重一十三兩凡象形曰羊曰豕者皆周制銘稱齊蓋齊國物也右通蓋高五寸深三寸口縱二寸四分橫二寸六分重二十三兩右高四寸二分深三寸三分口縱二寸一分橫二寸五分重一十二兩右高三寸三分深二寸四分口縱一寸八分橫二寸一分重九兩有半右高三寸八分深三寸四分口徑二寸七分重一十三兩右高五寸一分深四寸四分口縱二寸二分橫三寸二分重二十五兩右高四寸五分深三寸六分口縱二寸一分橫二寸三分重九兩右高四寸五分深三寸九分口縱二寸二分橫二寸五分重九兩右高五寸三分深四寸四分口徑二寸二分重一十一兩右高四寸二分深三寸六分口縱二寸五分橫二寸九分重一十三兩右高四寸一分深三寸六分口徑一寸六分重一十二兩右高四寸五分深三寸六分口徑一寸九分重一十一兩右高三寸九分深三寸二分口徑二寸一分重一十兩右高三寸二分深二寸八分口縱一寸八分橫二寸三分重七兩右高三寸一分深二寸五分口縱一寸九分橫二寸四分重九兩右高四寸深三寸二分口徑二寸二分重一十三兩右高三寸八分深三寸二分口縱一寸九分橫二寸一分重八兩右高寸八分深二寸一分口徑二寸重六兩有半右高四寸九分深四寸口徑二寸重八兩右通蓋高八寸八分深四寸口縱三寸六分橫六寸五分重六十九兩三足有鋬禮明堂位加以璧散璧角則以玉為之周禮內宰謂之瑤爵至禮器所云卑者舉角又特牲饋食禮主人洗角則此器是也銘作兩手拱物形亦致敬之意云右通蓋高七寸九分深三寸二分口縱二寸九分橫六寸二分重四十八兩三足有鋬庚字下象星為連珠形兩旁曰丁易稱先庚三日而朱子謂先三日為丁良是右通蓋高七寸三分深二寸四分口縱二寸五分橫五寸八分重三十二兩三足有流有鋬右通長一尺一寸二分深一寸五分口徑四寸八分重一十九兩有柄右通長一尺一寸五分深一寸三分口徑五寸一分重二十一兩有柄按後周書武帝紀保定元年秋七月更鑄錢文曰布泉又梁初所用男錢亦曰布泉列其文其寓宜男之祝耶右高九分深八分通長二寸九分濶一寸八分重三兩按龍勺雞彝並重皆宗廟器也右高三寸三分深三寸二分口徑二寸八分腹圍一尺一寸一分重一十九兩按卮字惟卮言見於莊子至玉卮上壽及賜以卮酒皆楚漢時語今內府二器與博古圖所載諸漢卮相近因録之右高四寸三分深四寸二分口徑三寸三分腹圍一尺五寸重一十七兩西清古鑑卷二十六
