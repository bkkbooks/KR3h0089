body:
  text: 奉旨開列辦理西清古鑑諸臣職名監理和碩莊親王臣允祿和碩果親王臣𢎞曕編纂經筵講官太子少師協辦大學士吏部尚書臣梁詩正經筵講官太子少保協辦大學士户部尚書臣蔣溥經筵講官太子太傅工部尚書臣汪由敦經筵講官吏部右侍郎臣嵇璜經筵講官吏部右侍郎臣裘曰修禮部右侍郎臣金德瑛經筵講官兵部左侍郎兼管國子監事臣觀保經筵講官兵部左侍郎臣于敏中工部左侍郎臣董邦達經筵講官工部右侍郎臣王際華內閣學士兼禮部侍郎臣錢維城摹篆舉人候補國子監學正臣陳孝泳舉人臣楊瑞蓮繪圖畫院供奉臣梁觀臣李慧林臣丁觀鶴臣黨應時臣羅福旻臣陳士俊臣程梁武英殿繕書太常寺少卿臣勵宗萬日講官起居注翰林院侍講學士臣盧明楷掌山東道監察御史臣陳大化貢生候選知縣臣沈維基校刋國子監祭酒臣陸宗楷左春坊左中允兼翰林院編修臣孫人龍翰林院編修臣勵守謙翰林院編修臣蔣檙翰林院編修臣吉夢熊翰林院檢討臣李英監造內務府郎中臣四格內務府員外郎臣富明監造臣六格庫掌臣吉蘭泰庫掌臣舒義
