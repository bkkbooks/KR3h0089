  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0089_WYG_005-1a, image: WYG0841/WYG0841-0037a.png}
body:
  text: 西清古鑑卷二鼎二周文王鼎一有銘文王鼎二有銘文王鼎三有銘文王鼎四有銘召夫鼎有銘太公鼎有銘魯鼎一有銘魯鼎二有銘晉薑鼎有銘君錫鼎有銘巳伯鼎一有銘巳伯鼎二有銘張伯鼎有銘行伯鼎有銘伯師鼎有銘伯鼎一有銘伯鼎二有銘卿鼎有銘釐鼎有銘盟鼎有銘辛中鼎有銘醊鼎有銘鬺鼎冇銘叔朕鼎有銘夔鼎有銘至鼎有銘曼仲鼎有銘和鼎有銘堇山鼎有銘社鼎有銘右髙七寸四分深三寸七分耳髙一寸七分濶一寸八分口縱五寸四分橫六寸八分腹縱四寸三分橫五寸八分重一百六十七兩按博古圗有文王鼎冠於周器之首特圍徑尺度不同耳至謂魯公為周公然周公留佐周未嘗就封春秋內傳曰祝宗卜史備物典䇿官司彞器因商奄之民命以伯禽而封于少皥之墟此魯公應為伯禽古者諸侯不得祖天子而魯獨用天子禮樂故魯公得祭文王也又續夷堅志言泰和未見內府所藏方鼎耳二足四叨餮象在雷文中銘云云亦與此合右髙七寸七分深三寸七分耳髙二寸濶一寸八分口縱五寸八分橫七寸四分腹縱四寸六分橫六寸二分重二百三兩右髙七寸八分深三寸九分耳髙一寸九分濶一寸六分口縱五寸三分橫七寸二分腹縱四寸二分橫六寸二分重一百三十七兩右髙六寸四分深二寸五分耳髙一寸三分濶一寸口縱四寸橫四寸八分腹縱三寸五分橫四寸一分重五十五兩合前所録得四鼎矣鼎之數天子九諸侯七原非一器也右髙七寸一分深三寸六分耳髙一寸九分濶一寸七分口縱五寸二分橫六寸九分腹縱四寸二分橫四寸八分重一百四十九兩金銀錯博古圗有册命鼎銘欵皆合即此器顧因父癸二字定為商物實無據召夫之稱不見於殷代此銘召夫蓋召伯召父類耳當在周世曰册命則如王命周公作册逸作册是也亞形為廟此云室尤其徴矣曰午刋或紀日也右髙八寸五分深五寸一分耳髙二寸一分濶三寸一分口徑一尺六分腹圍三尺三寸九分重三百八十七兩按周禮天官酒正掌酒之政令凡祭祀以法共五齊三酒以實八尊大祭三二中祭再二小祭一二皆有酌數惟齊酒不二此銘曰從從與二同尊有二則鼎有從所謂陪鼎是也太公意為吕公望然田齊亦有後太公蓋不可考矣右髙六寸四分深三寸七分耳髙一寸四分濶一寸八分口徑五寸八分腹圍一尺八寸七分重一百一十一兩他器多銘尊彞説者謂重器也法器也此曰尊而外為亞形知祭器無疑矣格上三矢按伯禽征淮夷徐戎僖公戎狄是膺荆舒是懲或二公之時紀績以藏於廟歟右髙六寸三分深二寸二分耳髙一寸二分濶一寸三分口縱四寸二分橫五寸二分腹縱三寸六分橫四寸六分重七十一兩銘凡二太壬保三字在腹義殊不可曉太壬疑即太任魯得行郊禘禮不限以諸侯五廟之制此或為祭太任器耶右髙六寸二分深二寸七分耳髙一寸四分濶一寸二分口縱四寸五分橫五寸五分腹縱四寸三分橫四寸九分重八十一兩銘與博古圗所載同缺二十二字按晉文侯仇平西戎之亂平王錫以文侯之命此稱文侯者是也文侯之夫人不見於書傳董逌謂春秋時齊歸晉女者獻公則齊薑文公則大薑平公則少薑其在春秋前則穆侯夫人少薑蚤死齊薑不得主祀穆夫人不盡穆侯世惟文公夫人當襄公世猶不棄祀事則銘稱晉薑即太薑為文公重耳夫人鼎蓋作於襄公時而所云勿廢文侯頵命則晉薑述祖德以教誡其孫子不指文公言也博古圗謂以其妻晉文侯故曰晉薑是直以文侯為文公重耳實誤且虎賁云云亦與文侯之命合晉既有文侯不應復稱文公為文侯固明甚劉原父先秦古器記亦載此器贊曰文侯翼周九錫彤弓斯得之矣然下云薑氏戴德既佑武公則又似以晉薑為文侯仇之夫人亦非是今併政之以俟後之考者銘首不辱妄寧董逌作不敢荒寧於義為得妄荒字古文通用也末曰蘄綰眉夀黃伯思曰祈天永命俾弗中絶故云綰右髙五寸深二寸六分耳髙一寸濶一寸二分口縱四寸橫五寸腹縱三寸三分橫四寸二分重五十六兩銘曰君錫作君錫疑人名如君陳君牙之類金錯右髙八寸五分深六寸耳髙四寸四分濶二寸口徑一尺一寸七分腹圍三尺重二百七十五兩古有巳姓國商頌韋顧既伐昆吾夏桀顧與昆吾皆巳姓巳之先為伯爵銘云列考巳伯統先世言之銘首稱三月既霸既霸二字見前漢書顔師古注曰古魄字按生霸為望死霸為朔此云既霸則十五以後耳謂之盂鼎意斯鼎口特侈有類於盂耶右髙一尺深七寸三分耳髙二寸四分濶二寸九分口徑一尺二寸腹圍二尺五寸三分重三百四十七兩銘字多漫漶就可識者辨之與前器同右髙六寸九分深三寸八分耳髙一寸八分濶如之口縱五寸一分橫六寸七分腹縱四寸三分橫五寸九分重一百一十一兩古器有弡仲􅔆劉原父釋弡為張歐陽永叔從之黃長睿東觀餘論據廣雅音其勿反考説文廣韻集韻俱無此字玉篇亦作其勿反音掘正同廣雅然詩有張仲孝友之文則讀若張未為不可彼弡仲為張仲則此弡伯為張伯也鼎四面作鳳紋故銘曰鳳彞右髙五寸五分深二寸八分耳髙一寸二分濶一寸四分口徑五寸三分腹圍一尺五寸八分重五十五兩字從薛尚功釋作行按周官有大行人有行司馬諸侯國各有行人古者以官為氏則行伯當是其官或氏故云作右髙七寸深四寸五分耳髙三寸三分濶二寸一分口徑九寸三分腹圍二尺七寸七分重一百三十七兩見於書傳者每以師命官而春秋時宋有公孫師晉有邴師則人名矣此曰伯師作公羊傳謂器從名地從主人謂之為伯師鼎右髙七寸六分深五寸一分耳髙三寸二分濶二寸四分口徑一尺一寸二分腹圍三尺二寸二分重一百三十一兩銘左旋讀內字當為句或內事所用也伯蓋其名字諸侯之適子皆得稱太子不知其為何國物矣右髙七寸二分深四寸八分耳髙三寸濶二寸口徑一尺腹圍二尺六寸七分重二百三十五兩伯下一字無考右髙五寸五分深三寸三分耳髙一寸二分濶一寸四分口徑六寸腹圍一尺九寸重六十七兩古卿大夫食采者皆得立廟以祀其先人因作祭器此云某卿作是其驗也右髙六寸三分深四寸四分耳髙二寸五分濶一寸七分口徑八寸一分腹圍二尺五寸二分重一百二十一兩博古圗尹卣有文曰禧咸釐而伯碩父鼎史頙鼎皆文曰釐仲此稱釐伯釐姬宋人謂釐為諡當不謬如宋釐公衛釐公晉釐侯皆是右髙五寸二分深三寸三分耳髙九分濶一寸二分口徑五寸四分腹圍一尺七寸九分重五十一兩按鼎非會盟之用謂之祖盟義更難曉古字盟與孟通如孟津為盟津是也孟或其氏耶右髙五寸三分深三寸三分耳髙一寸二分濶一寸五分口徑六寸三分腹圍二尺重六十一兩博古圗有京薑鬲銘曰京薑庚仲作尊鬲則此辛仲猶彼云庚仲也皇訓大皇母猶彼云京薑蓋如詩所稱大任大姒云冠以姬周姓也右髙五寸二分深三寸耳髙一寸一分濶一寸六分口徑五寸四分腹圍一尺六寸三分重六十一兩玉篇醊祭酹也廣韻醊連祭也按封禪書其下四方地為醊食索隱注謂聫續而祭之此銘曰醊為祭器無疑矣曰京曰商如詩所稱殷士膚敏祼將于京云爾右髙五寸二分深三寸三分耳髙九分濶一寸一分口徑五寸四分腹圍一尺七寸九分重六十一兩鬺玉篇釋為煮與􅀢鬺同按周禮煮作鬻此銘曰乃鬺蓋即鬻鼎也右髙六寸深三寸六分耳髙三寸三分濶一寸九分口徑九寸四分腹圍二尺七寸重一百七十一兩鐘鼎欵識有飼鼎饙鼎爾雅饙餾稔也説文饙一蒸米也餾飯氣流也取炊鬻之義與鉶鼎羞鼎同類銘云叔朕自作饙鼎乃食鼎非宗廟器右髙五寸九分深三寸一分耳髙一寸三分濶一寸五分口徑五寸六分腹圍一尺七寸五分重六十五兩銘第二字不可識以意辨之蓋孫字古文作也左傳僖公二十六年楚人滅夔以夔子歸此銘夔作蓋國名右髙九寸深四寸一分耳髙一寸五分濶一寸八分口徑八寸三分腹圍二尺四寸三分重一百五兩按晉郤至最著又衛有禮至秦有泠至銘云至作蓋作者自識耳右髙五寸二分深二寸七分耳髙一寸一分濶一寸口縱三寸九分橫四寸八分腹縱三寸二分橫四寸重三十九兩字傍加阜古文多如此􅀈字應仍作曼字按史記晉世家晉立夀曼為君則晉厲公名而宋景公亦名頭曼楚之鄧曼則婦人而曼又為鄧姓見杜預注至公羊傳楚誘戎曼子云云則曼又與蠻同非人名也銘只稱曼仲不必舉其人以實之矣右髙一尺七分深七寸耳髙二寸七分濶三寸一分口徑一尺三寸七分腹圍四尺一寸重四百九十九兩內府所收有伯和尊銘曰伯和父博古圗毁敦亦稱伯和父此銘和上下字俱漫蝕不可辨意其類也右髙六寸六分深三寸五分耳髙一寸五分濶一寸六分口縱四寸九分橫六寸腹縱四寸二分橫五寸二分重九十九兩古器多勒國名人名若山名殊不概見而越絶書有赤堇之山銘中堇山字適合右髙五寸七分深二寸八分耳髙一寸二分濶一寸四分口徑五寸三分腹圍一尺六寸八分重五十一兩銘首一字據汗簡釋作社禮祭法王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社按大社即北郊之社與郊對舉者王社國社侯社斯春祈秋報之地所謂右社稷而左宗廟者也此銘下稱父巳則是殁而祭於其社蓋置社類耳西清古鑑卷二
