body:
  text: 西清古鑑卷二十八敦二周田敦有銘鎬敦冇銘休敦有銘魯士敦有銘季􅺜敦有銘仲姬敦有銘仲惠敦有銘仲阜敦有銘仲駒敦有銘拱敦有銘兕敦有銘子敦有銘亞敦有銘􅭺敦有銘舟敦有銘寶敦一有銘寶敦二有銘乳敦有銘䕫足敦有銘蟠䕫敦一蟠䕫敦二蟠䕫敦三鳳文敦環紋敦一環紋敦二環紋敦三獅首敦麟文敦右高四寸六分深三寸四分口徑六寸腹圍一尺七寸重五十七兩兩耳有珥銘一字曰田田字義見前尊類博古圖載田卣謂田者粢盛所自出云云其説迂曲未可據右高五寸二分深四寸五分口徑五寸八分腹圍二尺一寸八分重九十一兩兩耳有珥曰鎬作非邑名矣右高三寸深二寸八分口徑六寸腹圍二尺二分重六十兩兩耳有珥銘休字與周錫貝鼎同蓋一時作也右通蓋高七寸九分深三寸七分口徑六寸二分腹圍二尺四寸八分重一百七十九兩兩耳有珥三足攷諸禮大夫士祭器各不同銘稱士蓋士所用魯字作小篆與文王鼎異然鐘鼎欵識所載三代物俱間有之先賢謂小篆多原本古文非盡創為也右高五寸一分深三寸七分口徑五寸八分腹圍二尺一寸四分重一百一兩兩耳三足􅺜士咸切廣韻謂鳥􅺜物也周人命名如蠆如獳羊肩如黑臀殊不可解此曰季􅺜固難强為之説矣右高五寸五分深三寸七分口徑六寸一分腹圍二尺四寸五分重一百二十五兩兩耳有珥銘稱叔皇父按詩皇父卿士注皇父字也博古錄亦有孟皇父匜孟叔為序則皇父乃其氏耳固難求其人以實之矣昔劉原父得古器銘曰張伯乃引詩張仲孝友謂是其兄前人附㑹處可發一噱銘首辛字蓋紀日仲姬則其所祀也右通蓋高七寸五分深三寸八分口徑六寸腹圍二尺四寸二分重一百二十九兩兩耳有珥三足仲惠不可考銘曰惟王正月則知春秋之書春王正月係史策舊文胡氏謂繫王於月以為夫子特筆鑿矣曰餗敦與後餗簠同右高三寸一分深二寸九分口徑五寸八分腹圍二尺六分重七十兩兩耳有珥鎏金好如式相好矣之好蓋寓洽比之意曰仲阜與仲阜卣同右通葢高八寸八分深四寸三分口徑六寸腹圍二尺四寸重一百九十一兩兩耳有珥三足銘見博古圖又仲駒尊文並同右高三寸六分深三寸口徑五寸三分腹圍一尺八寸六分重五十三兩兩耳有珥右高八寸一分深三寸七分口徑七寸三分腹圍二尺三寸三分重一百八十九兩兩耳有珥古器銘兕者多作象形此獨泐為字鐘鼎欵識云上為屋室之狀下一字曰已當讀作兕今從之右高四寸六分深三寸八分口徑七寸腹圍二尺一寸七分重一百七兩兩耳有珥右通蓋高三寸七分深一寸九分口徑二寸八分腹圍一尺二寸五分重二十三兩兩耳有珥三足右通蓋高八寸六分深三寸七分口徑七寸一分腹圍二尺五寸一分重二百六十三兩兩耳有珥三足器銘與博古圖商􅭺彞同按字傍加阜古文多如此蓋鬳字説文謂鬲屬周禮尊字往往作􅳛字至飾以䕫龍則周器尤多而舊圖云作字取象皆商制未盡然也右高四寸四分深三寸六分口徑六寸五分腹圍二尺二分重一百七兩兩耳有珥周寶鼎銘曰周作寶鼎與此合按篆法周與舟同云舟作則與他銘取象舟車者異矣右高四寸深三寸二分口徑五寸四分腹圍一尺六寸重五十五兩兩耳有珥右高五寸深三寸七分口徑七寸四分腹圍二尺二寸三分重一百一兩兩耳有珥右高五寸二分深四寸一分口徑七寸腹圍二尺二寸八分重一百二十五兩兩耳有珥右通蓋高七寸二分深三寸五分口徑五寸九分腹圍二尺三寸九分重一百六十三兩兩耳有珥三足右通蓋高六寸一分深三寸二分口徑六寸腹圍二尺三寸重九十五兩兩耳有珥右高五寸二分深三寸七分口徑五寸九分腹圍二尺三寸八分重一百六十兩兩耳三足右高五寸一分深三寸七分口徑六寸四分腹圍二尺三寸七分重一百二十三兩兩耳有珥三足右通蓋高七寸四分深三寸七分口徑五寸九分腹圍二尺二寸六分重一百三十九兩兩耳有珥三足右通蓋高七寸三分深三寸四分口徑五寸一分腹圍二尺一分重一百七十一兩兩耳三足右通蓋高七寸一分深三寸四分口徑五寸二分腹圍二尺一分重一百六十五兩兩耳三足右高三寸七分深三寸口徑四寸九分腹圍一尺八寸九分重六十七兩兩耳有珥三足右通蓋高七寸一分深三寸三分口徑四寸六分腹圍一尺九寸七分重一百二十二兩六足金銀錯右通蓋高三寸二分深二寸口徑二寸五分腹圍一尺一寸三分重二十兩西清古鑑卷二十八
