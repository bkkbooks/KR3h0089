body:
  text: 西清古鑑卷三十八刀周鸞刀劍周服劍一服劍二服劍三弩機漢弩機一弩機二符漢虎符钁漢雕首钁素钁杠頭漢杠頭雲紋杠頭雲雷杠頭儀器飾漢器飾一器飾二器飾三器飾四儀飾杖頭漢鳩首杖頭鐓漢立熊鐓熊足鐓方足鐓一方足鐓二素鐓一素鐓二杖鐓鳩車唐鳩車表座唐飛熊表座犧形表座文鹿表座硯滴漢龜硯滴一有銘龜硯滴二甪端硯滴一甪端硯滴二唐天雞硯滴獅硯滴書鎮漢天祿書鎮蟠螭書鎮鳩鎮糊斗唐糊斗一糊斗二糊斗三爐漢博山爐一博山爐二博山爐三博山爐四博山爐五提爐獸爐一獸爐二薰爐有銘唐蟠螭爐提爐獸鼻爐薰爐一薰爐二方車薰爐匕首周匕首右刀長九寸五分刃長五寸二分下濶九分上濶三分柄長四寸三分下濶六分有餘柄盡處濶一寸身形微灣周禮所謂合六而成規也刀室長六寸四分下濶一寸四分上鋭不可以濶計通重二十兩無銘柄首有鈴案禮器鸞刀之貴注鸞鈴也刀環有鈴故名鸞刀割肉欲中其音節也郊特牲云聲和而後斷也據此則兹器為鸞刀無疑又其刃藏於匣詩稱鞞琫容刀此即鞞耳又柄首為肖生又虛其中作如龍者二考龍生九種有睚眥好殺古人多以裝刀劍之屬是其類也刀室上又為獸形三如犧羊蓋鸞刀為宗廟中所用故作牽牲之狀拙而有古致非後人所能倣佛矣右身長一尺三寸四分臘廣一寸四分兩從各五分有半分鍔一分有半分以玉為莖與首通重二十五兩按周禮注六兩半有零為一鋝則四鋝有歉然古權三當今之一則此乃上士所服也右身長一尺四寸七分臘廣一寸三分兩從各三分鍔三分有半分莖廣一寸五分首長二寸七分重二十三兩按秦始皇本紀應劭注曰古者以銅為兵左傳僖公十八年鄭伯朝楚楚子賜之金既而悔之盟曰無以鑄兵杜預注亦曰古者以銅為兵又尸子所謂昆吾之劍越絶書純鉤之劍皆是以銅為之而宋黃長睿銅戈辨謂汲冢中得銅劍一長三尺五寸則是銅之利可以鑄刀劍無疑矣今內府所收銅劍三可證也右身長一尺一寸臘廣一寸一分兩從各三分有半分鍔一分有半分以玉為莖與首通重九兩右長三寸濶一寸一分重二十兩形製與博古圗所載同右長四寸九分濶一寸二分重三十五兩右長四寸六分首濶一寸四分下徑濶九分重二兩有半古者軍中以虎符合會為信又按集仙傳有遣協晨大夫賜虎符之語又黃庭內景經身披鳳儀銜虎符則製度與軍符自别此其是耶右長七寸濶二寸重七兩有半按説文大鉏也又博雅􅀈謂之钁右長六寸四分濶二寸重一十一兩右長四寸口徑二寸重一十四兩右長三寸五分口徑一寸六分重一十一兩右長二寸九分口徑二寸二分重十兩右髙一寸上縱一寸八分橫二寸下縱二寸三分橫三寸二分中通無隔重九兩右髙五分長三寸七分濶三寸一分重四兩右長二寸五分濶二寸重三兩右橫一寸一分縱八分口徑如之左右並同通髙二寸六分深一寸六分重一十七兩下有機捩作方孔可以開合折之如雙管狀右髙三寸重十兩下作龜形上一鳥如相風烏右通長四寸八分重十兩杖用鳩取其不噎古義也右長一寸六分上圜徑一寸下縱九分橫一寸一分重三兩右長四寸二分上徑一寸八分下徑一寸四分重一十二兩鐓以熊為足蓋取威儀之義詩疏謂矛之下端又曲禮進矛戟者前其鐓此器是也右長四寸九分上圜徑一寸一分下縱一寸一分橫如之重二十二兩右長三寸九分上圜徑一寸下縱一寸一分橫如之重一十四兩右長二寸七分上濶一寸二分下濶如之重三兩有半右長二寸三分口徑一寸一分下徑同重四兩純素右長二寸五分口徑六分下徑五分重一兩六銖鏐金右髙二寸一分長三寸五分濶三寸六分輪徑二寸重一十二兩博古圗亦載此器引杜氏年五嵗有鳩車之樂云云蓋兒戲所用非上世制也右髙二寸八分深一寸七分口徑一寸二分下徑一寸九分重一十一兩右髙五寸三分深三寸五分通長六寸三分濶三寸九分方口長一寸二分濶四分中口徑八分後口徑一寸一分無流重九十九兩金銀錯中為筒凡三餘俱實其內較他物為重右髙二寸六分深二寸三分通長三寸四分濶一寸一分口徑五分重一十四兩博古圗有表座二云一筒中通上下此器類之且上可以置幹狀如𣙗凡器有座不必盡為測日晷用也右髙一寸八分深一寸五分口徑五分重一十一兩金錯龜為北方介蟲坎位北方而硯滴貯水象其類也博古圗亦載此器右髙一寸四分濶一寸八分長二寸八分重七兩有半上有蟠螭右髙一寸七分深八分口徑四分重八兩右髙二寸五分深二寸口徑六分重一十八兩右髙二寸二分深一寸口徑三分重一十六兩右髙一寸七分深一寸一分口徑四分重八兩鏐金右髙三寸九分長六寸濶二寸二分重三十兩按屈原九歌即有搖席玉鎮之語故知此器在七國已有之吕大臨考古圗有書鎮一今從之附録於此右髙一寸三分重十兩右髙一寸九分重一十九兩有半金銀錯右髙一寸七分深一寸六分口徑一寸五分長三寸五分重六兩右髙一寸三分深一寸二分口徑九分長六寸四分重三兩右髙一寸二分深一寸一分口徑七分長四寸三分重三兩右通蓋髙六寸八分深二寸七分口徑三寸四分腹圍一尺二寸九分重四十六兩周禮天官冢宰之屬宫人凡寢中共爐炭則爐乃三代之制而其器弗傳按東宫故事洞天清録西京雜記諸書博山實始於漢今詳此器分三層蓋為山形下為承盤此劉向銘稱上貫太華承以銅盤者是也補筆談謂防爐熱灼席則為盤薦水以漸其趾今按盤底有孔非可以盛水者惟云承火炧之墜則得之矣考古圗又云貯湯使潤氣蒸香以象海之回環者更不然也右通蓋髙七寸七分深二寸四分口徑三寸三分腹圍一尺二寸九分重三十五兩缺盤右通蓋髙七寸二分深二寸口徑二寸八分腹圍一尺七分重四十五兩右通蓋髙五寸二分深二寸八分口徑三寸二分腹圍一尺四寸重二十九兩兩耳三足蓋象山形故仍謂之博山爐右通蓋髙五寸七分深一寸九分口徑三寸三分腹圍一尺一寸四分重二十九兩右髙三寸七分深三寸二分口縱二寸橫三寸腹圍七寸四分重一十四兩右通蓋髙二寸七分深一寸三分口徑一寸七分腹圍八寸重一十七兩右通蓋髙二寸七分深一寸三分口縱一寸四分橫一寸六分腹圍七寸三分重八兩鏐金右通蓋髙二寸二分深一寸一分口徑二寸七分重一十四兩有柄右髙二寸四分深一寸八分口徑四寸六分腹圍一尺四寸六分重二十三兩三足銀錯右髙三寸二分深一寸八分口徑四寸五分腹圍一尺三寸四分重三十九兩鏐金四圍作四鼻可系蓋提爐如唐儀衛志所稱執香爐香盤分左右以次導引者也右髙二寸三分深一寸七分口徑四寸一分腹圍九寸八分重一十一兩三足亦提爐類也右通蓋髙三寸三分深一寸二分口徑二寸四分腹圍七寸六分重九兩有半右通蓋髙四寸深一寸九分口徑三寸四分腹圍一尺二寸重二十七兩鏐金右髙一寸八分深一寸二分口縱二寸二分橫三寸二分腹縱一寸六分橫二寸七分重一十七兩有半缺蓋右身長五寸三分濶一寸八分重七兩按匕首似劍而身短劉向説苑尺八短劍頭似匕故名匕首西清古鑑卷三十八
