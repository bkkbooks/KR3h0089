body:
  text: 西清古鑑卷三十七錞周虎錞素錞一素錞二錞虎鈕戚周舞戚一舞戚二舞戚三舞戚四片雲戚龍首戚鐃周舞鐃一舞鐃二舞鐃三舞鐃四舞鐃五舞鐃六舞鐃七舞鐃八舞鐃九舞鐃十鼓漢銅鼓一銅鼓二銅鼓三銅鼓四銅鼓五銅鼓六銅鼓七銅鼓八銅鼓九銅鼓十銅鼓十一銅鼓十二銅鼓十三銅鼓十四右髙一尺四寸二分上縱六寸八分橫八寸二分下口縱五寸八分橫六寸八分鈕髙二寸二分濶一寸三分重四百一十一兩按周官鼓人以金錞和鼓鄭康成曰錞錞于也圓如碓頭大上小下樂作則鳴之以和鼓而南史乃謂灌之以水又以器盛水于下以芒莖當心跪注云云語不可曉蓋古人用以節樂亦叩之則鳴如鐘類耳南史之說未盡然也右髙一尺四寸八分上縱七寸八分橫九寸二分下口縱五寸六分橫六寸八分重三百四十七兩缺鈕右髙一尺三寸三分上縱九寸三分橫一尺四分下口縱六寸二分橫七寸八分鈕髙八分濶一寸五分重三百六十三兩右髙三寸七分通長一尺八分濶一寸五分重三十七兩右長九寸一分濶五寸四分重五十二兩與博古圗所載製相類而此稍長濶中更作圎孔戚斧屬樂舞所執舊說以象其武也右長五寸八分濶二寸七分重一十三兩博古圗片雲戚與此合此特作圓竅七安柄處亦微不同耳右長五寸三分濶一寸六分重一十三兩右長六寸一分濶二寸三分重一十三兩右長五寸六分濶三寸四分重一十九兩若片雲狀兩端微卷與博古圗所載合微異者柄旁有鈴製如鐃振之有聲此則樂記謂鐘鼓干戚所以和安樂者是已右長七寸二分濶四寸二分重一十九兩又受柄處為柲重三兩按左傳昭公十二年君王命剝圭以為鏚柲注鏚斧也柲柄也右長五寸六分徑三寸二分柄濶一寸六分重一十六兩按周禮地官封人以金鐃止鼓注鐃如鈴無舌有柄執而鳴之以止擊鼓禮記所謂始奏以文復亂以武文謂鼓武即鐃也右長五寸五分徑三寸二分柄濶一寸三分重一十七兩右長五寸五分徑三寸五分柄濶一寸四分重一十八兩右長五寸二分徑二寸六分柄濶一寸一分重八兩右長五寸一分徑二寸五分柄濶一寸重八兩右長五寸一分徑二寸六分柄濶一寸一分重八兩右長五寸一分徑二寸七分柄濶一寸一分重七兩右長四寸六分徑二寸五分柄濶一寸三分重十兩博古圗有漢舞鐃二形製並倣佛特云有舌則殊不可曉右長四寸七分徑二寸五分柄濶一寸一分重六兩右長四寸三分徑二寸六分柄濶一寸一分重八兩右髙一尺八寸面徑二尺五寸三分腹圍八尺四分重一千二百六十兩此器今世多謂之諸葛鼓蓋武侯渡瀘後所鑄然考馬伏波平交趾亦鑄銅為鼓則先諸葛有之矣今嶺南一道亷州有銅鼓塘欽州有銅鼓村博白有銅鼓潭則因以為地名矣大抵兩川所出為諸葛遺製而流𫝊於百粵羣峒者則皆伏波為之今未能差别統名為漢銅鼓云又按唐嶺南節度使鄭絪出鎮時春州守林靄得之峒户以獻絪納諸廟面濶五尺臍隱起羅布海魚蝦蟇等紋旁設兩耳語與此合而是鼓更作騎士科洗乘而馳旁挾一馬則舊說所未有也右髙二寸七分面徑三尺五寸五分腹圍九尺八寸重三千二百五十兩右髙一尺二寸七分面徑三尺七分腹圍八尺四寸重二千五十兩右髙一尺八寸六分面徑二尺六寸腹圍六尺九寸二分重一千七百三十兩右髙一尺四寸四分面徑二尺五寸腹圍七尺一寸二分重一千二百二十兩右髙一尺一分面徑二尺四寸五分腹圍七尺八分重九百二十四兩右髙一尺二寸九分面徑二尺二寸腹圍六尺六寸二分重八百三十六兩右髙九寸一分面徑一尺五寸五分腹圍四尺四寸九分重四百九十四兩右髙八寸八分面徑一尺四寸七分腹圍四尺五寸四分重四百三十五兩右髙一尺六分面徑一尺五寸六分腹圍四尺三寸五分重四百三十兩右髙八寸六分面徑一尺五寸一分腹圍四尺六寸五分重四百一十九兩右髙九寸面徑一尺五寸七分腹圍四尺七寸五分重三百九十五兩右髙九寸面徑一尺五寸四分腹圍四尺六寸八分重三百六十六兩右髙八寸五分面徑一尺五寸腹圍四尺二寸五分重三百一十五兩西清古鑑卷三十七
