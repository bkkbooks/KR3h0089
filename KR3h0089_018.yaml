  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0089_WYG_018-1a, image: WYG0841/WYG0841-0412a.png}
body:
  text: 西清古鑑卷十五卣一商父丁卣一有銘父丁卣二有銘父丁卣三有銘祖巳卣有銘父癸卣有銘瞿卣有銘卦象卣有銘周貉子卣一有銘貉子卣二有銘伯啓卣有銘伯和卣有銘單卣有銘雍卣有銘靜卣有銘冀卣有銘承卣有銘列卣有銘木卣有銘衛卣有銘諸孟卣有銘尹􅛕卣有銘招仲卣有銘錫高卣有銘文父卣有銘右通蓋高九寸深五寸七分口縱三寸六分橫四寸六分腹圍一尺九寸五分重一百五十五兩兩耳有提梁銘上一字不可識與商父乙鼎同右通蓋高九寸四分深六寸口縱三寸橫四寸三分腹圍二尺重一百五十兩兩耳有提梁銘父丁與前器同餘字疑象形不可識右通蓋高九寸六分深五寸九分口縱三寸二分橫三寸九分腹圍一尺九寸六分重一百五十六兩兩耳有提梁右通蓋高八寸七分深五寸八分口縱三寸六分橫四寸五分腹圍一尺九寸二分重一百三十六兩兩耳有提梁蓋器銘文同惟尊字作字則左右互易之右通蓋高一尺一分深六寸七分口縱三寸八分橫四寸九分腹圍二尺五分重一百三十一兩兩耳無提梁欵上象形為執耳蓋提耳意也右通蓋高六寸深三寸七分口縱二寸二分橫三寸腹圍一尺二寸九分重四十七兩兩耳有提梁博古圖載瞿父鼎瞿祖丁卣皆屬于商今從之按竹書紀年商武乙名瞿顧博古圖未之詳也又銘一字曰享是知為享器右通蓋高九寸八分深六寸口縱三寸橫四寸腹圍一尺九寸重一百三十兩兩耳有提梁博古圖有此器定為商今從之右通蓋高六寸深三寸七分口縱三寸橫三寸九分腹圍一尺六寸八分重七十五兩兩耳有提梁銘曰王格于吕吕下一字不可識按堯封四嶽于吕輿地志謂在今南陽府城西所云吕豈即其地耶成周乃洛陽東都也曰王田于成周則當在未東遷以前蓋自鎬京出田于洛猶召誥王朝步自周則至于豐也詩大雅其追其貉傳謂追貉皆國名銘詞貉子是巳右通蓋高深口縱橫俱同前腹圍一尺五寸七分重七十九兩兩耳有提梁銘字與前器合蓋一時作皆周初器也右通蓋高七寸深四寸五分口縱三寸橫四寸腹圍一尺八分重九十一兩兩耳有提梁銘不可識者五字其曰王在曰居詩稱王在在鎬有那其居意類此曰友曰嬬曰芾曰帑友義同旅嬬博雅妻謂之嬬説文弱也一曰下妻芾兩音蔽芾斯皇則方味切又分物切則三百赤芾是也帑一作農都切左傳秦人送其帑一為坦朗切則説文金蔽所藏也伯啓蓋當時卿士意者有行役之事而申命母擾故曰小大事母有畋也曰友嬬乃芾乃帑則恤之者至矣先紀王命而後承之以再拜稽首對揚王休皆謹之至耳右通蓋高九寸九分深六寸一分口縱三寸橫四寸腹圍一尺九寸七分重一百四十六兩兩耳有提梁銘與伯和尊同缺五字右通蓋高五寸九分深三寸八分口縱二寸三分橫三寸三分腹圍一尺五寸一分重四十七兩兩耳無提梁博古圖鐘鼎欵識二書俱載此器爵字欵識所缺景字欵識亦作冏今釋文並從博古圖惟豐字博古圖作壴兹仍釋豐則又從欵識也單氏世為周卿士見于經傳者單伯逆王姬單伯之後有襄公名朝襄公之子頃公頃公之子靖公皆失名靖公之子曰獻公名蔑獻公之弟曰成公子曰穆公名旗穆公之子曰武公名逸單氏食采于單而伯則其爵也銘首字疑即字非冏字也前二書蓋失考右通蓋高七寸五分深五寸口縱三寸二分橫四寸一分腹圍一尺七寸九分重九十兩兩耳有提梁末著單字亦單氏物也雍蓋其名右通蓋高六寸七分深四寸五分口縱三寸三分橫四寸四分腹圍一尺八寸四分重一百七兩兩耳有提梁旁京意如陪京周兩京並建未東遷以前則陪京乃洛邑耳按史記齊襄公之弟胡公名靜銘云錫靜弓云靜拜稽首此其齊器耶右通蓋高六寸一分深三寸九分口縱二寸五分橫三寸三分腹圍一尺四寸三分重四十八兩兩耳有提梁金錯冀邑在晉後以為氏郤芮郤缺食采于冀亦稱冀芮冀缺此卣銘與博古圖合但彼僅因父辛之號而定為商未敢信然紋鏤華縟與彼器純素者亦異右通蓋高九寸五分深六寸七分口縱三寸八分橫四寸九分腹圍二尺一寸九分重二百六十四兩兩耳有提梁古器亞形內多銘阜字者如若癸鼎皆是承蓋其名耳右通蓋高一尺六分深七寸五分口縱三寸七分橫四寸五分腹圍一尺七寸六分重一百二十二兩兩耳有提梁十千書丁辛疑弗類然舊器多如此前人謂柔日所有事理或然爾右通蓋高八寸八分深五寸五分口縱三寸八分橫四寸三分腹圍一尺一寸九分重一百二十八兩兩耳有提梁可考者楚子木晉先丹木魯后木而博古圖于銘木者輒謂木屬東方為仁古人製器多自識其名不必如宋人所云也右通蓋高七寸八分深五寸一分口縱三寸四分橫四寸五分腹圍一尺七寸六分重一百八兩兩耳有提梁銘稱衛父蓋其名氏非國也右通蓋高九寸四分深六寸三分口縱三寸三分橫四寸五分腹圍一尺九寸八分重一百五十八兩兩耳有提梁鐘鼎欵識載諸旅鬲諸字並作周禮夏官有諸子注謂主公卿大夫士之子者或曰庶子則諸為官又春秋城諸及防諸又為邑名按説苑越大夫諸發則諸乃其姓矣蓋銘諸孟二字應相屬故器銘只稱孟也右通蓋高八寸四分深五寸八分口縱三寸二分橫四寸一分腹圍一尺八寸二分重一百一十八兩兩耳有提梁􅛕古伯切集韻謂通作格尹􅛕蓋其名刋字古器多有之猶作也宗廟亦曰宫詩召南于以用之公侯之宫此銘稱宫蓋宗廟矣右通蓋高九寸六分深五寸六分口縱三寸四分橫四寸一分腹圍一尺八寸八分重一百九十八兩兩耳有提梁古文甲多作十與午同為天義取諸乾招字與博古圖商招父丁爵弗類周己酉方彞篆法于此銘為近增減一二筆不足異也右通蓋高八寸五分深五寸七分口縱三寸七分橫四寸七分腹圍二尺五分重一百六十三兩兩耳有提梁春秋齊鄭衛皆有高氏此云子錫高則高為名于書傳無所考右通蓋高六寸七分深四寸七分口縱三寸三分橫四寸腹圍一尺七寸二分重九十二兩兩耳有提梁西清古鑑卷十五
