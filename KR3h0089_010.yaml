body:
  text: 西清古鑑卷七鼎七漢定陶鼎有銘兒鼎有銘蟠螭鼎蟠虺鼎一蟠虺鼎二蟠虺鼎三三犧鼎一三犧鼎二三犧小鼎三羊鼎一三羊鼎二三羊鼎三三羊鼎四三羊鼎五三羊鼎六三羊小鼎夔紋鼎一夔紋鼎二夔紋鼎三弦紋鼎一弦紋鼎二弦紋鼎三弦紋鼎四弦紋鼎五弦紋鼎六弦紋鼎七弦紋鼎八弦紋鼎九弦紋鼎十弦紋鼎十一弦紋鼎十二弦紋鼎十三弦紋鼎十四弦紋鼎十五弦紋鼎十六帶紋小鼎素鼎一素鼎二素鼎三素鼎四右通蓋髙四寸一分深二寸七分耳髙一寸三分闊八分口徑三寸五分腹圍一尺四寸九分重五十四兩金銀錯銘與博古圖合缺三字彼特純素為異并字博古圖讀作共字非是今從薛尚功釋文仍作并博古圖謂定陶為趙共王恢以共王初封梁梁為彭越舊封漢書有立越為梁王都定陶之文也按地理志濟隂郡注宣帝甘露二年更名定陶前此定陶非國名銘詞不應稱定陶廟其非趙共王明甚又按惠帝紀令郡諸侯王立髙廟此器前云髙廟後云定陶廟當是定陶髙廟之鼎而鑄於宣帝以後者耳都倉博古圖未詳然漢制有衡官水司空都水農倉又郡國諸倉農監都水六十五官長丞皆屬焉此云都倉或監製者官名右髙三寸九分深三寸一分耳髙一寸七分闊一寸一分口徑四寸九分腹圍一尺八寸重四十七兩缺蓋按兒同倪姓也漢書倪寬作兒寬鼎其倪氏製耶右髙七寸深五寸九分耳髙二寸四分闊二寸一分口徑七寸八分腹圍三尺一寸重一百六十五兩缺蓋右通蓋髙六寸一分深三寸八分耳在旁髙八分闊三分口徑五寸九分腹圍二尺六分重五十七兩右通蓋髙五寸八分深三寸一分耳在旁髙八分闊三分口徑五寸六分腹圍一尺八寸重四十二兩右通蓋髙三寸三分深二寸二分耳髙一寸闊八分口徑三寸一分腹圍一尺一寸重二十五兩金銀錯右通蓋髙五寸九分深三寸九分耳髙一寸八分闊一寸五分口徑五寸五分腹圍二尺一寸二分重七十七兩右通蓋髙三寸二分深一寸八分耳髙一寸闊七分口徑二寸九分腹圍一尺七分重一十七兩金銀錯右通蓋髙二寸四分深一寸五分耳髙九分闊六分口徑二寸一分腹圍八寸六分重一十五兩右通蓋髙一尺一寸二分深五寸一分耳髙三寸五分闊二寸六分口徑八寸八分腹圍三尺八分重二百五十一兩鼎蓋獸形三俱一角蓋神羊也右通蓋髙九寸八分深五寸八分耳髙二寸六分闊一寸八分口徑七寸八分腹圍二尺八寸三分重二百一十九兩右通蓋髙六寸深三寸六分耳髙二寸二分闊一寸三分口徑六寸四分腹圍二尺二寸三分重一百二十一兩右通蓋髙五寸八分深三寸九分耳髙二寸二分闊一寸五分口徑五寸六分腹圍二尺一寸重一百六兩右通蓋髙四寸九分深二寸六分耳髙一寸三分闊九分口徑四寸一分腹圍一尺五寸七分重四十五兩右通蓋髙三寸二分深二寸四分耳髙一寸一分闊九分口徑三寸四分腹圍一尺二寸八分重二十九兩右通蓋髙三寸二分深一寸四分獸耳在旁口徑二寸四分腹圍八寸五分重一十四兩右通蓋髙一尺五分深六寸八分耳髙三寸五分闊二寸八分口徑一尺一寸二分腹圍三尺九寸重二百九十一兩右通蓋髙六寸六分深四寸五分耳髙一寸九分闊一寸六分口徑六寸五分腹圍二尺一寸六分重七十一兩右髙八寸二分深六寸二分耳髙二寸八分闊二寸一分口徑八寸四分腹圍三尺一寸二分重二百三十五兩缺蓋右通蓋髙四寸九分深三寸一分耳髙一寸八分闊一寸二分口徑四寸二分腹圍一尺七寸五分重六十四兩右通蓋髙七寸九分深四寸耳髙二寸闊一寸四分口徑五寸八分腹圍二尺一寸九分重九十五兩右通蓋髙八寸三分深五寸五分耳髙三寸闊二寸口徑九寸三分腹圍三尺三寸重三百三十兩右通蓋髙五寸二分深三寸三分耳髙二寸闊一寸四分口徑四寸六分腹圍二尺六分重九十七兩右通蓋髙五寸深三寸二分耳髙一寸七分闊一寸一分口徑四寸三分腹圍一尺七寸二分重五十九兩右通蓋髙三寸九分深二寸五分耳髙一寸四分闊一寸五分口徑三寸七分腹圍一尺三寸五分重三十一兩右通蓋髙六寸二分深四寸二分耳髙二寸闊一寸四分口徑六寸腹圍二尺二寸七分重一百四十七兩右髙七寸深四寸七分耳髙一寸九分闊二寸一分口徑九寸七分腹圍二尺八寸三分重一百一十九兩右通蓋髙五寸深二寸九分耳髙一寸四分闊一寸一分口徑四寸四分腹圍一尺七寸一分重二十六兩右通蓋髙八寸八分深五寸一分耳髙三寸四分闊二寸五分口徑八寸三分腹圍三尺四分重二百三十五兩右通蓋髙七寸八分深五寸二分耳髙二寸九分闊一寸九分口徑七寸四分腹圍二尺六寸三分重一百六十三兩右通蓋髙四寸五分深二寸九分耳髙一寸六分闊一寸口徑四寸六分腹圍一尺七寸五分重六十四兩右通蓋髙六寸一分深三寸四分耳髙一寸七分闊一寸口徑四寸三分腹圍一尺八寸重八十五兩右通蓋髙四寸九分深三寸一分耳髙一寸八分闊一寸口徑四寸六分腹圍一尺八寸四分重七十一兩右通蓋髙五寸四分深三寸一分耳髙一寸六分闊一寸三分口徑四寸九分腹圍一尺八寸五分重六十兩右通蓋髙五寸一分深三寸四分耳髙一寸五分闊一寸一分口徑四寸八分腹圍一尺八寸五分重五十五兩右髙一寸八分深一寸五分耳髙八分闊五分口徑二寸三分腹圍九寸重九兩缺蓋右髙七寸五分深五寸六分耳髙二寸五分闊一寸六分口徑九寸二分腹圍二尺八寸五分重八十九兩右通蓋髙五寸九分深三寸四分耳髙二寸二分闊一寸三分口徑五寸三分腹圍二尺一寸重八十七兩右通蓋髙五寸三分深三寸三分耳髙二寸闊一寸三分口徑五寸