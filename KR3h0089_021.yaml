body:
  text: 西清古鑑卷十八瓶周亞㦸瓶有銘雲雷瓶有銘蟬紋瓶冇銘素瓶漢葵花瓶𤓰紋瓶素瓶一素瓶二素瓶三素瓶四素瓶五素瓶六硯頭瓶唐龍鳳雙管瓶一龍鳳雙管瓶二素瓶一素瓶二素瓶三素瓶四右髙一尺二寸九分深一尺一寸七分口徑三寸三分腹圍二尺四寸九分重一百三十五兩貫耳博古圖貫耳壺五口徑特侈此弇口當為瓶古人所以有守口之喻也右髙五寸二分深五寸口徑二寸八分腹圍九寸四分重十七兩右髙八寸三分深八寸一分口徑一寸五分腹圍一尺三分重二十九兩詩瓶之罄矣維罍之恥故知瓶小而罍大此器按圖應為瓶而銘曰尊彞亦通詞也右髙七寸五分深七寸二分口徑一寸六分腹圍一尺二分重二十三兩右髙五寸三分深五寸二分口徑二寸八分腹圍九寸七分重十五兩右髙二寸八分深二寸五分口徑九分腹圍六寸重八兩右髙七寸七分深七寸三分口徑一寸九分腹圍一尺九分重二十五兩右髙七寸四分深七寸口徑一寸五分腹圍九寸五分重十七兩右髙七寸三分深六寸七分口徑一寸六分腹圍一尺一寸髙分重二十二兩右髙七寸一分深六寸七分口徑一寸四分腹圍一尺重十五兩右髙六寸五分深五寸二分口徑一寸六分腹圍九寸三分重十三兩右髙五寸七分深五寸二分口徑一寸一分腹圍七寸五分重八兩右髙二寸二分深一寸九分口縱一寸五分橫如之通長三寸濶一寸七分重六兩右髙五寸深四寸六分口徑各一寸四分腹圍各四寸一分重二十五兩右髙四寸一分深三寸五分口徑二寸腹圍四寸八分重三十九兩右髙一尺二分深七寸五分口徑三分腹圍一尺七分重二十三兩制為瓶而有流如壺可以挹注意度殊詭或云名甘露瓶浮屠氏供佛所用葢唐代物也右髙六寸六分深六寸三分口徑一寸五分腹圍九寸六分重十九兩有流右髙六寸四分深六寸二分口徑一寸三分腹圍九寸重十六兩有流右髙九寸七分深九寸五分口徑一寸九分腹圍一尺二寸五分重三十九兩有流西清古鑑卷十八
