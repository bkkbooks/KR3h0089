body:
  text: 西清古鑑目録譜録類一器物之屬卷一鼎一二十七器卷二鼎二三十器卷三鼎三三十六器卷四鼎四一十九器卷五鼎五三十器卷六鼎六五十一器卷七鼎七四十器卷八尊一三十八器卷九尊二四十三器卷十尊三四十一器卷十一尊四三十六器卷十二罍一十七器卷十三彝一三十五器卷十四彝二三十二器舟五器卷十五卣一二十四器卷十六卣二三十九器卷十七卣三三十二器卷十八瓶一十九器卷十九壺一四十器卷二十壺二三十六器卷二十一壺三六十九器卷二十二壺四二十八器卷二十三爵四器斚一十三器觚一二十九器卷二十四觚二四十八器卷二十五觚三三十九器卷二十六觶四十二器角三器斗二器勺一器巵二器卷二十七敦一二十一器卷二十八敦二二十八器卷二十九簠一十六器簋七器豆一十七器鋪一器鏊一器卷三十甗二十四器錠二器鐙一器卷三十一鬲一十六器鍑一十二器盉二十九器冰鑑四器卷三十二匜三十一器盤一十七器鋗一器卷三十三洗四十器盂一十四器盆一器卷三十四量一器區一器鍾四器斗一器瓿三十器缶一器卷三十五盦六器鐎斗九器奩七器罐三器臼一器卷三十六鐘四十二器鐸四器鈴二器卷三十七錞四器戚六器鐃十器鼓一十四器卷三十八刀一器劍三器弩機二器符一器钁二器杠頭三器儀器飾五器杖頭一器鐓七器鳩車一器表座三器硯滴六器書鎮三器糊斗三器罏一十五器七首一器卷三十九鑑一二十二器卷四十鑑二七十一器臣等謹案西清古鑑四十卷乾隆十四年命內廷諸臣編輯取內府庋藏古鼎彜尊罍之屬按器為圖因圖系説詳其方圓圍徑之制髙廣輕重之等摹篆銘詞各為釋文其體例依仿博古考古二圖而參以歐陽修董逌黃伯思張掄薛尚功諸家之論説其中援據經史析疑辨訛如周文王鼎銘之魯公斷為伯禽而非周公周晉薑鼎銘之文侯據虎賁云云與書文侯之命合斷為文侯虎而非文公重耳漢定陶鼎據漢書地理志濟隂郡注宣帝甘露二年更名定陶斷此鼎為宣帝中定陶共王康作而非趙共王恢此皆博古圖舛誤之甚而糾正之者又如博古圖載商祖癸鼎謂我之字從戈者敵物之我也云云則斥其雜用王安石字説之非又博古圖載王氏銅虹燭錠謂是薦熟食器云虹燭者其氣如虹之意蓋其器不全從而傳會兹於周素錠引説文以錠為鐙正之其他如周召夫鼎周魚鼎之屬駁正者不勝枚舉而於舊説之可從者一長必採如周單卣銘文爵字景字從博古圖豐字則從鐘鼎欵識未嘗偏廢獨銘首字則證為不當作囧於兩家皆訂其失商瞿卣引竹書紀年商武名瞿亦足以補博古所未及至周靁紋舟以周官春官用兩象尊皆有罍例用雞彛皆有舟定舟為彛之副以訂鄭氏謂舟如今承槃之非周象尊據器而訂周官司尊彛注謂飾以象骨之非周犧尊據器而知鄭氏飾以翡翠之説為誤會詩傳犧尊有莎飾之文而訛周虎錞引周官鼓人以金錞和鼓鄭注證南史灌之以水及以器盛水於下以芒莖當心跪注之之説為非則尤有禆於經典之學者又周邢侯方彛銘十八月乙亥證以管子十三月令人之魯二十四月魯梁之民歸齊二十八月萊莒之君請復之數語以破歐陽修蔡襄劉敞輩不解洛鼎銘十有四月之疑其精博詳核洵非從來考古家所能窺及也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
