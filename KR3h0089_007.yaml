body:
  text: 西清古鑑卷四鼎四周象鼎有銘犧鼎有銘羊鼎有銘魚鼎有銘雞鼎有銘兕鼎一有銘兕鼎二有銘兕鼎三有銘兕鼎四有銘亞鼎一有銘亞鼎二有銘亞鼎三有銘亞鼎四有銘亞鼎五有銘亞鼎六有銘亞鼎七冇銘亞鼎八有銘寳鼎有銘鳳文鼎有銘右髙七寸三分深三寸七分耳髙一寸五分濶一寸六分口縱五寸横六寸四分腹縱四寸二分横五寸五分重一百四十七兩銘曰冊昭錫命也下作象按周禮再獻用兩象尊此當云象鼎右髙七寸八分深五寸六分耳髙一寸六分濶二寸口徑七寸四分腹圍二尺四寸八分重一百六十七兩古人制器多象形周有犧尊有牛鼎其制不一先儒謂畫於腹又謂其足以牛羊豕為飾不盡然也右髙五寸六分深二寸九分耳髙一寸濶一寸二分口徑五寸二分腹圍一尺五寸六分重四十七兩周制有羊鼎此銘曰羊是也右髙五寸八分深三寸六分耳髙一寸三分濶一寸五分口徑五寸五分腹圍一尺六寸九分重七十三兩銘與博古圗載商魚鼎三字均合篆竒古義不相屬今姑以意疏之而辨舊說之謬於左按月字盖月日耳古器紀年不繫以甲子後人見元年二年不能証為何王也紀月不繫以年後人見正二三月不能証為何年也此銘只書月疑即歳首魚字象形儀禮司馬舉羊鼎司士舉豕鼎魚鼎此疑即魚鼎應為周制又史記契後子姓之國有目夷氏宋桓公之子名目夷字子魚則知目夷之義盖取諸魚目夷後魚氏世為左師桓族又有公子鱗為鱗氏又衛有史鰌公子鱄鄭公子鰌晉士魴樂王鮒楚公子魴則魚或人名亦於商代無據基盖堂基言所祭之地而博古圖引說文以為薦物之丌義亦未安至其釋月魚之說曰祭月于夜明以其類求之又求其類於物如季冬薦魚春薦鮪以其時為獻薦夫祀天神無用鼎烹之事且月與魚迥非同類而強為附㑹君子所不取也右髙五寸一分深三寸一分耳髙一寸一分濶一寸四分口徑五寸腹圍一尺六寸二分重七十三兩周禮雞人疏云雞人大祭祀夜呼旦雞又屬木在春銘作雞形義盖取此右髙六寸二分深三寸七分耳髙一寸四分濶一寸六分口徑六寸腹圍一尺七寸八分重一百三兩按兕郭璞山海經圗賛曰皮充武備角昭文徳故古人制器尚象多用之右髙五寸九分深二寸九分耳髙一寸三分濶一寸五分口徑五寸五分腹圍一尺六寸三分重五十六兩仲古文皆作中旁象形二亦為兕盖猛獸示威武也右髙五寸二分深二寸六分耳髙一寸一分濶一寸三分口縱三寸九分横五寸三分腹縱三寸一分横四寸四分重六十九兩右髙七寸四分深四寸九分耳髙一寸八分濶二寸五分口徑一尺一分腹圍三尺六分重一百六十五兩金銀錯右髙六寸三分深三寸九分耳髙一寸四分濶一寸七分口徑六寸五分腹圍二尺重八十七兩右髙五寸五分深三寸五分耳髙一寸二分濶一寸三分口縱四寸七分横五寸五分腹縱四寸横四寸九分重七十八兩右髙六寸三分深三寸一分耳髙一寸二分濶一寸三分口縱四寸六分横五寸六分腹縱四寸横五寸重八十九兩右髙六寸五分深二寸五分耳髙一寸四分濶一寸五分口徑六寸三分腹圍一尺九寸一分重七十五兩右髙五寸三分深三寸三分耳髙一寸二分濶一寸四分口徑五寸腹圍一尺六寸重六十六兩右髙六寸五分深四寸一分耳髙一寸五分濶一寸八分口徑六寸三分腹圍一尺九寸六分重八十四兩右髙五寸七分深三寸二分耳髙一寸濶一寸一分口徑五寸一分腹圍一尺五寸六分重五十九兩銘亞形弗全下二字亦剥脫不可辨右髙六寸二分深三寸一分耳髙一寸二分濶一寸三分口縱四寸五分横五寸七分腹縱四寸四分横五寸五分重九十四兩右髙五寸七分深三寸五分耳髙一寸二分濶一寸四分口徑六寸四分腹圍二尺四分重九十七兩古文周與舟同此銘舟作不必泥他銘取義舟車之說右髙五寸八分深三寸二分耳髙一寸五分濶一寸四分口縱四寸五分横五寸六分腹縱三寸八分横四寸七分重七十三兩西清古鑑卷四
