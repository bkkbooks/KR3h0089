body:
  text: 西清古鑑卷九尊二周舉尊一有銘舉尊二有銘舉尊三有銘舉尊四有銘舉尊五有銘史尊有銘革尊有銘事尊有銘古仲尊有銘仲尊有銘仲駒尊有銘叔畎尊有銘北子尊有銘即月尊有銘乙卯尊有銘戊尊有銘辛尊一有銘辛尊二有銘子尊一有銘子尊二有銘子尊三有銘兄尊有銘象尊一象尊二犧尊一有銘犧尊二犧尊三犧尊四犧尊五犧尊六犧尊七犧尊八犧尊九犧尊十犧尊十一犧尊十二犧尊十三有銘犧尊十四有銘犧尊十五雞尊一雞尊二鳬尊一有銘鳬尊二右高七寸一分深五寸七分口徑七寸三分腹圍一尺八寸三分重七十五兩舊說鼎之小者皆可舉故謂之舉鼎左氏傳謂之杜舉者蓋指觶而言然古人祭器多銘曰舉曰拱皆致敬之意右高七寸五分深五寸九分口徑六寸二分腹圍一尺三寸重六十一兩右高七寸七分深六寸三分口徑六寸四分腹圍一尺二寸九分重六十一兩銘舉與前器同舉之名至周世始見博古圖所載諸銘舉者雜出於商周蓋失考顧或以祖辛為疑然周人名辛者甚多如尹辛瑕辛皆是祖則其子姓稱之耳又況凡以十干為銘者不必定是其人之名似不得指為商器也右高八寸一分深六寸五分口徑六寸二分腹圍一尺三寸三分重七十一兩右高五寸四分深四寸七分口徑五寸腹圍一尺二寸七分重三十一兩右高六寸一分深五寸三分口縱三寸九分横五寸一分腹圍一尺三寸六分重五十六兩銘一字曰史與史鼎同右通蓋高五寸深三寸口縱二寸九分横三寸六分腹圍一尺八分重三十七兩銘曰革作在周則邾桓公名革又里革又鄭子革楚右尹子革然不可考矣右高六寸深五寸一分口縱四寸二分横四寸九分腹圍一尺五寸八分重四十一兩事蓋作者之名字三點為伊出於梵書三代彞器不應有此鐘鼎字源援父乙甗讀作小顧今博古圖刻本無此字姑從之以俟考右高六寸三分深五寸六分口徑五寸四分腹圍一尺四寸重五十三兩博古圖有商父丁尊銘僅二字按太公封於齊其子丁公則父者尊稱丁不必定屬殷號也某仲作他周器欵同在昔以官為氏或又以字以名後世有古姓如古弼豈其苗裔耶右高一尺三寸七分深一尺二寸口縱三寸九分横四寸七分腹圍二尺四寸九分重一百八十一兩銘曰天右王伯友命作朕後詩保右命之維天其右之俱作右故知右與佑同焦氏易林王伯遠宿長婦在房則王伯不必其官也三代前多稱朕者仲尊則主器者自識銘詞稱天稱命蓋侈其事下文丐睂壽無疆則祝詞也春秋多名友者最著則生而有文在手曰友是己右通蓋高一尺九寸六分深一尺四寸三分口縱五寸二分横六寸五分腹圍三尺五分重四百三兩金銀錯此當為尊而銘曰敦昔歐陽修跋終南古敦銘言大理評事蘇軾為鳳翔府判官得古敦於終南山下初莫知為敦也其銘有寶尊敦之文遂以為敦豈亦此類耶内府所收仲駒敦銘與此合特左旋讀博古圖仲駒父敦銘並同然圖象俱絶無髣髴博古圖敦之屬凡二十餘即今所錄勒為敦字者皆無此形制此器固當仍命之為尊至仲駒仲姜則博古圖錄詳之右高七寸五分深六寸一分口徑六寸腹圍一尺三寸四分重五十九兩銘曰叔畎作田旁犬字象形古文多如此右高六寸一分深五寸二分口徑五寸四分腹圍一尺二寸三分重三十四兩左氏傳齊氏之宰渠子召北宫子又衛侯賜北宫喜諡曰貞子又北門子見列子力命篇此云北子其即北門北宫類耶右高七寸六分深五寸八分口徑六寸六分腹圍一尺一寸六分重九十九兩銘曰元年上稱惟王命蓋古者侯國各稱元年此尊蓋始封之君承王命而作也即月猶言是月耳右高八寸六分深六寸九分口徑六寸五分腹圍一尺二寸六分重九十一兩右高五寸五分深四寸九分口徑五寸一分腹圍一尺四寸一分重三十七兩與博古圖所載形製不類此蓋周器也右高一尺四分深七寸七分口徑六寸七分腹圍九寸七分重八十七兩右高七寸八分深六寸三分口徑六寸腹圍一尺一寸四分重五十四兩銘首一字漫漶不可識右高八寸四分深五寸五分口徑五寸八分腹圍五寸重四十兩右高六寸五分深四寸七分口徑四寸二分腹圍六寸一分重二十三兩右高七寸八分深五寸三分口徑五寸九分腹圍一尺一寸八分重六十七兩右高六寸五分深五寸六分口徑六寸二分腹圍一尺三寸三分重五十兩右高一尺三分深八寸口徑三寸六分通長一尺五分闊四寸八分重一百四十七兩周禮司尊彛注謂象尊者飾以象骨據此器始知其謬右高九寸八分深七寸九分口徑三寸九分通長一尺五分闊四寸七分重一百七十三兩右通蓋高五寸四分耳高一寸九分闊八分深三寸四分口徑二寸通長一尺一寸闊四寸五分重一百四十五兩魯頌閟宫之詩曰犧尊將將傳云犧尊有莎飾也疏謂作獻尊即周禮其朝踐用兩獻尊也而鄭説謂飾以翡翠禮圖謂犧尊飾以牛王肅謂形如牛象而背上負尊朱子謂畫牛於尊之腹也或曰尊作牛形鑿其背以受酒按飾以翡翠之説緣莎飾之誤至諸家所稱不一今内府所藏器多有或銘字象形或飾於足此器則朱子所謂或曰鑿其背以受酒者與梁劉杳之説合銘詞曰帝肇稱嘉禮春官大宗伯之職以嘉禮親萬民是也右高八寸五分耳高一寸五分闊七分深七寸四分口徑三寸六分通長九寸六分闊三寸八分重九十一兩金錯右通蓋高六寸六分耳高二寸六分闊一寸九分深三寸六分口徑二寸一分通長一尺三寸七分闊五寸七分重二百三十五兩右通蓋高六寸三分耳高一寸六分闊八分深三寸八分口徑一寸九分通長一尺二寸九分闊四寸六分重一百六十三兩金銀錯右高八寸三分耳高九分闊六分深七寸一分口徑四寸二分通長八寸七分闊三寸八分重八十三兩金銀錯右通蓋高五寸九分耳高一寸七分闊八分深三寸三分口徑二寸四分通長一尺一寸三分闊四寸二分重一百二十五兩金銀錯右通蓋高六寸二分耳高一寸七分闊八分深三寸一分口徑二寸二分通長一尺一寸三分闊三寸九分重一百四十三兩銀錯右通蓋高六寸一分耳高一寸五分闊七分深三寸二分口徑二寸三分通長一尺八分闊三寸九分重一百五十七兩金銀錯右通蓋高四寸四分耳高一寸五分闊九分深二寸四分口徑一寸七分通長七寸二分闊二寸九分重五十兩銀錯右通蓋高六寸五分耳高二寸四分闊一寸三分深三寸九分口徑二寸通長一尺一寸六分闊四寸七分重一百七十三兩金銀錯右通蓋高六寸四分耳高一寸六分闊八分深三寸二分口徑二寸二分通長一尺八分闊三寸七分重一百三十九兩金銀錯右通蓋高三寸耳高五分闊四分深一寸七分口徑一寸三分通長四寸四分闊二寸一分重三十一兩右高六寸六分深五寸四分口徑五寸八分腹圍一尺二寸六分重四十五兩銘象牽犧眀子職也與前犧尊自别右高八寸五分深六寸三分口徑六寸六分腹圍一尺二寸五分重七十三兩銘字亦象形右高六寸三分耳高一寸八分闊七分深四寸二分口徑二寸六分通長一尺三寸闊四寸一分重一百一十二兩金銀錯右高一尺五寸深一尺八分口徑六寸通長一尺一寸五分闊六寸二分重一百九十一兩按祼用雞彛漢賈公彦謂上尊曰彛此雞尊是巳右高六寸八分深五寸八分口徑三寸一分通長四寸九分闊三寸五分重四十二兩右高四寸二分深三寸口徑一寸二分通長三寸五分闊二寸二分以口為流有提梁重一十五兩鳬形詩鳬鷖五章皆稱公尸朱子謂祭之明日繹而賓尸之樂銘亞中孫蓋孫為尸也右高七寸三分深四寸九分口徑二寸一分通長一尺一寸九分闊四寸六分以口為流有提梁重九十八兩銀錯西清古鑑卷九
