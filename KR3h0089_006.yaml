body:
  text: 西清古鑑卷三鼎三周舉鼎一有銘舉鼎二有銘舉鼎三有銘舉鼎四有銘舉鼎五有銘舉鼎六有銘舉鼎七有銘拱鼎一有銘拱鼎二有銘掬鼎冇銘婦鼎一有銘婦鼎二有銘婦鼎三有銘婦鼎四有銘文鼎一有銘文鼎二有銘文鼎三有銘鑄鼎有銘友史鼎有銘史頌鼎有銘史造鼎有銘史鼎有銘錫貝鼎一有銘錫貝鼎二有銘錫貝鼎三有銘子東鼎有銘韋鼎有銘虎鼎有銘仲鼎有銘子弓鼎有銘子鼎有銘子孫鼎有銘丁甲鼎有銘辛癸鼎有銘丁子鼎有銘丁亥鼎有銘右髙五寸三分深一寸八分耳髙一寸一分濶一寸三分口徑五寸二分腹圍一尺四寸五分重三十八兩博古圗有周鼎亦銘曰子父舉即此器頋以父從其子釋子父按子為周爵又殷本紀封於商賜姓子氏然則子父者安知非單父毛父類耶凡器之可舉者古皆謂之舉如𫝊稱杜舉是也右髙五寸三分深二寸八分耳髙一寸二分濶一寸三分口徑五寸三分腹圍一尺六寸五分重五十一兩器之小者皆可舉如前器銘子父舉不必皆酒器也辛盖紀日或以差其器博古圗有商父舉卣其銘曰辛父舉而考謂宋僖公名舉夫既以為宋僖公作則在周世安得謂商物若以辛為商號因謂之商則商君以辛名者有四又安得臆斷為某辛耶右髙六寸深三寸二分耳髙一寸三分濶一寸五分口徑六寸五分腹圍一尺七寸七分重六十一兩右髙六寸八分深四寸八分耳髙一寸五分濶一寸八分口徑七寸腹圍二尺一寸九分重一百九兩舉字下為象形鷹按師尚父曰鷹揚或用銘武功也右髙五寸八分深三寸五分耳髙一寸二分濶一寸五分口徑五寸六分腹圍一尺六寸九分重五十一兩銘曰婦娖說文娖謹也豈其名耶右髙五寸七分深二寸九分耳髙一寸二分濶一寸三分口徑五寸三分腹圍一尺六寸四分重六十六兩右髙一尺七分深七寸六分耳髙二寸一分濶二寸六分口徑一尺二分腹圍三尺三寸五分重二百八十八兩右髙六寸五分深二寸六分耳髙一寸四分濶一寸九分口徑六寸腹圍一尺六寸九分重四十九兩銘字作兩手拱物狀曰拱猶舉也右髙五寸五分深二寸四分耳髙九分濶一寸一分口徑四寸八分腹圍一尺五寸四分重四十七兩右髙五寸三分深二寸七分耳髙一寸三分濶一寸二分口徑五寸一分腹圍一尺五寸五分重五十二兩按詩詁兩手曰臼屈掌曰掬即古掬字猶舉也拱也又上一字曰聿鐘鼎欵識有聿逺鬲銘聿逺作薛尚功曰乃作鬲者之人也篆法同右髙五寸三分深二寸五分耳髙一寸濶一寸一分口徑五寸腹圍一尺五寸六分重四十八兩周禮所載如主婦自東房執一金敦之類甚多此曰婦盖其所執也右髙六寸三分深四寸耳髙一寸三分濶一寸八分口徑六寸二分腹圍一尺九寸七分重一百一十兩右髙五寸七分深三寸六分耳髙一寸一分濶一寸五分口徑五寸六分腹圍一尺六寸二分重七十七兩右髙五寸六分深二寸八分耳髙一寸一分濶一寸二分口縱四寸横五寸二分腹縱三寸七分横四寸八分重七十一兩右髙四寸二分深二寸耳髙九分濶一寸口縱三寸二分横四寸一分腹縱二寸四分横三寸二分重四十六兩按公者周列爵之稱文盖其所祭者之諡也右髙五寸六分深二寸七分耳髙一寸六分濶一寸五分口徑五寸四分腹圍一尺六寸九分重六十二兩右髙五寸七分深二寸八分耳髙一寸一分濶一寸五分口徑五寸四分腹圍一尺六寸九分重六十九兩右髙七寸一分深四寸六分耳髙一寸九分濶二寸七分口徑九寸三分腹圍二尺九寸五分重三百一十五兩左氏傳臧宣叔娶于鑄杜預注鑄國名銘曰鑄是其徴也右髙五寸五分深三寸一分耳髙一寸濶一寸二分口徑五寸二分腹圍一尺六寸五分重六十七兩銘欵與博古圗商父乙鼎合按友史如太史友内史友非殷人語也曰辰見如傳稱龍見而雩周禮注太史占日之官正歳年以授時故銘云爾宣和以父乙二字遽定為商殊未安右髙七寸四分深四寸三分耳髙一寸七分濶二寸一分口徑八寸九分腹圍二尺七寸一分重二百五十六兩銘曰王在宗周又曰盩于成周盩同戾盖史頌者奉王命自西都往洛陽也􅀈篇海音木堣說文謂即嵎字意俱人名馬三所義不可曉薛氏鐘鼎欵識載寅簋有此文三所並作合字前周巳鼎一所亦合字也頵說文訓大則銘言天子頵命猶稱大命耳右髙五寸二分深三寸二分耳髙一寸濶一寸一分口徑五寸四分腹圍一尺七寸六分重五十一兩周有史過史興史皆其官而過與興則名也此云史造類是右髙五寸深二寸六分耳髙一寸一分濶一寸四分口徑四寸九分腹圍一尺一寸五分重四十一兩史皆周官而後世有史佚史鰌史趙遂以官為氏内府所収彞卣觚皆有銘一字曰史者與此同右髙六寸四分深三寸三分耳髙一寸五分濶如之口縱四寸八分横六寸一分腹縱四寸一分横五寸四分重一百一兩古人於君賜多銘鐘鼎以傳示子孫使之世守此銘曰王錫某父貝是其騐也銘前象形為鳥盖制器者逺取諸物雞鳥虎蜼皆以名彞而說者謂朱鳥為南方之物主禮此其取義所在耶右髙五寸四分深三寸三分耳髙一寸五分濶如之口縱五寸横六寸一分腹縱四寸三分横五寸四分重八十五兩按禹貢厥篚織貝則貝錦也易億喪貝注資貨糧用之屬也盤庚具乃貝玉疏貝者水蟲古人取其甲以為貨如今之用錢顧命稱大貝𫝊謂大貝如車渠然古者貨貝而寳龜此與前器皆鄭重其詞用昭君賜也右髙六寸四分深三寸三分耳髙一寸四分濶一寸五分口縱四寸九分横六寸一分腹縱四寸二分横五寸三分重八十八兩銘與前二器同休盖人名右髙四寸八分深三寸二分耳髙八分濶一寸五分口徑四寸八分腹圍一尺五寸重四十三兩子盖執器者自謂銘曰東按禮器云應鼓在東此器疑列於東序如應鼓例耳右髙五寸三分深二寸五分耳髙一寸一分濶一寸四分口徑五寸三分腹圍一尺六寸五分重五十二兩商有豕韋國專稱韋至周之韋氏則以官為氏故後世有韋族銘韋作盖其氏耳右髙五寸七分深三寸一分耳髙一寸四分濶一寸三分口縱四寸七分横五寸八分腹縱四寸一分横五寸二分重九十七兩亞形中一字據薛尚功讀作虎周以虎名者甚衆不必泥召虎以傅㑹也右髙六寸深三寸一分耳髙一寸二分濶一寸五分口徑五寸六分腹圍一尺七寸八分重七十二兩周人多有字曰仲者只一字如張仲南仲是也有名仲者則魯衆仲衛華仲鄭祭仲皆是又仲為姓然幼名冠字五十以伯仲銘僅稱仲作或其仲子不必疑為某仲矣右髙五寸五分深二寸九分耳髙一寸三分濶一寸七分口徑五寸四分腹圍一尺六寸七分重六十六兩右髙七寸四分深四寸四分耳髙二寸二分濶二寸四分口徑一尺五分腹圍三尺一寸二分重一百九十四兩右髙五寸四分深三寸耳髙一寸三分濶如之口徑五寸三分腹圍一尺六寸五分重四十三兩右髙六寸三分深四寸三分耳髙一寸四分濶一寸八分口徑六寸五分腹圍二尺七分重一百二十九兩銘為屋室形象廟貌也曰丁曰甲張掄古器評所謂布丙丁甲乙於四隅者皆是紀日此可證巳右髙五寸一分深三寸二分耳髙九分濶一寸二分口徑五寸腹圍一尺四寸七分重四十四兩右髙七寸八分深五寸耳髙一寸七分濶二寸二分口徑八寸一分腹圍二尺七寸四分重二百八兩銘不可識者四字意義亦難曉曰丁子與頌鼎同他器若此者甚多宋黄伯思謂史伯碩父鼎文曰巳子以巳乗子疑誤然戊與巳同類古尚未分巳子乃戊子也又甲與巳合故甲子亦可云巳子則此云丁子當即丙子或壬子頋三代書傳紀干文相乗者皆不然黄氏似涉附㑹揆諸闕疑之義固不必強為之觧矣後云錫云貝朋兩貝為朋詩稱錫我百朋是也右髙七寸八分深四寸六分耳髙二寸二分濶二寸口縱六寸七分横九寸腹縱五寸七分横八寸重一百六十七兩商欵簡質此當為周人製而銘詞首末與博古圗周蛟篆鐘語同薛尚功云當作商器按周書洪範有相協厥居語銘曰協應與書詞同義此語出武王亦未見其必為商器也西清古鑑卷三
