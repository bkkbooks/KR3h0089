body:
  text: 乾隆十四年十一月初七日奉上諭􅃉古法物流𫝊有自者惟尊彞鼎鼐厯世恒遠良以質堅而體厚不為燥濕所移剥蝕所損淵然之光穆乎可見三代以上規模氣象故嗜古之士亟有取焉宣和博古一圖播在藝苑繼之者有吕氏考古圖而外此紀載寂寥豈非力能致之而弗能聚所見隘而無足紀歟我朝家法不事玩好民間鑒賞概弗之禁而殿廷陳列與夫内府儲藏者未嘗不富朕於幾務晏閒間加品題夷考舊圖多所未載因思古器顯晦有時及今不為之表章載之簡牘考索者其奚取徵焉爰命尚書梁詩正蔣溥汪由敦率同内廷翰林倣博古圖遺式精繪形模備摹款識為西清古鑑一編以游藝之餘功寄鑒古之遠思亦足稱昇平雅尚云特諭
