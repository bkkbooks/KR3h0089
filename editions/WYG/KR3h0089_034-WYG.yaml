body:
  text: 西清古鑑卷三十一鬲商祖癸鬲有銘周太公鬲有銘尊鬲有銘蠆鬲有銘伯鬲有銘仲鬲有銘瞿鬲有銘四足鬲一四足鬲二四足鬲三象鬲饕餮鬲一饕餮鬲二素鬲一素鬲二素鬲三鍑周弦紋鍑一弦紋鍑二􅂷紋鍑三足鍑素鍑漢金鍑有銘蟠虺鍑獸環鍑素鍑一素鍑二素鍑三素鍑四盉商祖辛盉有銘周邢侯盉有銘虢盉有銘季高盉有銘田盉有銘伯矩盉有銘伯定盉有銘仲阜盉有銘大父盉有銘女盉有銘福盉有銘子盉有銘犧鋬盉有銘三足盉有銘雲雷盉蛟螭盉蟠螭盉一蟠螭盉二龍首盉鳯首盉一鳯首盉二螭首盉螭梁盉一螭梁盉二螭梁盉三螭梁盉四螭梁盉五螭梁盉六素盉冰鑑周冰鑑一有銘冰鑑二冰鑑三冰鑑四右高四寸四分深三寸一分口徑四寸四分腹圍一尺三寸六分重三十六兩兩耳三足右高三寸五分深二寸二分口徑四寸六分腹圍一尺三寸八分重三十二兩三足有太公敦銘曰太公作釁從彛此云太公作釁享一時作也右高三寸八分深二寸二分口徑五寸二分腹圍一尺五寸六分重四十七兩三足古器多銘曰尊彞舊説謂可尊曰尊可法曰彞此鬲曰尊鬲是也右高四寸五分深二寸五分口徑三寸八分腹圍一尺一寸四分重二十五兩兩耳三足博古圖有商蠆鼎形制弗類春秋時名蠆者甚多蜂蠆猶有毒而况於人乎此周人語也古者銘物以寓警或有取於此云右高三寸八分深二寸二分口徑四寸一分腹圍一尺二寸三分重二十四兩兩耳三足右高四寸六分深二寸九分口徑四寸八分腹圍一尺四寸四分重三十七兩兩耳三足下注俱空爾雅所謂欵足是已右高七寸深三寸四分口徑五寸八分腹圍一尺八寸四分重八十四兩四耳四足内府所錄有瞿父鼎瞿卣瞿觚瞿字作横目形與博古圖合此篆文不類又銘曰作鬲與他周器書法同知非商物矣下曰命明其有所受非私製也右高四寸四分深三寸六分口徑三寸八分腹圍一尺二寸四分重四十一兩兩耳四足銘不可識末一字類鬲右高六寸四分深四寸五分口縱四寸三分横五寸八分腹圍二尺三寸五分重一百三十一兩兩耳四足右高六寸二分深三寸九分口徑四寸九分腹圍二尺重九十五兩兩耳四足右高四寸五分深三寸一分口徑四寸三分腹圍一尺六寸重三十五兩兩耳三足右高六寸深三寸九分口徑四寸九分腹圍一尺六寸八分重五十四兩兩耳三足右高五寸三分深三寸口徑四寸六分腹圍一尺六寸二分重五十七兩兩耳三足右高四寸三分深二寸九分口徑四寸四分腹圍一尺三寸六分重二十五兩兩耳三足右高五寸九分深三寸七分口徑五寸腹圍一尺五寸八分重四十三兩兩耳三足右高五寸八分深三寸五分口徑四寸九分腹圍二尺一寸六分重一百一十五兩兩耳三足右通蓋高一尺四寸二分深八寸九分口徑七寸二分腹圍四尺六寸五分重八百五十一兩三耳連環三足按此器據揚子方言名稱不一曰鍑曰錡曰鬵不甚可辨皆釡之屬耳今從博古圖並錄之右高六寸七分深六寸三分口徑四寸四分腹圍二尺五寸二分重一百三兩兩耳連環三足右高八寸八分深八寸四分口徑九寸二分腹圍三尺六寸七分重二百二十七兩右通蓋高八寸八分深六寸四分口徑八寸三分腹圍二尺九寸重二百一十九兩兩耳連環三足右高七寸九分深七寸七分口徑九寸二分腹圍三尺三寸五分重一百九兩右通蓋高七寸五分深五寸一分口徑七寸五分腹圍二尺七寸八分重一百一十一兩兩耳三足銘一字曰金蓋其氏如嚴氏洗耳右高七寸三分深六寸口徑五寸四分腹圍二尺四寸五分重一百一十三兩兩耳連環三足右高五寸一分深五寸口徑二寸九分腹圍二尺四分重三十七兩兩耳連環右通蓋高六寸五分深五寸四分口徑六寸五分腹圍二尺二寸重六十五兩兩耳連環右高三寸三分深三寸二分口徑三寸三分腹圍一尺五寸八分重二十八兩右高三寸二分深三寸一分口徑二寸五分腹圍一尺五寸六分重一十六兩右高二寸深一寸九分口徑一寸三分腹圍九寸五分重一十兩右通蓋高九寸七分深五寸二分口徑三寸七分腹圍一尺六寸六分重八十兩有流有鋬三足按月正元日月正即正月銘月一蓋一月耳即此見商人之質右通盖高八寸深三寸七分口縱四寸三分横四寸七分腹圍一尺七寸二分重六十七兩有流有鋬四足邢見於詩與春秋世次莫詳魯僖公二十五年衛侯燬滅邢此盉當在東遷以前作後稱夙夕享某吳疑人名也右通蓋高七寸一分深三寸七分口徑三寸八分腹圍一尺五寸五分重五十七兩有流有鋬四足虢仲為周文王弟武王克商封仲於虢城此有國之始平王東遷虢公忌父林父皆入相王室世次莫能詳顧銘曰父乙則知甲乙當别有次第不得謂商物明矣右通蓋高六寸二分深三寸八分口徑三寸腹圍一尺六寸四分重六十四兩有流有鋬三足敦始義未詳銘季高父與季高簠同右通蓋高八寸六分深五寸一分口徑四寸腹圍一尺七寸一分重七十三兩有流有鋬四足内府所藏有田敦靜敦俱銘田字而篆各不同蓋古文多變易其法非博考不能識也右通蓋高八寸五分深四寸六分口徑四寸一分腹圍一尺六寸三分重六十五兩有流有鋬三足銘六字與伯矩尊伯矩甗均合右通蓋高七寸九分深三寸六分口縱四寸四分横四寸一分腹圍一尺六寸三分重七十二兩有流有鋬四足右通蓋高七寸六分深四寸二分口縱四寸四分横如之腹圍一尺八寸九分重八十九兩有流有鋬四足銘六字與仲阜卣同右通蓋高八寸三分深四寸六分口徑三寸五分腹圍一尺五寸三分重六十一兩有流有鋬三足禮記深衣具父母大父母衣純以繢大讀作泰此銘大父大應讀本字盖稱其祖史記留侯世家云大父開地相韓昭侯云云可證也右通蓋高八寸八分深四寸口徑五寸二分腹圍二尺六分重一百一十五兩有流有鋬三足上作字據古文司與嗣同右通蓋高七寸深三寸七分口徑三寸七分腹圍一尺五寸七分重六十兩有流有鋬四足福字亦作象形右通蓋高九寸三分深四寸三分口徑四寸二分腹圍一尺八寸二分重九十五兩有流有鋬三足右通蓋高九寸八分深五寸四分口徑三寸七分腹圍一尺八寸一分重九十九兩有流有鋬三足右通蓋高二寸八分深一寸六分口徑九分腹圍六寸重八兩有流有鋬三足而鳥首意象烏也右通蓋高九寸五分深五寸七分口徑四寸腹圍一尺七寸三分重一百三兩有流有鋬三足右高五寸一分深四寸口徑三寸四分腹圍二尺二寸八分重九十八兩有流有提梁三足缺蓋右通蓋高六寸五分深五寸五分口徑二寸九分腹圍一尺九寸七分重七十四兩有流有提梁三足右通蓋高五寸五分深四寸口徑二寸六分腹圍一尺六寸七分重六十二兩有流有提梁三足右通蓋高一尺九分深七寸四分口徑四寸六分腹圍三尺三寸一分重三百一十二兩兩耳連環有流有提梁三足金銀錯右通蓋高六寸八分深四寸六分口徑三寸四分腹圍二尺一寸二分重一百六兩有流有提梁三足右通蓋高六寸五分深四寸一分口徑三寸二分腹圍二尺四分重九十六兩有流有提梁三足右通蓋高六寸四分深四寸口徑二寸八分腹圍一尺九寸重七十八兩有流有提梁三足右通蓋高五寸八分深四寸一分口徑三寸二分腹圍二尺重七十七兩有流有提梁三足右通蓋高七寸一分深四寸九分口徑三寸四分腹圍二尺一寸二分重一百一十一兩有流有提梁三足右通蓋高五寸七分深三寸九分口徑三寸腹圍一尺八寸一分重九十二兩有流有提梁三足金銀錯右通蓋高五寸六分深四寸口徑三寸腹圍一尺八寸五分重六十五兩有流有提梁三足右通蓋高五寸四分深三寸五分口徑三寸腹圍一尺九寸五分重八十四兩有流有提梁三足金銀錯右通蓋高六寸五分深四寸五分口徑三寸一分腹圍一尺九寸重九十八兩有流有提梁三足右通蓋高六寸五分深三寸七分口徑三寸七分腹圍一尺四寸九分重六十三兩有流有鋬四足右高四寸九分深二九寸分口縱八寸一分横八寸六分重二百三兩兩耳四足與博古圖所載形製同按周禮天官凌人春始治鑑注謂盛冰置食物于中以禦温氣又祭祀共冰鑑故銘婦作弓矢形皆與他祭器一例也右高七寸五分深五寸八分口縱七寸六分横一尺一寸八分腹縱七寸四分横一尺一寸二分重一百三十七兩兩耳右高三寸九分深二寸九分口徑七寸一分腹圍一尺九寸重五十二兩右高二寸八分深二寸一分口縱二寸四分横三寸八分腹圍一尺八分重一十九兩西清古鑑卷三十一
