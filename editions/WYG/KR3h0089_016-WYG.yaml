body:
  text: 西清古鑑卷十三彞一商父乙彞有銘父癸彞有銘祖丁彞有銘若癸方彞有銘周召夫方彞一有銘召夫方彞二有銘魯侯彞有銘邢侯方彞有銘毛伯彞有銘貫彞有銘文父彞有銘䖍彞有銘應公彞一有銘應公彞二有銘公彞有銘伯彞一有銘伯彞二有銘仲彞有銘鬲彞有銘父彞有銘乙叔彞有銘梁叔彞有銘邢叔彞有銘叔彞有銘家彞有銘馬彞有銘舉彞有銘命彞有銘舟彞有銘公史彞有銘史彞有銘子孫彞有銘立戈彞一有銘立戈彞二有銘持弓彞有銘右高四寸一分深三寸四分口徑六寸一分腹圍一尺八寸九分重五十九兩兩耳有珥右高四寸七分深四寸口徑六寸九分腹圍二尺一寸一分重七十六兩兩耳右高四寸五分深三寸七分口徑六寸腹圍一尺八寸一分重六十一兩兩耳有珥右通蓋高八寸八分深三寸八分口縱四寸横四寸九分厎縱三寸二分横三寸九分重一百十九兩此器似後世所謂奩者按奩字惟説苑淳于髠一奩飯云云然是周末時語而六經無此字且銘詞與商若癸鼎合必非後世物亞形為廟故當為祭器蓋即方彞其在商則璉之屬享祀所設也右通蓋高九寸九分深四寸四分口縱四寸五分横五寸五分厎縱四寸二分横五寸一分重二百三十兩銘與召夫鼎合無冊命二字右高六寸一分深四寸四分口縱四寸六分横五寸五分厎縱三寸八分横四寸重一百三十七兩右高七寸深四寸九分口徑六寸四分腹圍一尺一寸九分重一百十一兩兩耳有帶按此為魯祭周公之器銘詞紀勛伐也伐東國其即周公東征事耶遣同譴三族其即三監耶在圃蓋師行次舍左傳襄公四年季孫樹六檟于蒲圃東門之外是其地矣惟王命尊王也明公謂周公周初大封同姓惟魯稱公先儒謂周公懿親而有大功于天下故特崇之曰公下云魯侯蓋主祭者自謂且閟宫之詩曰乃命魯公俾侯于東故公亦稱侯如魯侯之功魯侯是若是也右通蓋高七寸七分深三寸三分口縱三寸七分横四寸七分厎縱三寸三分横四寸二分重七十九兩銘曰十八月攷管子有十三月令人之魯二十四月魯梁之民歸齊二十八月菜莒之君請復之之語而古器有洛鼎銘十有四月歐陽修蔡襄劉敞皆疑之董逌謂自王之即位通數其月蓋時君未改年也右高七寸二分深四寸三分口徑八寸一分腹圍二尺七寸七分重二百四十三兩四耳通足按周成王之末召公領冡宰芮公司徒彤伯宗伯畢公司馬衛侯司冦毛公司空銘詞曰毛伯毛公毛父實一人也在宗周則鎬京矣東國即東都周初殷遺民弗靖淮夷徐戎並興東征之役見于書傳者不一此曰御國人伐東國厭戎是已厥後東方厎定洛邑是營故曰作丕成曰成乃工玩三年靜東國之語則伐東國蓋從營洛之後追敘其事意當時毛伯實主斯役而佐以吕伯吳伯一則曰師佑友毛父再則曰師佑友毛父師訓衆友與太史友内史友同義所謂衛父身也按齊為方伯吕伯當是齊吕伋而吳自泰伯至其十八世孫壽夢始見于内傳中間都不可攷其時諸侯入為天子卿士或有吳伯者官王京故稱吳伯也文王孫當是成王自謂可考者成王七年營東都八年命周公治東都十一年命君陳治東都顧史記載武王之言曰自洛汭延于伊洛居易毋固其有夏之居我南望三塗北望嶽鄙顧詹有河粤詹洛伊毋遠王室營周居於洛邑而後去故知營東都不始於成王而成王一治再治三治皆所以成武王之志故銘稱昭考而終之曰大政也此篇為毛伯受命之詞厥功既成其子孫鋪陳始終泐于彞器今讀其文如曰告乃事于上惟民作造在彛曰惟昭徳所謂有徳易以興惓惓三致意焉有周卜世卜年之永于此銘見之右高三寸八分深三寸二分口徑五寸六分腹圍一尺六寸四分重四十八兩兩耳有珥周王族有原貫而崇貫又皆國名説見貫尊類右高三寸二分深二寸四分口徑四寸四分腹圍一尺四寸一分重三十兩兩耳有珥􅀢字與惟同説文從心佳聲此作佳形二古文字多増損如尊旁益阜往往如此文疑其謚日丁則紀日明矣右高五寸四分深四寸二分口徑七寸三分腹圍二尺一寸四分重一百一兩兩耳有珥按風俗通云陳留䖍氏黄帝之後此銘䖍父乙當是䖍氏物右高四寸深三寸口徑五寸六分腹圍一尺六寸七分重五十七兩兩耳有珥博古圖有應侯敦應侯為武王第四子按春秋列國有應此周器無疑右高三寸九分深三寸一分口徑五寸六分腹圍一尺六寸六分重六十二兩兩耳有珥右高四寸四分深三寸七分口徑六寸五分腹圍二尺二分重八十三兩兩耳有珥古器但稱公作者甚多意當時皆藏于國中故弗著為某國後世展轉流傳則不可得而考矣右高四寸四分深三寸七分口徑六寸五分腹圍二尺二分重八十三兩兩耳有珥古器但稱公作者甚多意當時皆藏于國中故弗著為某國後世展轉流傳則不可得而考矣右高三寸深一寸九分口徑四寸腹圍一尺九分重二十一兩兩耳有珥右高四寸七分深三寸六分口徑六寸五分腹圍二尺九分重六十四兩兩耳有珥右高四寸六分深三寸五分口徑六寸三分腹圍一尺九寸重八十三兩兩耳有珥末一字漫漶不可識右高四寸八分深三寸六分口徑六寸九分腹圍二尺重七十四兩兩耳按臯陶之後封于有鬲而其苗裔遂以國為姓故銘云爾右高四寸七分深三寸四分口徑六寸五分腹圍一尺九寸八分重九十兩兩耳有珥右高三寸五分深二寸九分口徑五寸腹圍一尺六寸重二十九兩兩耳有珥周人多稱伯仲此曰乙叔如榮叔虢叔之類銘曰尊者舊説謂其器可尊是也上一字不可識或曰姬右高四寸七分深三寸七分口徑七寸二分腹圍二尺一寸一分重一百十九兩兩耳有珥按虢梁二國皆近王畿其君皆為王卿士魯桓公八年冬王命虢仲立晉哀侯之弟緡于晉九年秋虢仲芮伯梁伯荀侯賈伯伐曲沃春秋所載可證也此銘雖有漶字而書虢又書梁意梁叔與虢公共有勛勞王錫之彞器銘辭敘其緣起故首稱虢閲世雖遠尚可推測得之右高四寸六分深三寸八分口徑六寸二分腹圍二尺四分重八十五兩兩耳有珥周公第五子靖淵始封邢兹銘稱考曰邢叔豈其世族為大夫者耶右高三寸五分深二寸三分口縱三寸七分横四寸三分腹圍一尺六寸重五十九兩兩耳有珥可識者三字餘俱漫漶右高四寸六分深三寸八分口徑六寸七分腹圍二尺五分重七十七兩兩耳有珥詩有家伯冡宰春秋書家父來聘此器銘家是也右高五寸一分深四寸口徑七寸腹圍二尺八分重一百十一兩兩耳有珥馬姓本伯益之後魯有閔馬則馬為名銘云馬作蓋人名也右高六寸深四寸三分口徑七寸九分腹圍二尺二寸三分重一百三十三兩兩耳有珥舉字横列或是象形他器舉多作此作從楊氏篆韻亦讀作舉形制類周人作右高四寸七分深三寸五分口徑六寸一分腹圍一尺七寸三分重八十五兩銘命作尊王言非私製矣右高四寸二分深三寸五分口徑六寸九分腹圍一尺九寸五分重五十九兩鎏金水為地險酒為人險酒之溺人猶水也故萍氏水與酒同禁彞以盛酒取象于舟義或本此右高四寸三分深三寸九分口徑六寸二分腹圍二尺一寸重八十兩兩耳有珥銘末作舉字下又為兩手拱物狀舊説謂致敬於其先人也右高四寸三分深三寸五分口徑六寸一分腹圍一尺九寸一分重七十九兩兩耳有珥右高四寸四分深三寸二分口徑六寸二分腹圍一尺六寸二分重四十七兩兩耳有珥右高四寸四分深三寸六分口徑六寸六分腹圍二尺八分重九十一兩兩耳有珥金銀錯右高五寸八分深四寸三分口徑七寸八分腹圍二尺二寸四分重一百四十二兩兩耳有珥右高五寸九分深四寸四分口徑七寸八分腹圍二尺三寸一分重一百五十五兩兩耳有珥持弓舊説謂銘功是矣而宋人又以持弓為竭力事親之意然古者射以觀徳又祭畢而射意固有取且騂騂角弓朱子謂以弓之張弛向背喻兄弟昏淵之遠邇親疎或可類推爾西清古鑑卷十三
