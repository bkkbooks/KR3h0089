body:
  text: 西清古鑑卷十六卣二周應公卣有銘伯魚卣有銘魚卣有銘伯矩卣有銘仲阜卣有銘丕叔卣有銘叔卣有銘邢季卣有銘車卣有銘禾卣一有銘禾卣二有銘禾卣三有銘䵼卣有銘舉卣一有銘舉卣二有銘舉卣三有銘癸卣有銘行父卣有銘事卣有銘宜卣有銘束卣有銘虎卣有銘史卣有銘從卣有銘旅卣有銘立旂卣有銘立戈卣有銘執干卣有銘執物卣有銘亞卣一有銘亞卣二有銘亞卣三有銘亞卣四有銘主孫卣有銘子孫卣一有銘子孫卣二有銘析子孫卣一有銘析子孫卣二有銘孫卣有銘右通蓋高六寸五分深四寸三分口徑三寸六分腹圍一尺七寸四分重七十二兩兩耳有提梁左氏傳䢴晉應韓武之穆也内府所收有應公彞亦稱公右通蓋高七寸一分深四寸三分口縱二寸七分横三寸六分腹圍一尺三寸九分重五十九兩兩耳有提梁宋公子目夷魯公子奚斯皆字曰魚此疑二國器冠以伯蓋其序也若孔氏伯魚少賤無田祿不應作祭器矣右通蓋高七寸九分深五寸六分口徑三寸四分腹圍一尺二分重七十六兩兩耳有提梁銘首象形為魚與魚鼎篆法異伯魚卣魚字同按博古圖有漢連環攜奩製相近然銘詞非漢物蓋亦卣類而稍異其制度耳右通蓋高九寸八分深七寸三分口縱三寸四分横四寸三分腹圍一尺七寸四分重一百一十三兩兩耳有提梁銘伯矩與伯矩尊同右通蓋高五寸七分深三寸五分口縱二寸八分横四寸腹圍一尺五寸六分重七十九兩兩耳有提梁仲阜之名未詳見於書傳者周人惟曽阜耳右通蓋高五寸五分深三寸七分口縱二寸七分横如深之數腹圍一尺四寸四分重五十兩兩耳有提梁享字為斷句明其用享也丕叔蓋人名銘詞稱策乃邦疑亦有國者之器矣右通蓋高六寸深三寸八分口縱二寸四分横三寸三分腹圍一尺三寸重四十七兩兩耳有提梁伯仲叔季為序固已然有字曰仲曰叔者則只一字此銘叔是已右通蓋高四寸三分深三寸六分口縱二寸八分横三寸九分腹圍一尺五寸八分重六十一兩兩耳有提梁銘詞季與仲何以兩稱蓋邢之公族以季為氏仲則其序而史名也觀魯之叔孫氏有叔仲彭生叔仲帶則於季仲史何疑右通蓋高九寸六分深六寸八分口縱三寸二分横四寸腹圍一尺六寸三分重一百十兩兩耳有提梁爾雅卣為中尊則卣不獨盛矩鬯用也銘曰車蓋與車尊同右通蓋高八寸七分深五寸五分口縱三寸一分横三寸九分腹圍一尺六寸四分重一百七兩兩耳有提梁舊説釋斚為稼取致養之義此銘禾應與稼同又古文禾通作和云伯已蓋作者名也右通蓋高七寸三分深四寸五分口徑二寸二分腹圍一尺一分重四十八兩兩耳有提梁右通蓋高九寸七分深六寸一分口縱三寸九分横四寸八分腹圍二尺二寸重二百十一兩兩耳有提梁右通蓋高六寸深四寸口縱二寸七分横三寸八分腹圍一尺五寸五分重六十三兩兩耳有提梁銘與䵼尊同右通蓋高六寸六分深四寸三分口縱二寸四分横三寸三分腹圍一尺三寸二分重六十五兩兩耳有提梁右通蓋高九寸深六寸一分口縱三寸五分横四寸六分腹圍一尺九寸四分重一百二十七兩兩耳有提梁右通蓋高七寸六分深五寸三分口縱二寸九分横三寸九分腹圍一尺七寸六分重八十兩兩耳有提梁舉下一字象形為福按祭既灌之後乃飲福義蓋取此右通蓋高九寸深五寸九分口縱三寸七分横四寸五分腹圍一尺九寸九分重一百三十四兩兩耳有提梁右通蓋高八寸八分深六寸一分口縱三寸三分横四寸四分腹圍一尺九寸三分重一百五十兩兩耳有提梁蓋與器同識曰行父陳有儀行父魯有季孫行父其二國器耶右通蓋高一尺一寸二分深六寸八分口縱二寸八分横三寸八分腹圍二尺七寸重一百七十一兩兩耳有提梁金銀錯銘曰事與事尊同右通蓋高八寸深五寸一分口縱三寸七分横四寸八分腹圍二尺重一百六十八兩兩耳有提梁内府所收有周宜壺銘曰周宜作此銘曰用作父辛尊彞則祭器明甚非㑹盟用矣銘首稱宜之商盟尤不可曉右通蓋高八寸深四寸七分口縱二寸三分横三寸六分腹圍一尺四寸四分重九十七兩兩耳有提梁前漢地理志有束州趙地疏廣之後改姓束皆漢以後事幣五疋為束脯十挺為束皆于卣義無取疑人名為是右通蓋高一尺深六寸五分口縱三寸七分横四寸七分腹圍二尺一寸二分重一百六十七兩兩耳有提梁亞形内上一字據説文謂日在莽中讀作暮於銘詞取義不可曉下曰虎意如虎鼎蓋人名耳右通蓋高九寸四分深五寸八分口縱三寸五分横四寸五分腹圍一尺九寸四分重一百四十八兩兩耳有提梁右通蓋高八寸九分深六寸六分口縱四寸五分横五寸五分腹圍二尺一寸四分重一百二十七兩兩耳無提梁銘曰從如鼎之有陪與前從尊同皆貳器也右通蓋高五寸六分深三寸七分口縱二寸五分横四寸腹圍一尺四寸八分重六十兩兩耳有提梁右通蓋高一尺五分深七寸九分口徑三寸五分腹圍一尺七寸七分重九十六兩兩耳有提梁右通蓋高八寸九分深五寸九分口縱三寸四分横四寸一分腹圍一尺九寸三分重一百十三兩兩耳有提梁右通蓋高九寸二分深五寸八分口縱三寸五分横四寸六分腹圍一尺九寸六分重一百一十五兩兩耳有提梁右通蓋高八寸七分深五寸八分口縱三寸六分横四寸四分腹圍一尺九寸五分重一百三十五兩兩耳有提梁右通蓋高九寸二分深六寸五分口縱三寸七分横四寸八分腹圍二尺四分重一百五十五兩兩耳有提梁右通蓋高九寸四分深六寸三分口縱三寸四分横四寸六分腹圍一尺一寸九分重一百四十九兩兩耳有提梁右通蓋高九寸深五寸八分口縱三寸二分横四寸一分腹圍一尺七寸五分重七十五兩兩耳有提梁右通蓋高九寸二分深五寸九分口縱三寸七分横四寸八分腹圍二尺二分重一百七十八兩兩耳有提梁亞形中一字不可識疑為癸無馬意即巫馬右通蓋高一尺八分深八寸二分口徑三寸一分腹圍一尺七寸八分重一百七兩兩耳有提梁攷主祭者有主人主婦此曰主孫蓋子姓自謂如詩稱湯孫是將也右通蓋高七寸五分深四寸六分口縱二寸四分横三寸腹圍一尺一寸三分重四十七兩兩耳有提梁右通蓋高一尺五分深八寸一分口徑三寸二分腹圍一尺七寸九分重一百五兩兩耳有提梁右通蓋高九寸七分深七寸二分口縱三寸横四寸腹圍一尺六寸一分重九十兩兩耳有提梁右通蓋高九寸五分深六寸四分口縱三寸五分横四寸六分腹圍二尺重一百六十兩兩耳有提梁右通蓋高九寸八分深六寸一分口縱四寸七分横四寸二分腹圍二尺一寸二分重一百八十一兩兩耳有提梁西清古鑑卷十六
