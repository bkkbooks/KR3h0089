body:
  text: 西清古鑑卷十七卣三周鳯文卣一有銘鳯文卣二有銘􅇪鳯卣一有銘䕫鳯卣二有銘素梁卣有銘風紋卣雷紋卣饕餮卣一有銘饕餮卣二有銘饕餮卣三饕餮卣四饕餮卣五螭梁卣有銘環梁卣一有銘環梁卣二有銘環梁卣三環梁卣四環梁卣五環梁卣六環梁卣七環梁卣八環梁卣九環梁卣十環梁卣十一環梁卣十二環梁卣十三環梁卣十四環梁卣十五䋲梁卣一䋲梁卣二素卣一素卣二右通盖髙五寸九分深四寸口􅈳三寸八分腹圍一尺七寸六分重七十一兩兩耳有提梁右通葢髙一尺四分深六寸一分口縱三寸横三寸九分腹圍一尺九寸五分重一百二十九兩兩耳有提梁右通葢髙八寸一分深五寸四分口縱二寸八分横三寸六分腹圍一尺五寸二分重七十二兩兩耳有提梁右通盖髙九寸八分深六寸六分口縱三寸七分横四寸四分腹圍一尺九寸一分重一百三十八兩兩耳有提梁右通葢髙六寸五分深四寸四分口縱三寸二分横四寸三分腹圍一尺一寸九分重七十一兩兩耳有提梁右通葢髙八寸四分深五寸五分口縦二寸四分横三寸二分腹圍一尺四寸重六十兩兩耳有提梁博古圗有風紋斝謂似欹斜偃草之状正類此右通葢髙六寸九分深四寸三分口縦二寸九分横三寸六分腹圍一尺五寸重六十兩兩耳有提梁右通葢髙四寸三分深二寸八分口縱一寸八分横二寸二分腹圍九寸二分重二十七兩兩耳有提梁右通葢髙六寸深三寸八分口縱二寸一分横二寸五分腹圍一尺二寸七分重三十六兩兩耳有提梁右通葢髙七寸七分深五寸六分口縱三寸七分横四寸八分腹圍二尺四分重一百三十兩兩耳有提梁右通葢髙九寸三分深四寸五分口縱三寸二分横四寸一分腹圍一尺八寸四分重一百六十二兩兩耳有提梁右通葢髙四寸七分深二寸八分口縱一寸三分横一寸七分腹圍八寸重十七兩兩耳無提梁右通葢髙一尺一寸三分深六寸八分口縱三寸二分横四寸五分腹圍二尺三寸五分重一百六十七兩兩耳有提梁右通葢髙九寸八分深五寸八分口縱二寸九分横三寸九分腹圍一尺八寸五分重一百二十一兩兩耳有提梁右通葢髙九寸一分深五寸二分口縱二寸九分横三寸七分腹圍一尺八寸一分重八十三兩兩耳有提梁右通葢髙七寸深四寸九分口徑四寸二分腹圍一尺六寸四分重一百二十一兩兩耳有提梁右通盖髙一尺深八寸九分口徑三寸腹圍一尺八寸八分重七十一兩兩耳有提梁右通葢髙八寸九分深七寸二分口徑三寸一分腹圍一尺七寸七分重五十四兩兩耳有提梁右通葢髙八寸九分深六寸九分口徑三寸三分腹圍一尺九寸五分重六十四兩兩耳有提梁右通葢髙九寸八分深八寸五分口徑一寸九分腹圍一尺九寸八分重八十二兩兩耳有提梁右通葢髙九寸九分深六寸九分口徑三寸三分腹圍二尺一寸四分重九十六兩兩耳有提梁右通葢髙八寸五分深七寸二分口徑三寸一分腹圍一尺七寸一分重四十八兩兩耳有提梁右通葢髙七寸三分深六寸六分口徑二寸四分腹圍一尺五寸重五十兩兩耳有提梁右通葢髙五寸五分深四寸三分口徑二寸六分腹圍一尺四寸七分重三十三兩兩耳有提梁三足右通葢髙五寸五分深五寸口徑二寸四分腹圍一尺五寸六分重四十六兩兩耳有提梁三足右通葢髙五寸深四寸四分口徑二寸二分腹圍一尺四寸七分重四十四兩兩耳有提梁三足右通葢髙八寸三分深七寸二分口徑二寸九分腹圍一尺六寸八分重五十四兩兩耳有提梁右髙八寸四分深七寸六分口徑三寸一分腹圍一尺八寸四分重六十四兩兩耳有提梁缺葢右通葢髙六寸三分深三寸七分口縱二寸三分横三寸腹圍一尺二寸四分重五十兩兩耳有提梁右通葢髙八寸九分深八寸六分口徑二寸七分腹圍二尺一寸三分重八十七兩兩耳有提梁右通葢髙五寸二分深三寸一分口徑三寸三分腹圍一尺五寸二分重四十六兩兩耳有提梁右髙四寸八分深四寸五分口徑二寸四分腹圍一尺三寸五分重二十七兩兩耳缺提梁無葢西清古鑑卷十七
