body:
  text: 西清古鑑卷三十六鐘周特鐘有銘應鐘有銘寳鐘有銘太公鐘有銘䪫鐘有銘雙龍鐘雙螭鐘雙䕫鐘蟠䕫鐘一蟠䕫鐘二蟠䕫鐘三蟠䕫鐘四蟠䕫鐘五蟠䕫鐘六蟠䕫鐘七蟠䕫鐘八蟠䕫鐘九蟠螭鐘一蟠螭鐘二蟠螭鐘三蟠虺鐘盤雲鐘一有銘盤雲鐘二雷紋鐘篆帶鐘星帶鐘螭鈕鐘一螭鈕鐘二螭鈕鐘三環鈕鐘素鈕鐘寳甬鐘編鐘漢角鐘一有銘角鐘二有銘雲螭鐘一雲螭鐘二蛟螭鐘蟠螭鐘編鐘一編鐘二蠶紋鐘鐸周乳鐸蟠䕫鐸漢檐鐸一檐鐸二鈴漢風鈴旂鈴右髙六寸九分鈕髙一寸八分濶四寸六分兩舞相距五寸二分横四寸三分兩銑相距五寸六分横四寸五分枚三十六各長二分重一百九十一兩按黄鐘鐘特懸君音也律吕子聲之説發於杜氏通典五代兩宋樂懸有四清聲是子聲也又謂之半聲黄鐘正律無半變律有半即黄鐘之清聲也宋李照不知斥為鄭衛今觀此銘黄鐘清三字是周時已有清聲蓋十二律錯綜相濟傳之自古非後人私臆所能為亦如五音之變宫變徴杜氏謂自殷以前但有五音周加文武二音謂之七聲是也太和者樂主於和則舉全樂而言之右髙六寸九分鈕髙二寸濶三寸九分兩舞相距五寸三分横四寸四分兩銑相距五寸六分横四寸四分枚三十六各長二分重二百三兩銘曰應鐘按應鐘十月律也稱太和與特鐘同右髙一尺三寸四分甬長七寸一分徑二寸五分有旋兩舞相距九寸四分横七寸五分兩銑相距一尺一寸横八寸二分枚三十六各長一寸一分重九百六十兩銘詞幾不可句讀詩稱滔滔江漢南國之紀又禮記武始而北出再成而滅商三成而南四成而南國是疆銘曰南國應是周初時語按周禮地官掌節掌守邦節而辨其用以輔王命凡通逹于天下者必有節以傳輔之銘曰南節東節而前稱肇遣召文武後云迺遣云來徙應是使命所逹耳又魯頌三夀作朋鄭氏謂三卿也銘曰余洎孫三夀義同曰惟皇上帝曰朕猷有成曰配皇天曰祖考先王意其時功成作樂是鐘盖大祀所縣非宴饗之設矣右髙七寸甬長三寸八分徑一寸有旋兩舞相距五寸一分横四寸兩銑相距五寸七分横四寸二分枚三十六各長六分重二百一十九兩銘旅鐘旅訓衆盖編鐘類也右髙九寸二分鈕髙二寸六分濶六寸三分兩舞相距七寸五分横六寸一分兩銑相距八寸五分横如兩舞相距之數枚三十六各長五分重六百六十六兩博古圗宋公䪫鐘凡六形制各異而銘字同廬陵羅泌路史餘論記宋崇寧三年甲申之歳得諸南都崇福禪窟者是也宋公名成者二名固成者一不能實指為何公而泌獨言平公成未知何據博古圗謂六䪫為黄帝樂考樂緯叶圗徴淮南鴻烈解及班志皆言之䪫與莖同周禮大司樂注作五莖言能為五行之道立根莖也右髙八寸九分鈕髙三寸一分濶七寸兩舞相距七寸五分横六寸兩銑相距八寸四分横六寸八分枚三十六各長四分重四百六十一兩右髙六寸四分甬長三寸七分濶九分有旋兩舞相距四寸九分横三寸八分兩銑相距五寸五分横四寸枚三十六各長六分重二百三兩右髙四寸四分鈕髙一寸四分濶三寸三分兩舞相距三寸五分横二寸六分兩銑相距三寸九分横二寸九分枚三十六各長二分重四十六兩右髙一尺六寸甬長九寸五分徑二寸有旋兩舞相距一尺一寸五分横九寸三分兩銑相距一尺三寸二分横一尺一寸枚三十六各長一寸一分重七百六十三兩右髙一尺三寸五分甬微方長五寸八分縱一寸八分横一寸五分有旋兩舞相距九寸五分横七寸五分兩銑相距一尺一寸横九寸枚三十六各長一寸一分重四百五十四兩右髙一尺二寸六分鈕髙四寸濶九寸一分兩舞相距九寸五分横七寸九分兩銑相距一尺一寸五分横九寸枚三十六各長六分重八百四十三兩右髙一尺九分鈕髙三寸一分濶七寸三分兩舞相距八寸二分横六寸六分兩銑相距九寸七分横七寸八分枚三十六各長五分重五百九十二兩右髙一尺六分甬長四寸八分徑一寸五分有旋兩舞相距七寸六分横五寸六分兩銑相距八寸九分横六寸四分枚三十六各長八分重五百五十兩右髙九寸七分鈕髙二寸八分濶五寸四分兩舞相距七寸二分横五寸五分兩銑相距八寸五分横六寸五分枚三十六各長三分有半重三百八十一兩右髙九寸七分甬長四寸九分徑一寸五分有旋兩舞相距七寸三分横五寸兩銑相距八寸四分横五寸八分枚三十六各長八分重五百五十兩右髙六寸五分鈕髙二寸九分濶四寸八分兩舞相距四寸七分横三寸五分兩銑相距五寸三分横四寸枚三十六各長二分重九十九兩右髙六寸鈕髙一寸八分濶三寸八分兩舞相距四寸五分横三寸五分兩銑相距五寸二分横四寸枚三十六各長三分重九十六兩右髙九寸三分甬長六寸三分徑一寸八分有旋兩舞相距六寸五分横五寸兩銑相距七寸六分横六寸枚三十六各長五分重三百三十九兩右髙七寸一分鈕髙二寸濶一寸二分兩舞相距四寸七分横三寸三分兩銑相距五寸七分横三寸八分枚三十六各長三分重一百五兩右髙六寸四分鈕髙二寸六分濶一寸六分兩舞相距三寸八分横二寸八分兩銑相距五寸横三寸一分枚三十六各長四分重八十三兩右髙五寸四分甬長三寸一分徑六分有旋兩舞相距三寸八分横二寸四分兩銑相距四寸一分横三寸枚三十六各長三分重九十三兩右髙四寸一分甬長二寸七分徑六分有旋兩舞相距三寸横二寸二分兩銑相距三寸三分横二寸六分枚三十六各長五分重七十九兩右髙六寸六分甬長三寸二分徑一寸一分有旋兩舞相距四寸三分横三寸兩銑相距五寸横三寸五分枚三十六各長四分重八十九兩右髙一尺五分甬長五寸七分徑一寸三分有