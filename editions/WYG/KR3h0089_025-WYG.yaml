body:
  text: 西清古鑑卷二十二壺四漢獸鼻壺獸耳壺一獸耳壺二獸耳壺三獸耳壺四獸耳小壺獸耳方壺獸耳方壺螭耳壺瓠壺一瓠壺二瓠壺三瓠壺四瓠壺五温壺一温壺二温壺三温壺四温壺五温壺六温壺七温壺八曲頂温壺噴壺素壺素匾壺一素匾壺二鳩首匾壺右髙一尺一寸八分深一尺八分口徑二寸七分腹圍二尺三分重一百一十五兩三耳三鼻右髙一尺六寸九分深一尺五寸一分口徑六寸五分腹圍三尺三寸五分重三百七十九兩兩耳右髙九寸五分深八寸七分口徑一寸九分腹圍一尺六寸五分重四十六兩兩耳右髙七寸九分深六寸九分口徑三寸四分腹圍一尺六寸九分重三十九兩兩耳右髙四寸九分深四寸六分口徑一寸七分腹圍一尺一寸二分重一十九兩兩耳右髙二寸五分深二寸一分口徑一寸二分腹圍七寸四分重九兩兩耳右通蓋髙三寸五分深二寸四分口徑一寸二分腹圍六寸五分重九兩兩耳右髙三寸二分深二寸八分口徑一寸三分腹圍八寸六分重一十一兩兩耳右髙六寸九分深五寸四分口徑三寸腹圍一尺九寸六分重七十九兩兩耳三足作饕餮形右通蓋髙九寸八分深七寸八分口徑一寸九分腹圍一尺一寸八分重三十五兩有繫右通蓋髙九寸九分深七寸九分口徑一寸九分腹圍一尺二寸七分重二十八兩有繫右通蓋髙九寸五分深七寸七分口徑一寸八分腹圍一尺三寸四分重三十一兩有繫右髙七寸六分深七寸口徑一寸八分腹圍一尺三寸四分重三十兩有繫右髙九寸一分深八寸六分口縱一寸七分横一寸九分腹圍一尺三寸四分重八十五兩繫缺右髙一尺一寸六分深一尺六分口徑一寸腹圍二尺二寸六分重七十一兩右髙一尺三分深九寸九分口徑一寸腹圍一尺七寸八分重三十九兩右髙八寸四分深七寸六分口徑八分腹圍一尺七尺三分重三十九兩右髙八寸四分深七寸六分口徑一寸腹圍一尺六寸八分重四十一兩右髙五寸六分深五寸口徑五分腹圍九寸八分重一十四兩右髙一尺一寸三分深一尺三分口徑一寸腹圍二尺一寸八分重六十三兩右髙三寸深二寸五分口徑六分腹圍五寸五分重六兩右髙四寸七分深四寸五分口徑七分腹圍七寸四分重八兩右髙一尺深九寸四分口徑九分腹圍二尺八分重六十八兩右髙一尺一分深九寸六分腹圍一尺五寸重七十七兩有繫壺口如蓮房俗謂之花澆灑掃所用也右髙六寸一分深五寸口徑二寸七分腹圍一尺二寸八分重二十六兩四耳一鼻右髙一尺二寸二分深一尺一寸五分口徑一寸八分腹縱二寸三分横九寸五分重一百一十三兩右髙八寸九分深八寸一分口徑一寸一分腹圍二尺四寸重六十五兩右通蓋髙五寸三分深三寸二分口縱九分横一寸八分腹圍一尺一寸重三十三兩西清古鑑卷二十二
