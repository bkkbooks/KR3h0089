body:
  text: 西清古鑑卷十二罍商父癸罍有銘周父已罍有銘攻罍有銘析子孫罍有銘立戈罍有銘亞罍有銘犧首罍一有銘犧首罍二有銘犧首罍三犧首罍四犧首罍五犧首罍六犧首罍七犧耳罍獸耳罍雲螭罍蟠虺罍右高一尺五分深九寸八分口徑四寸二分腹圍二尺六寸一分重一百四十七兩按詩有捄棘匕注以棘為匕所以載鼎肉而升之于俎易不喪匕鬯蓋長子主祭者所執銘作執匕形於祭義為近右高九寸四分深九寸二分口徑三寸四分腹圍二尺二寸八分重一百五十七兩禮明堂位山罍夏后氏之尊也故知尊罍同器銘父已按博古圖有父已鼎二一屬商一屬周此銘紋鏤與商製殊弗類蓋周物也右高一尺四分深一尺二分口徑五寸腹圍三尺重一百七十一兩銘字剥缺不可識首一字曰攻古治器皆曰攻如攻金攻玉是也右高一尺七分深九寸九分口徑四寸八分腹圍二尺六寸五分重一百四十九兩右通蓋高一尺四寸三分深九寸九分口徑五寸七分腹圍三尺一寸五分重二百五十一兩右通蓋高一尺一寸四分深八寸六分口徑三寸五分腹圍二尺一寸七分重一百四十七兩右高一尺三寸深一尺一寸三分口徑四寸七分腹圍二尺五寸四分重一百七十一兩金錯右高一尺六寸深一尺三寸六分口徑六寸六分腹圍三尺一寸五分重三百八十七兩金銀錯惟曰欲至于萬年天子萬年詩書所稱往往如此銘云萬年無疆祝嘏之詞與董逌尊鼎銘跋所載同右高一尺四寸深一尺一寸八分口徑六寸七分腹圍三尺四寸九分重三百九十五兩右高一尺一寸九分深一尺一寸一分口徑五寸三分腹圍三尺一寸重一百八十七兩右高一尺一寸深九寸六分口徑四寸八分腹圍二尺六寸重一百一十九兩右高七寸六分深六寸九分口徑三寸八分腹圍一尺八寸五分重九十一兩右高一尺一寸深一尺二分口徑五寸七分腹圍三尺三寸重二百三兩右通蓋高一尺六寸七分深一尺一寸二分口徑八寸腹圍四尺四寸重六百七十五兩右高一尺二寸深一尺一寸七分口徑五寸四分腹圍三尺二寸九分重一百六十一兩右高一尺二寸六分深一尺二寸二分口徑六寸腹圍三尺三寸重四百一十一兩通體作螭鹿形凡三十有二色黯湛不甚可辨右高一尺深九寸三分口徑五寸腹圍二尺八寸五分重一百四十一兩西清古鑑卷十二
