body:
  text: 西清古鑑卷三十三洗周弦紋洗素洗漢嚴氏洗有銘泉洗有銘八卦洗有銘雙魚洗一有銘雙魚洗二有銘雙魚洗三有銘雙魚洗四有銘雙魚洗五雙魚洗六蟠虺洗蟠䕫洗一蟠䕫洗二獸耳洗一有銘獸耳洗二獸耳洗三獸耳洗四獸環洗三足洗一三足洗二三足洗三雲紋洗一雲紋洗二帶紋洗弦紋洗一有銘弦紋洗二弦紋洗三弦紋洗四弦紋洗五弦紋洗六素洗一素洗二素洗三素洗四素洗五素洗六素洗七素洗八素洗九盂周素盂有銘蟠虺盂漢宋盂有銘錢盂有銘乳盂方盂素盂一素盂二素盂三素盂四素盂五素盂六素盂七素盂八盆漢雙魚盆右髙三寸五分深三寸四分口徑七寸七分重四十三兩右髙五寸九分深四寸五分口徑長一尺八分濶一尺二寸六分重一百七十一兩流如匜按洗為承棄水之用有流不足異也右髙四寸二分深四寸口徑八寸八分重七十五兩西京去古未逺制度猶近三代此器按圗為洗銘曰嚴氏造而字作陽文小篆知為漢物矣右髙四寸九分深四寸七分口徑一尺六分重八十五兩篆文不可識惟泉字可辨右髙一寸八分深一寸七分口徑九寸四分重三十五兩右髙三寸一分深二寸七分口徑一尺一寸八分重七十五兩右髙一寸六分深一寸三分口徑四寸七分重八兩三足考三代物多銘為子孫永寳曰宜子孫云者實始于漢尚方制唐開元九年三月許昌縣之唐祠掘地得古銅尊上隱起雙魚篆書文曰宜子孫亦云是漢物此與前器俱銘宜子孫字體近八分蓋其時古文初變云右髙二寸五分深二寸三分口徑一尺四分重八十五兩𨽻書銘曰吉亦大吉利類也皆漢物右髙三寸一分深三寸口徑一尺四寸重一百四十七兩銘字多增益筆法蓋繆篆所以摹印徐鍇謂之屈曲填宻者也銘稱建寧二年漢桓帝永康元年靈帝立改元建寧是已朱提晉始立朱提郡在漢為縣屬犍為按漢書食貨志朱提銀重八兩為一流注謂朱提出善銀此銘曰朱提蓋其地所鑄耳餘字不可識右髙二寸七分深二寸五分口徑一尺一寸八分重七十九兩右髙二寸六分深二寸四分口徑一尺三分重五十六兩三足右髙二寸四分深二寸一分口徑八寸二分重四十七兩右髙一尺二寸四分深一尺一寸九分口徑二尺三寸重一千五百六十五兩右髙三寸八分深三寸四分口徑八寸重六十四兩三足右髙六寸八分深六寸六分口徑一尺四寸二分重二百五十九兩銘字與雙魚第四洗相近皆繆篆也曰建康則漢順帝漢安二年改元建康是也右髙二寸四分深二寸二分口徑一尺二寸三分重九十五兩右髙四寸一分深三寸九分口徑八寸九分重六十六兩右髙六寸八分深六寸四分口徑一尺四寸二分重三百二十三兩右髙二寸六分深二寸五分口徑一尺二分重五十四兩鎏金右髙一寸九分深一寸一分口徑四寸一分重二十六兩三足穴其中為流右髙二寸二分深一寸五分口徑四寸六分重一十七兩三足右髙一寸六分深一寸口徑三寸四分重七兩三足右髙五寸四分深五寸二分口徑一尺九分重一百一十三兩右髙二寸三分深二寸二分口徑七寸八分重四十二兩右髙三寸七分深三寸五分口徑七寸四分重五十五兩右髙七寸四分深七寸口徑一尺五寸一分重二百九十九兩篆凸起宜侯王漢器銘多有之右髙六寸五分深五寸九分口徑一尺三寸五分重一百二十七兩右髙三寸深二寸八分口徑一尺一寸四分重九十三兩右髙二寸八分深二寸五分口徑九寸八分重六十兩右髙一寸四分深一寸三分口徑五寸一分重一十二兩鎏金右髙三寸深二寸九分口徑八寸六分重四十七兩右髙六寸深五寸二分口徑二尺重三百九十五兩右髙二寸七分深二寸六分口徑一尺二寸三分重九十五兩右髙三寸三分深三寸口徑七寸五分重三十九兩右髙二寸九分深二寸八分口徑七寸二分重三十五兩右髙一寸六分深一寸五分口徑七寸八分重一十八兩右髙一寸二分深一寸一分口徑五寸八分重一十一兩右髙一寸二分深一寸一分口徑三寸八分重四兩右髙二寸四分深二寸二分口徑一尺四寸三分重一百一兩右髙七分深六分口徑三寸七分重四兩右髙六寸二分深五寸一分口徑一尺一分重一百六十五兩兩耳博古圗季姜杅形製與此同右通蓋髙二寸四分深一寸三分口徑二寸九分重一十二兩右髙四寸二分深三寸三分口徑五寸五分重四十八兩兩耳有珥銘字小篆葢漢以後物宋或識其姓如嚴氏洗右髙二寸四分深二寸二分口徑六寸二分重二十五兩無銘按泉文偏傍似銖字蓋五銖也右髙二寸九分深二寸八分口徑六寸七分重二十四兩兩耳右髙三寸五分深三寸口縱五寸三分横六寸七分重九十一兩四足按韓子外儲説盂圎水圎盂方水方則方孟固當有之右髙五寸一分深四寸口徑八寸三分重六十三兩右髙三寸八分深三寸六分口徑五寸八分重五十一兩右髙二寸五分深一寸七分口徑六寸重八十七兩三足右髙三寸五分深三寸二分口徑六寸重四十五兩右髙二寸九分深二寸七分口徑四寸九分重一十五兩兩耳右髙二寸九分深二寸一分口徑五寸五分重一十七兩右髙二寸深一寸八分口徑四寸四分重十兩右髙一寸四分深一寸一分口徑二寸八分重六兩右髙二寸二分深一寸七分口徑一尺二寸一分重一百七兩製與洗小異蓋即後世盥沐之器也西清古鑑卷三十三
