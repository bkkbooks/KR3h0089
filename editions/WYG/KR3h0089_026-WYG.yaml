body:
  text: 西清古鑑卷二十三爵周亞爵有銘雞爵有銘舉爵有銘素爵斚周帶斚有銘事斚有銘圍斚有銘丁亥斚有銘舉斚有銘子孫斚有銘饕餮斚一饕餮斚二饕餮斚三犧鋬斚䕫紋斚一䕫紋斚二鳳文斚觚一商父甲觚有銘父己觚一有銘父己觚二有銘父乙觚有銘祖丁觚有銘祖辛觚有銘父癸觚有銘癸觚有銘若癸觚有銘瞿觚有銘素觚有銘饕餮觚一有銘饕餮觚二饕餮觚三周鬲觚有銘車觚一有銘車觚二有銘舟觚一有銘舟觚二有銘舉觚有銘己舉觚有銘掬觚一有銘掬觚二有銘婦觚一有銘婦觚二有銘史觚一有銘史觚二有銘貝觚有銘叔孫觚有銘右髙六寸五分深三寸二分口縱二寸五分橫六寸重二十五兩兩柱三足有流有鋬爵為周制銘曰父丁則甲乙不必定屬商益明矣右髙五寸九分深二寸九分口縱二寸五分橫五寸重一十六兩兩柱三足有流有鋬按周人灌用雞彞此爵銘雞是矣右髙五寸九分深二寸七分口縱二寸四分橫五寸二分重一十八兩兩柱三足有流有鋬右髙五寸三分深三寸三分口縱二寸二分橫五寸重一十五兩兩柱三足有流有鋬右髙七寸五分深四寸九分口徑五寸七分重八十三兩兩柱三足有鋬夏曰琖殷有斚然周人叅用二代禮故六尊亦並用春官所謂用斚彞黃彞也此文曰帶葢作者名如叔帶叔仲帶向帶是己右髙一尺一寸深六寸二分口徑七寸二分重一百八十七兩兩柱三足有鋬金銀錯有周事尊又事卣銘五字均合右髙五寸九分深三寸一分口徑四寸八分重六十四兩兩柱三足有鋬玉篇謂古文圍字今從之按周禮夏官環人注環猶圍也主圍賓客任器為之守備又韻㑹四寸曰圍然商子民弱篇民弱國强云云國並作則此銘或國字也右髙一尺二寸深七寸口徑八寸二分重三百二十三兩兩柱四足有鋬銘剥落可識者與召仲壺同右髙五寸八分深三寸六分口徑四寸六分重五十三兩兩柱三足有鋬右髙八寸八分深五寸七分口徑六寸一分重一百六十五兩兩柱三足有鋬右髙一尺一寸七分深六寸口徑七寸重二百三十一兩兩柱三足有鋬右髙九寸二分深五寸一分口徑六寸重一百三十五兩兩柱三足有鋬右髙六寸五分深三寸三分口徑五寸二分重五十三兩兩柱三足有鋬右髙九寸一分深五寸三分口徑六寸三分重一百一十一兩兩柱三足有鋬右髙七寸深四寸四分口徑五寸一分重五十八兩兩柱三足有鋬右髙六寸二分深三寸二分口徑四寸七分重四十九兩兩柱三足有鋬右髙五寸七分深四寸口徑四寸一分重二十八兩三足有鋬制與博古圖周父丁斚同但無兩柱右髙八寸四分深五寸九分口徑四寸八分重二十七兩右髙九寸深五寸三分口徑四寸重一十六兩金銀錯右髙六寸七分深四寸四分口徑四寸二分重一十七兩右髙九寸深六寸四分口徑五寸二分重三十九兩右髙八寸七分深五寸四分口徑五寸重三十三兩右髙八寸七分深五寸八分口徑五寸一分重三十四兩右髙八寸二分深五寸三分口徑四寸三分重二十六兩右髙五寸四分深三寸七分口徑四寸一分重二十兩右髙九寸五分深四寸八分口縱橫如之重五十六兩右髙八寸一分深五寸五分口徑四寸八分重三十九兩瞿字象形與商瞿父鼎瞿卣同右髙六寸四分深四寸五分口徑三寸九分重一十九兩古篆孫字有作者與此微不同乃反正増減隨時變易此銘子孫二字是也右髙一尺深六寸六分口徑五寸四分重四十三兩右髙一尺二分深七寸口徑五寸重三十三兩右髙九寸一分深六寸三分口徑四寸六分重二十六兩右髙八寸五分深六寸三分口徑四寸八分重三十六兩銘曰鬲與鬲彞同右髙八寸八分深六寸口徑五寸二分重四十一兩右髙八寸五分深五寸六分口徑四寸八分重三十兩按觚制甚古而此器與後掬觚舉觚叔觚立戈觚篆皆凸起趙氏洞天清錄謂三代用陰識為偃嚢字亦不盡然也右髙八寸三分深五寸五分口徑四寸八分重四十三兩此觚也銘曰舟非彞舟比矣前一器銘曰車舊說車軼則致敗以示覆車之戒此云舟即書稱若乗舟意耶與舟彞取義葢同右髙七寸八分深五寸口徑四寸五分重一十九兩右髙七寸五分深五寸三分口徑四寸四分重二十兩右髙九寸一分深五寸八分口徑五寸一分重三十三兩右髙九寸四分深六寸六分口徑四寸七分重二十一兩銘掬與掬鼎同又小爾雅掬一升也或量其所受銘之右髙八寸九分深五寸八分口徑四寸九分重二十九兩右髙八寸六分深五寸六分口徑四寸八分重二十七兩右髙九寸二分深六寸二分口徑四寸九分重三十五兩前一字為魚亦象形葢魚鼎類婦字如前器稍增減耳右髙六寸四分深四寸一分口徑三寸七分重二十兩右髙九寸六分深六寸二分口徑五寸三分重四十三兩右髙八寸五分深五寸五分口徑四寸六分重二十九兩銘貝下曰錫猶錫貝鼎皆昭君賜也右髙八寸三分深五寸九分口徑四寸六分重二十八兩收藏家所見不廣偶得一二器有十千字輙謂為商至博古圖巳不能概收入商矣如此銘叔孫非商稱明甚安得據祖癸二字遂謂商某癸耶西清古鑑卷二十三
