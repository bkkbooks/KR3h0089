body:
  text: 西清古鑑卷八尊一商父乙尊一有銘父乙尊二有銘祖丁尊有銘父丁尊一有銘父丁尊二有銘父丁尊三有銘父丁尊四有銘己尊有銘父己尊有銘母己尊有銘父􅉝尊有銘父癸尊有銘冊尊有銘立戈尊有銘饕餮尊帶耳尊父乙尊盖有銘周乙公尊一有銘乙公尊二有銘萬夀尊有銘父己尊有銘癸公尊有銘貫尊有銘伯和尊一有銘伯和尊二有銘伯和尊三有銘伯矩尊有銘伯尊有銘邢侯尊有銘諸姬尊有銘孔尊有銘商尊有銘效尊有銘季受尊有銘車尊有銘䵼尊一有銘䵼尊二有銘内事尊有銘右髙六寸四分􅀷五寸二分口徑六寸腹圍一尺一寸九分重三十二兩右髙七分八分􅀷六寸三分口徑六寸腹圍一尺一寸六分重五十五兩右髙四寸四分􅀷三寸三分口徑二寸四分腹圍九寸重二十一兩博古圖有祖丁尊銘作立旗形曰孫作祖丁此僅二字亦曰祖丁腹俱作饕餮是其類也右髙八寸五分􅀷六寸五分口徑六寸四分腹圍一尺二寸九分重七十九兩與博古圖所載銘製俱合右髙八寸八分􅀷六寸八分口徑六寸七分腹圍一尺三分重八十七兩鐘鼎欵識有舉冊父癸卣舉􅉺字作此銘父丁上作字形相近或即舉冊意也以手奉物故謂之舉盖象形商人尚質與他器銘舉字者異右髙九寸八分􅀷七寸二分口徑六寸六分腹圍九寸六分重六十三兩右髙五寸􅀷三寸五分口徑三寸九分腹圍五寸七分重一十三兩右髙七寸四分􅀷六寸口徑七寸三分腹圍一尺六寸七分重九十一兩博古圖載商父癸鼎作戈穿貝形與此同右髙八寸三分􅀷七寸六分口縦三寸横四寸腹圍一尺六寸四分重五十七兩銘作二􅉺中為工字工與功同銘功也書稱殷之先人有典有􅉺故冊字商器亦宜有之右髙九寸二分􅀷七寸二分口徑七寸腹圍一尺四寸三分重八十一兩右髙七寸五分􅀷六寸七分口縦三寸一分横四寸腹圍一尺五寸一分重五十九兩右髙八寸五分􅀷六寸九分口徑六寸五分腹圍一尺二寸五分重七十一兩右髙一尺四寸六分􅀷一尺六分口徑九寸三分腹圍二尺四分重三百六十三兩右髙六寸一分􅀷五寸二分口徑如之腹圍一尺一寸六分重四十九兩右髙七寸六分􅀷六寸三分口徑六寸二分腹圍一尺一寸九分重四十七兩右髙八寸八分􅀷五寸八分口徑五寸八分重五十二兩右髙四寸􅀷三寸口徑二寸一分重一十二兩五銖右髙五寸二分􅀷四寸四分口縦三寸二分橫三寸六分腹圍一尺七分重二十九兩金銀錯按史記齊世家丁公吕伋之子為乙公得據銘知為齊器右髙一尺六寸一分深一尺四寸二分口徑六寸五分腹圍三尺三寸六分重三百九十五兩銘曰尊鼎按禮明堂位著殷尊也注著者無足而底著于地此器為尊然圈足不得為著尊又宋黃伯思云鼎之無足者曰著鼎頋此器與鼎象更弗類不得謂之著鼎又明甚且銘首五字與前乙公尊合仍命之曰乙公尊又夢溪筆談得古銅黄彞刻畫甚繁大體如繆篆又如闌楯間所畫迴波曲水之文此紋鏤近之右通葢髙一尺五寸三分􅀷一尺一分口縦四寸二分橫五寸七分腹圍二尺五寸六分重二百一十五兩形制銘文與前器同惟無乙公字葢一時物也昔人謂臣下為君上監制子孫為父祖専設其銘欵咸祝祈夀祉期之世世此三器俱銘曰萬夀是其義矣右通葢髙七寸六分􅀷五寸四分口縦二寸六分橫三寸一分腹圍一尺六寸重五十九兩銘五字與周父巳罍同右髙六寸七分􅀷六寸四分口縦五寸五分橫六寸三分腹圍一尺七寸七分重七十五兩齊癸公慈母為乙公得子銘稱丁亥則昭王始立之嵗也計其世次亦脗合右髙七寸五分􅀷六寸口徑六寸三分腹圍一尺二寸九分重六十一兩按禮明堂位崇鼎貫鼎大璜封父龜注崇貫封父皆國名魯僖公二年四國盟于貫又周惠王後有原伯貫此器銘曰貫故知為周器也右髙七寸五分􅀷五寸五分口徑五寸八分腹圍一尺八分重六十兩天子稱同姓諸侯曰伯父叔父而衞武公名和博古圖毁敦考謂伯和父為衞武公良是武公以宣王十五年即位至平王元年東遷命衞侯和為公此銘稱王命元年當是平王元年矣右通葢髙一尺五寸二分􅀷一尺四分口縦四寸四分橫六寸腹圍二尺四寸八分重二百八十三兩銘與前伯和尊同右髙一尺五寸七分􅀷一尺三寸一分口縦五寸七分橫六寸九分腹圍二尺七寸四分重三百四十七兩金銀錯右通葢髙七寸七分􅀷五寸五分口縦二寸三分橫三寸三分腹圍一尺三寸重四十七兩伯矩不可考意如伯同伯服耳右髙七寸二分􅀷五寸九分口徑六寸三分腹圍一尺二寸七分重五十三兩右髙八寸四分􅀷六寸五分口徑六寸八分腹圍一尺二寸八分重一百一十一兩史記魯世家索隠注周公元子就封于魯次子留相王室代為周公其餘食小國者六人樊蔣邢茅胙祭也頋邢侯自靖淵後世次不可考見于經傳者狄伐邢齊人救邢齊人遷邢於夷儀此外無所著玩銘詞多不可曉首稱曰王命辟邢侯辟君也似為始封時作盖在成王之世矣下曰舟曰豐舟者彞之貳周禮六彞皆有舟是也豐亦尊類鄉射禮命弟子設豐燕禮君尊有豐此文繼以王射良是錫諸虎臣酉酉盖酒字古通又龔字古通恭書甘誓恭行天罰古文或作共或作龔銘龔字屡見大抵皆恭字耳右髙一尺四寸二分􅀷一尺五分口縦横俱如之腹圍二尺六寸重五百八十七兩按漢陽諸姬則姬姓之國皆是銘自稱諸姬葢王族耳右髙一尺二寸􅀷一尺五分口徑四寸九分腹圍二尺四寸一分重二百一十一兩金銀錯銘左旋讀欵曰孔作不可考周人最著者宰孔以冡宰兼三公是也右髙八寸六分􅀷六寸三分口徑六寸八分腹圍一尺二寸二分重七十七兩按魯有鉏商齊有子商又以商為氏銘稱商作人名也右髙八寸九分􅀷七寸三分口徑六寸二分腹圍一尺三寸重七十兩紹興古器評有此尊銘十一字今止存八曰效作葢其子孫所製祭器也右髙六寸四分􅀷五寸五分口徑五寸八分腹圍一尺一寸二分重五十五兩剥落不可識者三字受字亦缺銘詞葢左旋讀右髙七寸三分􅀷五寸八分口徑七寸四分腹圍一尺八寸四分重八十九兩宋紹興張掄評周車罍謂車軼則致敗而酒之流足以敗德葢罍為酒器故云爾尊亦盛酒物也銘曰車其以此耶右髙五寸一分􅀷四寸七分口徑五寸四分腹圍一尺四寸重五十三兩䵼字當句如䵼鼎是也右髙四寸五分􅀷三寸六分口徑四寸五分腹圍八寸四分重三十二兩銘云用䵼云䵼彞猶之㱃鼎餗鼎也春秋時周有尹氏鄭亦有尹氏員通作㜏有㜏氏是也曰配曰室人葢家廟中器多友意如周官大旅謂其衆也銘首葢人名右髙一尺二寸􅀷八寸九分口徑九寸四分腹圍一尺八寸八分重五百七兩兩耳有帶按曲禮外事以剛日内事以柔日漢儒以外事為冶兵此銘首稱惟王南征疑為外事而末云内事葢追叙所饗者之功伐而此器則是其宗廟所用陳氏謂内事如宗廟之祭冠昬之禮皆是故銘詞仍云内事也西清古鑑卷八
