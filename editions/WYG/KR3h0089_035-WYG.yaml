body:
  text: 西清古鑑卷三十二匜周司宼匜有銘祖匜有銘姜伯匜有銘陳伯匜有銘伯匜有銘伯和匜有銘女匜有銘山匜有銘般匜有銘利匜有銘舉匜一冇銘舉匜二有銘子匜冇銘子孫匜有銘犧匜一犧匜二馬匜獸匜雲雷匜饕餮匜䕫龍匜蟠虬匜蟠䕫匜一蟠䕫匜二䕫首匜螭首匜雲紋匜環紋匜一環紋匜二環紋匜三漢注水匜盤周丁亥盤有銘癸亥盤有銘齊姬盤有銘貫魚盤蟠䕫盤䕫紋盤環紋盤漢蟠䕫盤一蟠䕫盤二䕫耳盤粟紋盤環紋盤一環紋盤二素盤一素盤二素盤三素盤四鋗周素鋗右通蓋高六寸四分深二寸八分口徑長四寸八分濶二寸二分重六十三兩有流有鋬金銀錯鐘鼎欵識博古圖二書俱載此銘周建字鐘鼎欵識作用遺非是今仍從博古圖音釋至雩字作粤蓋古文雩與粤同又惟下一字雩下一字器銘所無而二書釋文俱益歸字僚字今缺之仍存其真銘首曰司宼按周官司宼掌邦禁詰姦慝刑暴亂是其官也右通蓋高八寸八分深三寸五分口徑長七寸五分濶三寸二分重一百三兩有流有鋬銘祖一字上為格中貝博古圖有亞中貝如父貝觶是也右高三寸二分深二寸口徑長六寸八分濶三寸七分重三十四兩有流有鋬四足春秋姜姓國惟申為伯爵銘曰姜伯殆即申伯不稱申而稱姜猶甫侯而或稱吕侯也右高五寸五分深二寸四分口徑長七寸三分濶四寸九分重五十一兩有流有鋬四足匜為女子所有事銘稱母是也塍疑即媵字永壽用之與他文特異陳世家無伯元名者意公族之微者也右高五寸八分深二寸六分口徑長五寸四分濶三寸七分重四十五兩有流有鋬右通蓋高一尺六分深五寸九分口徑長九寸一分濶四寸六分重三百三十一兩有流有鋬銘詞與伯和尊合右通蓋高七寸深二寸七分口徑長五寸七分濶二寸二分重五十八兩有流有鋬奉匜沃盥女子之事此銘曰王之女肇蓋送女器也右高六寸五分深三寸七分口徑長六寸七分濶三寸三分重九十九兩有流有鋬内府所收有山鼎銘曰堇山此曰山父乙則山當為人名者者命名不以國不以山川蓋專指人君而言未可執一論也右高五寸一分深三寸五分口徑長六寸四分濶三寸重七十五兩有流有鋬銘稱般稱王命與般敦同用賔當讀為句如易詞用賔於王也右通蓋高六寸一分深二寸八分口徑長五寸三分濶二寸二分重五十九兩有流有鋬右通蓋高九寸四分深四寸口徑長八寸六分濶三寸二分重一百四十三兩有流有鋬右高五寸九分深四寸口徑長七寸四分濶三寸重六十三兩有流有鋬右高四寸八分深二寸六分口徑長八寸五分濶四寸重八十五兩有流有鋬四足右高九寸八分深六寸三分口徑長三寸四分重九十二兩有流有鋬三足右通蓋高二寸二分深一寸六分口徑長二寸五分横一寸七分通長五寸九分濶二寸二分重二十五兩有流有鋬右通蓋高四寸四分深二寸二分口徑長四寸六分横一寸八分通長七寸二分濶二寸七分重四十一兩右通蓋高六寸深二寸二分口徑長六寸五分濶一寸八分重六十五兩右通蓋高三寸六分深一寸九分口徑長六寸四分濶二寸五分重四十五兩有流有鋬右高一寸七分深一寸四分口徑長四寸八分濶二寸六分重九兩有流有鋬四足右通蓋高六寸一分深二寸五分口徑長五寸一分濶二寸六分重五十二兩有流有鋬右高五寸六分深二寸三分口徑長七寸五分濶四寸六分重三十七兩有流有鋬四足右高五寸五分深二寸三分口徑長八寸七分濶五寸一分重七十一兩有流有鋬三足右高五寸一分深二寸口徑長八寸八分濶五寸重六十五兩有流有鋬四足右高四寸深二寸七分口徑長七寸九分濶四寸七分重六十九兩有流有鋬四足右高四寸三分深二寸五分口徑長八寸濶四寸二分重四十九兩有流有鋬四足右高二寸九分深二寸口徑長七寸濶四寸二分重一十七兩有流有鋬三足右高五寸三分深三寸六分口徑長一尺八分濶五寸二分重一百二兩有流有鋬四足右高四寸深二寸六分口徑長七寸八分濶四寸三分重四十四兩有流有鋬四足右高三寸三分深二寸一分口徑長六寸四分濶三寸三分重四十二兩有流有鋬四足右高二寸五分深一寸七分口徑長九寸濶三寸七分重三十兩有流有鋬四足右通蓋高一寸一分深七寸口徑長二寸重四兩有流與博古圖所載形製合其名曰注水匜今從之圖考謂凡格間所用蓋硯滴類耳右高二寸八分深一寸二分口徑一尺一寸五分重一百七兩兩耳三足洗與盤聶崇義謂二器良是蓋盤所以承盥器而洗則盛盥之棄水阮諶禮圖並謂盤為盛棄水誤矣以儀禮考之言盤匜者不一而既夕一篇曰用器槃匜匜實于槃中南流曰實於槃中則槃為承匜物致為明顯此器為盤無疑銘左旋讀剥蝕處不可曉曰鑄疑其國如鑄鼎鑄父般蓋盤字耳右高一寸七分深一寸五分口徑一尺一寸三分重五十九兩兩耳按此當而盤為銘曰鬲舊説常飪則以鬲蓋春秋時諸侯多自為制不可考矣曰太子禮記稱王太子羣后之太子則國君之適子皆得曰太子也據形制仍謂之盤右高三寸六分深二寸三分口徑一尺五寸六分重三百一十五兩兩耳據銘知為齊國物下曰姬蓋盤匜同屬皆内職也右高四寸五分深二寸五分口徑一尺三寸重一百四十五兩兩耳右高三寸四分深二寸一分口徑一尺二寸九分重一百三十三兩兩耳三足右高三寸四分深二寸三分口徑一尺五寸三分重二百九十九兩兩耳右高三寸二分深一寸八分口徑一尺一寸七分重一百二十三兩兩耳右高三寸一分深二寸二分口徑一尺三寸二分重一百三十兩兩耳三足右高二寸六分深一寸五分口徑一尺八分重一百三十三兩兩耳右高二寸五分深一寸四分口徑一尺一寸七分重九十一兩兩耳右高二寸深一寸五分口徑八寸八分重五十九兩兩耳右高三寸四分深二寸二分口徑一尺二寸八分重二百二十七兩兩耳右高二寸四分深一寸二分口徑九寸四分重八十三兩兩耳三足右高二寸八分深二寸一分口徑一尺七寸三分重三百三十九兩右高七分深六分口徑九寸三分重二十六兩右高一寸三分深一寸一分口徑六寸三分重一十一兩右高一寸二分深九分口徑四寸九分重一十二兩右高三寸深二寸九分口徑七寸三分腹圍二尺一寸三分重三十八兩有柄按鋗説文謂之無足鐺五音集韻謂之銅銚考魏武帝上器物表有四石五石銅鋗則知鋗尚有極大者博古圖僅載梁山鋗一與兹器相似但少柄耳西清古鑑卷三十二
