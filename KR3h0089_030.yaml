body:
  text: 西清古鑑卷二十七敦一周丁卯敦有銘丁亥敦有銘癸亥敦有銘伯尚敦有銘太公敦一有銘太公敦二有銘太公敦三有銘吕伯敦有銘乙公敦有銘靜敦有銘史頌敦有銘追敦一有銘追敦二有銘舉伯敦有銘中伯敦有銘伯敦有銘吉父敦有銘邢敦有銘杞父敦有銘虢仲敦有銘般敦有銘右通蓋高五寸六分深三寸五分口徑五寸二分腹圍二尺一寸四分重九十兩兩耳有珥銘字與博古圖所載淮父卣多同者意一時所制右高六寸九分深三寸一分口徑六寸九分腹圍二尺一寸二分重二百一十九兩兩耳有珥銘幾九十字可辨者三之一錯落難讀前云敬共祀後云享鄭康成謂敦瑚璉簋皆宗廟盛黍稷之器云吉金者古器銘多有之猶錫貝也右高四寸二分深三寸二分口徑六寸二分腹圍一尺八寸三分重五十七兩兩耳有珥銘曰我孫詩謂我將我享書謂爾之許我我其以璧與圭歸俟爾命古人對神質言之稱爾我示親也酉庚意者月在酉日維庚故云爾曰貝曰斤貝周禮冬官考工記宋之斤注以鐵為之又古稱泉貝説文謂至秦而廢貝行錢食貨志有十朋五貝則不必概與貝玉貝錦同也銘詞乃正斤貝用作尊彞故知斤貝皆金屬矣右高三寸二分深二寸三分口徑五寸二分腹圍一尺三寸二分重三十一兩兩耳有珥齊太公名尚為方伯得專征伐銘曰伯尚蓋齊作耶右通蓋高六寸八分深三寸七分口徑五寸九分腹圍二尺三寸九分重一百七十一兩兩耳三足篆法太與丙相近此銘或疑為丙然鐘鼎欵識載太公簠銘曰太公作釁寶簠此云太公作釁從敦書法同故知當為太公右通蓋高六寸五分深三寸七分口徑六寸腹圍二尺三寸九分重一百九十一兩兩耳三足右通蓋高六寸八分深三寸七分口徑六寸腹圍二尺四寸重一百九十三兩兩耳三足銘字與前二器相近首一字缺蓋太字也右通蓋高六寸八分深三寸九分口徑七寸二分腹圍二尺一寸九分重一百四十五兩兩耳吕伯作疑是齊器而周穆王時又有吕侯為天子司冦玩銘詞後稱祀乃祖考則前云宫室蓋宗廟耳詩召南于以用之公侯之宫孔氏疏云可以奉祭祀曰事祭必於宗廟曰宫室則如世室是已大田蓋祈年之意古人祭必有祝舊銘多如此右通蓋高一尺四分深四寸二分口徑七寸四分腹圍二尺三寸七分重二百九十九兩兩耳是下一字不可識銘曰乙公亦齊物也右高四寸八分深四寸一分口徑七寸三分腹圍二尺二寸六分重一百二十七兩兩耳有珥曰王在旁京與靜卣同曰吳曰吕毛伯彞亦然且靜為齊胡公名是知為東遷以前器也雩粵古文多通雩八月即粵八月洍許氏詳里切古汜字也學宫大洍皆肄射地綼説文謂帛海篇作丑全切謂去皮也蓋刀劍之屬右通蓋高七寸二分深四寸一分口徑六寸八分腹圍二尺七寸六分重二百三十五兩兩耳有珥銘與史頌鼎同惟德􅀈篆法小異又下一字鼎所缺右高九寸三分深四寸四分口徑八寸二分腹圍二尺八寸四分重四百四十三兩兩耳有珥銘首一字曰追後凡稱追者三詩其追其貊奄受北國則古有追國顧錫追休云云則追似其名按銘詞蓋死事者子孫紀其贈恤之典而泐之於器末乃兼致頌禱之義云爾右尺度輕重暨銘詞俱與前器同右通蓋高六寸一分深三寸五分口徑五寸六分腹圍二尺二寸一分重一百一兩兩耳有環銘曰舉伯蓋人名非他器銘舉者類矣宋黃伯思舉鼎説謂宋之僖公名舉又稱楚伍舉蔡史舉唐燕舉而弗及晉之祁舉齊之賈舉因録斯器并詳列之右高四寸一分深三寸四分口徑六寸八分腹圍二尺四寸重一百三兩兩耳有珥三足第四字剝蝕不全按博古圖有孌女鼎俱以為人名古人三月定名女子許嫁笄而字曰某姬其字鑾節或其名也中伯猶已伯舉伯行伯之類右高三寸八分深三寸三分口徑六寸腹圍一尺九寸二分重六十兩兩耳有珥右高五寸七分深三寸八分口徑六寸腹圍二尺五寸重一百一十九兩兩耳有珥三足吉上一字作篆法即肸字與費通尚書費誓史記魯世家作肸誓疑吉父或魯之費大夫而仲薑蓋其所祀也右高五寸六分深四寸一分口徑六寸四分腹圍二尺五寸九分重一百六十七兩兩耳有珥四足周邢叔彞銘曰作乃文考邢叔寶尊彞此銘邢下一字漫漶又下一字亦曰叔豈一人耶或曰當讀作叔安父右高四寸深三寸二分口徑六寸六分腹圍二尺三寸四分重一百二十三兩兩耳有珥魯頌周公之孫莊公之子銘曰敏仲之孫皆推本祖德以立言杞父人名上有樂字宋戴公之後有樂氏豈其族與右通蓋高七寸五分深三寸九分口徑六寸五分腹圍二尺四寸三分重一百五十七兩兩耳有珥三足鄭字缺阜古文多如此銘稱鄭虢仲意為鄭之大夫非桓王時虢仲矣右高六寸三分深三寸三分口徑三寸八分腹圍一尺八寸三分重七十七兩兩耳有珥三代鼎器録有東宫方鼎又尹卣銘曰王飲西宫此銘曰東宫蓋其地也大阜之年按三代無紀元者詩傳謂阜盛也多也其猶大有之年耶追蓋追饗也意亦祭器銘首稱般春秋周景王三年為蔡侯般元年此言王命知非宋門尹般魯公子般比矣云貯猶藏也西清古鑑卷二十七
