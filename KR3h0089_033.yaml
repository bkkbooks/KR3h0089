body:
  text: 西清古鑑卷三十甗商祖丁甗有銘周克甗有銘伯矩甗有銘兕甗有銘叔甗有銘子甗有銘木甗有銘立旗甗有銘執木甗有銘舉甗有銘亞甗一有銘亞甗二有銘叨餮甗一叨餮甗二叨餮甗三環紋甗蟠夔甗一蟠夔甗二蟠夔甗三夔鳳甗雷紋甗偃耳甗一偃耳甗二盤雲甗素錠一素錠二鐙漢聖得鐙有銘右高一尺二寸五分深自口至隔五寸八分自隔至砥二寸九分耳高二寸三分濶如之口徑九寸腹圍二尺二寸九分重一百八十七兩春秋內傳齊侯使賓媚人賂晉以紀甗玉磬蓋紀國之甗如郜鼎吳壽夢之鼎皆繫以地而杜氏注謂玉甗非也玉海載宋太宗時長安民得甗其下為鼎三足上為方甑設銅箄可以開闔形製與此合但彼為方甑此特圓亦象鼎而口稍侈為不同耳箄在上下格之間按説文蔽也所以蔽甑底也右高一尺一寸八分深自口至隔五寸八分自隔至砥二寸二分耳高二寸五分濶二寸二分口徑八寸四分腹圍一尺九寸四分重二百四兩癸蓋紀月日克則其名父乙或沿商稱耳周人名克者如慶克里克郤克甚夥固難指一人為斷博古圖有高克尊謂周末衛文公時人不知鄭先有高克矣末一行作小篆蓋後世收藏家私識也右高一尺一寸七分深自口至隔五寸九分自隔至砥二寸八分耳高二寸二分濶如之口徑八寸四分腹圍二尺四分重二百二十四兩欵與伯矩尊同右高一尺二寸五分深自口至隔六寸二分自隔至砥二寸八分耳高二寸四分濶二寸六分口徑九寸四分腹圍二尺四寸八分重二百五十六兩兕字作與兕敦同右高七寸九分深自口至隔三寸六分自隔至砥二寸耳高一寸二分濶一寸三分口徑五寸八分腹圍一尺四寸二分重六十八兩右高一尺二寸二分深自口至隔六寸二分自隔至砥二寸八分耳高一寸五分濶如之口徑九寸二分腹圍二尺二寸重二百八十兩右高一尺二寸深自口至隔五寸四分自隔至砥三寸耳高二寸二分濶二寸三分口徑九寸腹圍二尺三寸重二百一十九兩缺箄銘曰木説見周木卣考中右高一尺二分深自口至隔五寸自隔至砥一寸九分耳高一寸九分濶如之口徑七寸二分腹圍一尺八寸一分重一百四十四兩右高一尺二寸八分深自口至隔五寸七分自隔至砥四寸三分耳高二寸四分濶二寸五分口徑九寸二分腹圍二尺三寸四分重二百五十六兩右高九寸深自口至隔四寸三分自隔至砥二寸三分耳高一寸八分濶一寸六分口徑六寸五分腹圍一尺五寸六分重一百一十七兩右高一尺九分深自口至隔五寸一分自隔至砥二寸八分耳高二寸濶如之口徑七寸八分腹圍二尺六分重一百八十七兩右高九寸九分深自口至隔四寸六分自隔至砥三寸一分耳高一寸九分濶一寸六分口徑七寸六分腹圍一尺七寸七分重一百一十五兩缺箄右高一尺一寸五分深自口至隔五寸三分自隔至砥二寸八分耳高二寸濶如之口徑八寸五分腹圍二尺一寸四分重一百七十九兩右高九寸九分深自口至隔四寸八分自隔至砥二寸三分耳高一寸九分濶二寸口徑七寸一分腹圍一尺七寸一分重一百三十七兩右高九寸七分深自口至隔四寸八分自隔至砥二寸五分耳高一寸八分濶一寸九分口徑七寸腹圍一尺七寸八分重一百一十一兩右高一尺四分深自口至隔四寸六分自隔至砥二寸六分耳高一寸八分濶二寸口徑七寸三分腹圍一尺八寸七分重一百一十九兩下隔金銀錯右高七寸三分深六寸七分耳高二寸四分濶一寸八分口徑一尺三寸腹圍三尺二寸一分重一百四十五兩箄足並缺右高六寸三分深五寸六分耳高二寸六分濶一寸九分口徑九寸五分腹圍二尺九寸二分重一百一十三兩箄足並缺右高五寸七分耳高二寸三分濶一寸六分深五寸口徑八寸腹圍二尺四寸九分重八十五兩箄足並缺右高一尺二寸深自口至隔五寸八分自隔至砥三寸一分耳高二寸四分濶一寸八分口徑九寸腹圍一尺九寸三分重一百六十七兩右高六寸一分深五寸六分耳高二寸五分濶一寸九分口徑九寸腹圍二尺七寸八分重八十五兩缺足其隔作風紋象箄而不可開闔如冰鑑之底與他器異右高六寸三分深五寸七分耳高二寸三分濶一寸八分口徑九寸三分腹圍二尺八寸重一百一十三兩博古圖所載偃耳甗謂耳外附如釴而偃今器形製合箄足並缺右高六寸七分深六寸一分耳高二寸七分濶二寸一分口徑一尺三分腹圍三尺二寸四分重一百二十三兩箄足並缺右高九寸三分深六寸八分耳高二寸二分濶一寸七分口徑一尺一寸四分腹圍三尺五寸七分重一百九十一兩箄足並缺下三環蓋後人附麗偽為之右通高一尺五分燈蓋連管高四寸口徑三寸四分燈盤高一寸五分柄長三寸三分中有仰錐長三分燈隱二圍各高二寸九分其一有環燈座連管高七寸四分口徑二寸二分腹圍一尺六寸通重九十一兩三足按説文以錠為鐙古燈字皆作鐙非即豆登之謂博古圖載有王氏銅虹燭錠止有鐙座而無盤蓋云薦熟食之器銘曰虹燭者取其氣運如虹之義此器盤蓋俱全盤有仰錐有圓影其為燃燭者無疑蓋作雙管下垂接於座其取製之法不可知然以為薦熟食如豆登之登固可按器而決其非也右通高一尺二寸八分燈蓋連管高六寸一分口徑四寸七分燈座連管高七寸六分口徑二寸四分腹圍二尺重一百五十九兩三足缺燈盤燈隱右通高二寸一分面徑三寸八分深六分柄長四寸五分三足承槃徑七寸四分深九分底徑四寸一分重四十二兩銘曰聖得易曰日月得天而能久照聖人變化而能久成義或取諸此殆宫中所用金缸之類歟西清古鑑卷三十
